<script>
// ---- 클로드 없이 독립 실행되도록 하는 저장소 폴리필 ----
// 원래 코드는 클로드 아티팩트 전용 window.storage API(서버에 저장, 모든 사용자가 공유)를 사용합니다.
// 독립 실행 버전에서는 이 API를 브라우저의 localStorage로 대체합니다.
// 주의: localStorage는 이 브라우저(이 기기)에만 저장되며, 다른 사람과 공유되지 않습니다.
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem("stint_" + key);
      if (raw === null || raw === undefined) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem("stint_" + key, value);
      return { key, value, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async delete(key, shared) {
    try {
      localStorage.removeItem("stint_" + key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async list(prefix, shared) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf("stint_") === 0) {
          const bare = k.slice(6);
          if (!prefix || bare.indexOf(prefix) === 0) keys.push(bare);
        }
      }
      return { keys, prefix, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
};
</script>

    __showFatalError((e.error && e.error.stack) || e.message || e);
  });

</script>

const TERMS_SECTIONS = [{"title": "보통약관 제1조(목적)", "text": "이 보험계약(이하 ‘계약’이라 합니다)은 보험계약자(이하 ‘계약자’라 합니다)와 보험회사(이하 ‘회사’라 합니다) 사\n이에 피보험자의 상해에 대한 위험을 보장하기 위하여 체결됩니다"}, {"title": "보통약관 제2조(용어의 정의)", "text": "이 계약에서 사용되는 용어의 정의는, 이 계약의 다른 조항에서 달리 정의되지 않는 한 다음과 같습니다.\n1. 계약관계 관련 용어\n가. 계약자: 회사와 계약을 체결하고 보험료를 납입할 의무를 지는 사람을 말합니다.\n나. 보험수익자: 보험금 지급사유가 발생하는 때에 회사에 보험금을 청구하여 받을 수 있는 사람을 말합니다.\n다. 보험증권: 계약의 성립과 그 내용을 증명하기 위하여 회사가 계약자에게 드리는 증서를 말합니다.\n라. 진단계약: 계약을 체결하기 위하여 피보험자가 건강진단을 받아야 하는 계약을 말합니다.\n마. 피보험자: 보험사고의 대상이 되는 사람으로 해외유학․연수생으로서 3개월을 초과하여 해외에 체류하는 자\n를 대상으로 합니다.\n2. 지급사유 관련 용어\n가. 상해: 보험기간 중에 발생한 급격하고도 우연한 외래의 사고로 신체(의수, 의족, 의안, 의치 등 신체보조장\n구는 제외하나, 인공장기나 부분 의치 등 신체에 이식되어 그 기능을 대신할 경우는 포함합니다)에 입은\n상해를 말합니다\n나. 장해: 【별표1】장해분류표에서 정한 기준에 따른 장해상태를 말합니다.\n다. 중요한 사항: 계약전 알릴 의무와 관련하여 회사가 그 사실을 알았더라면 계약의 청약을 거절하거나 보험\n가입금액 한도 제한, 일부 보장 제외, 보험금 삭감, 보험료 할증과 같이 조건부로 승낙하는 등 계약 승낙\n에 영향을 미칠 수 있는 사항을 말합니다.\n3. 이자율 관련 용어\n가. 연단위 복리: 회사가 지급할 금전에 이자를 줄 때 1년마다 마지막 날에 그 이자를 원금에 더한 금액을 다\n음 1년의 원금으로 하는 이자 계산방법을 말합니다.\n\n【연단위 복리 계산법 예시】\n100원(원금)+100원×10%(1년차 이자)+[100원+100원×10%]×10%(2년차 이자) = 총121원\n\n4. 기간과 날짜 관련 용어\n가. 보험기간: 계약에 따라 보장을 받는 기간을 말합니다.\n나. 영업일: 회사가 영업점에서 정상적으로 영업하는 날을 말하며, 토요일, ‘관공서의 공휴일에 관한 규정’에\n따른 공휴일 및 대체공휴일, ‘근로자의 날 제정에 관한 법률’에 따른 근로자의 날을 제외합니다.\n\n제2관 보험금의 지급"}, {"title": "보통약관 제3조(보험금의 지급사유)", "text": "회사는 보험기간 중 피보험자가 보험증권에 기재된 해외유학 및 연수 도중(주거지를 출발하여 유학 및 연수를 마\n치고 주거지에 도착할 때까지를 포함 합니다.)에 다음 중 어느 하나의 사유가 발생한 경우에는 보험수익자에게 약\n정한 보험금을 지급합니다.\n1. 보험기간 중에 상해의 직접결과로써 사망한 경우(질병으로 인한 사망은 제외합니다) : 보험가입금액을 사망보험\n금으로 지급\n2. 보험기간 중에 상해로 장해분류표(【별표1】 참조. 이하 같습니다)에서 정한 각 장해지급률에 해당하는 장해상태\n가 되었을 때 : 장해분류표에서 정한 지급률을 보험가입금액에 곱하여 산출한 금액을 후유장해보험금으로 지급\n\n8 한화글로벌안심보험"}, {"title": "보통약관 제4조(보험금 지급에 관한 세부규정)", "text": "① 제3조(보험금의 지급사유) 제1호 ‘사망’에는 보험기간에 다음 어느 하나의 사유가 발생한 경우를 포함합니다.\n1. 실종선고를 받은 경우: 법원에서 인정한 실종기간이 끝나는 때에 사망한 것으로 봅니다.\n2. 관공서에서 수해, 화재나 그 밖의 재난을 조사하고 사망한 것으로 통보하는 경우 : 가족관계등록부에 기재\n된 사망연월일을 기준으로 합니다.\n② 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료 결정에 관한 법률」에 따른 연명의료중단등결정 및 그\n이행으로 피보험자가 사망하는 경우 연명의료중단등결정 및 그 이행은 제3조(보험금의 지급사유) 제1호 ‘사망’의\n원인 및 ‘사망보험금’ 지급에 영향을 미치지 않습니다.\n③ 제3조(보험금의 지급사유) 제2호에서 장해지급률이 상해 발생일부터 180일 이내에 확정되지 않는 경우에는 상해\n발생일부터 180일이 되는 날의 의사 진단에 기초하여 고정될 것으로 인정되는 상태를 장해지급률로 결정합니다.\n다만, 장해분류표(【별표1】참조)에 장해판정시기를 별도로 정한 경우에는 그에 따릅니다.\n④ 제2항에 따라 장해지급률이 결정되었으나 그 이후 보장받을 수 있는 기간(계약의 효력이 없어진 경우에는 상해\n발생일부터 1년 이내)에 장해상태가 더 악화된 때에는 그 악화된 장해상태를 기준으로 장해지급률을 결정합니다.\n⑤ 장해분류표에 해당되지 않는 후유장해는 피보험자의 직업, 연령, 신분 또는 성별 등에 관계없이 신체의 장해정도\n에 따라 장해분류표의 구분에 준하여 지급액을 결정합니다. 다만, 장해분류표의 각 장해분류별 최저 지급률 장해\n정도에 이르지 않는 후유장해에 대하여는 후유장해보험금을 지급하지 않습니다.\n⑥ 보험수익자와 회사가 제3조(보험금의 지급사유)의 보험금 지급사유에 대해 합의하지 못할 때는 보험수익자와 회사\n가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병\n원 소속 전문의 중에 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n⑦ 같은 상해로 두 가지 이상의 후유장해가 생긴 경우에는 후유장해 지급률을 더하여 지급합니다. 다만, 장해분류표\n의 각 신체부위별 판정기준에 별도로 정한 경우에는 그 기준에 따릅니다.\n⑧ 다른 상해로 인하여 후유장해가 2회 이상 발생하였을 경우에는 그 때마다 이에 해당하는 후유장해지급률을 결정\n합니다. 그러나 그 후유장해가 이미 후유장해보험금을 지급받은 동일한 부위에 가중된 때에는 최종 장해상태에\n해당하는 후유장해보험금에서 이미 지급받은 후유장해보험금을 차감하여 지급합니다. 다만, 장해분류표의 각 신체\n부위별 판정기준에서 별도로 정한 경우에는 그 기준에 따릅니다.\n⑨ 이미 이 계약에서 후유장해보험금 지급사유에 해당되지 않았거나(보장개시 이전의 원인에 의하거나 또는 그 이전\n에 발생한 후유장해를 포함합니다), 후유장해보험금이 지급되지 않았던 피보험자에게 그 신체의 동일 부위에 또다\n시 제7항에 규정하는 후유장해상태가 발생하였을 경우에는 직전까지의 후유장해에 대한 후유장해보험금이 지급된\n것으로 보고 (이하 생략)"}, {"title": "보통약관 제5조(보험금을 지급하지 않는 사유)", "text": "① 회사는 다음 중 어느 한가지로 보험금 지급사유가 발생한 때에는 보험금을 지급하지 않습니다.\n1. 피보험자가 고의로 자신을 해친 경우. 다만, 피보험자가 심신상실 등으로 자유로운 의사결정을 할 수 없는\n상태에서 자신을 해친 경우에는 보험금을 지급합니다.\n2. 보험수익자가 고의로 피보험자를 해친 경우. 다만, 그 보험수익자가 보험금의 일부 보험수익자인 경우에는 다\n른 보험수익자에 대한 보험금은 지급합니다.\n3. 계약자가 고의로 피보험자를 해친 경우\n4. 피보험자의 임신, 출산(제왕절개를 포함합니다), 산후기. 그러나, 회사가 보장하는 보험금 지급사유와 보장개\n시일부터 2년이 지난 후에 발생한 습관성 유산, 불임 및 인공수정 관련 합병증으로 인한 경우에는 보험금\n을 지급합니다.\n\n【습관성 유산, 불임 및 인공수정】\n한국표준질병·사인분류상의 N96~N98에 해당하는 질병을 말합니다.\n\n5. 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동\n② 회사는 다른 약정이 없으면 피보험자가 직업, 직무 또는 동호회 활동목적으로 아래에 열거된 행위로 인하여 제3조\n(보험금의 지급사유)의 상해 관련 보험금 지급사유가 발생한 때에는 해당 보험금을 지급하지 않습니다.\n1. 전문등반(전문적인 등산용구를 사용하여 암벽 또는 빙벽을 오르내리거나 특수한 기술, 경험, 사전훈련을 필\n요로 하는 등반을 말합니다), 글라이더 조종, 스카이다이빙, 스쿠버다이빙, 행글라이딩, 수상보트, 패러글라\n이딩\n2. 모터보트, 자동차 또는 오토바이에 의한 경기, 시범, 흥행(이를 위한 연습을 포함합니다) 또는 시운전(다만,\n공용도로상에서 시운전을 하는 동안 보험금 지급사유가 발생한 경우에는 보장합니다)\n3. 선박에 탑승하는 것을 직무로 하는 사람이 직무상 선박에 탑승하고 있는 동안"}, {"title": "보통약관 제6조(보험금 지급사유의 통지)", "text": "계약자 또는 피보험자나 보험수익자는 제3조(보험금의 지급사유)에서 정한 보험금 지급사유의 발생을 안 때에는\n지체없이 그 사실을 회사에 알려야 합니다."}, {"title": "보통약관 제7조(보험금의 청구)", "text": "① 보험수익자는 다음의 서류를 제출하고 보험금을 청구하여야 합니다.\n1. 청구서(회사 양식)\n2. 사고증명서(진료비계산서, 사망진단서, 장해진단서, 입원치료확인서, 의사처방전(처방조제비) 등)\n3. 신분증(주민등록증이나 운전면허증 등 사진이 붙은 정부기관발행 신분증, 본인이 아닌 경우에는 본인의 인\n감증명서 또는 본인서명사실확인서 포함)\n4. 기타 보험수익자가 보험금의 수령에 필요하여 제출하는 서류\n② 제1항 제2호의 사고증명서는 의료법 제3조(의료기관)에서 규정한 국내의 병원이나 의원 또는 국외의 의료관련법\n에서 정한 의료기관에서 발급한 것이어야 합니다."}, {"title": "보통약관 제8조(보험금의 지급절차)", "text": "① 회사는 제7조(보험금의 청구)에서 정한 서류를 접수한 때에는 접수증을 드리고 휴대전화 문자메시지 또는 전자우\n편 등으로도 송부하며, 그 서류를 접수한 날부터 3영업일 이내에 보험금을 지급합니다.\n② 회사가 보험금 지급사유를 조사․확인하기 위해 필요한 기간이 제1항의 지급기일을 초과할 것이 명백히 예상되는\n경우에는 그 구체적인 사유와 지급예정일 및 보험금 가지급제도(회사가 추정하는 보험금의 50% 이내를 지급)에\n대하여 피보험자 또는 보험수익자에게 즉시 통지합니다. 다만, 지급예정일은 다음 각 호의 어느 하나에 해당하는\n경우를 제외하고는 제7조(보험금의 청구)에서 정한 서류를 접수한 날부터 30영업일 이내에서 정합니다.\n1. 소송제기\n2. 분쟁조정 신청\n3. 수사기관의 조사\n4. 해외에서 발생한 보험사고에 대한 조사\n5. 제6항에 따른 회사의 조사요청에 대한 동의 거부 등 계약자, 피보험자 또는 보험수익자의 책임있는 사유로\n보험금 지급사유의 조사와 확인이 지연되는 경우\n6. 제4조(보험금 지급에 관한 세부규정) 제6항에 따라 보험금 지급사유에 대해 제3자의 의견에 따르기로 한\n경우\n③ 제2항에 의하여 장해지급률의 판정 및 지급할 보험금의 결정과 관련하여 확정된 장해지급률에 따른 보험금을 초\n과한 부분에 대한 분쟁으로 보험금 지급이 늦어지는 경우에는 보험수익자의 청구에 따라 이미 확정된 보험금을\n먼저 가지급합니다.\n④ 제2항에 의하여 추가적인 조사가 이루어지는 경우, 회사는 보험수익자의 청구에 따라 회사가 추정하는 보험금의\n50% 상당액을 가지급보험금으로 지급합니다.\n\n10 한화글로벌안심보험\n【가지급보험금】\n보험금이 지급기한 내에 지급되지 못할 것으로 판단되는 경우 회사가 예상되는 보험금의 일부를 먼저 지급하\n는 제도로 피보험자가 필요로 하는 비용을 보전해 주기 위해 회사가 먼저 지급하는 임시 교부금을 말합니다.\n(이하 같습니다.)\n⑤ 회사는 제1항의 규정에 정한 지급기일내에 보험금을 지급하지 않았을 때(제2항의 규정에서 정한 지급예정일을 통\n지한 경우를 포함합니다)에는 그 다음날부터 지급일까지의 기간에 대하여 [부표] ‘보험금을 지급할 때의 적립이\n율’에 따라 연단위 복리로 계산한 금액을 보험금에 더하여 지급합니다. 그러나 계약자, 피보험자 또는 보험수익자\n의 책임있는 사유로 지급이 지연된 때에는 그 해당기간에 대한 이자는 더하여 지급하지 않습니다. 다만, 회사는\n계약자 등이 분쟁조정을 신청했다는 사유만으로 이자지급을 거절하지 않습니다.\n⑥ 계약자, 피보험자 또는 보험수익자는 제15조(알릴 의무 위반의 효과) 및 제2항의 보험금 지급사유조사와 관련하여\n의료기관 또는 국민건강보험공단, 경찰서 등 관공서에 대한 회사의 서면에 의한 조사요청에 동의하여야 합니다.\n다만, 정당한 사유 없이 이에 동의하지 않을 경우 사실 확인이 끝날 때까지 회사는 보험금 지급지연에 따른 이자\n를 지급하지 않습니다.\n⑦ 회사는 제6항의 서면조사에 대한 동의 요청시 조사목적, 사용처 등을 명시하고 설명합니다.\n\n[부표] 보험금을 지급할 때의 적립이율\n기 간 지 급 (이하 생략)"}, {"title": "보통약관 제9조(보험금 받는 방법의 변경)", "text": "① 계약자(보험금 지급사유 발생 후에는 보험수익자)는 회사의 사업방법서에서 정한 바에 따라 보험금의 전부 또는\n일부에 대하여 나누어 지급받거나 일시에 지급받는 방법으로 변경할 수 있습니다.\n② 회사는 제1항에 따라 일시에 지급할 금액을 나누어 지급하는 경우에는 나중에 지급할 금액에 대하여 ‘보험개발원\n이 공시하는 월평균 정기예금이율’을 연단위 복리로 계산한 금액을 더하며, 나누어 지급할 금액을 일시에 지급하\n는 경우에는 ‘보험개발원이 공시하는 월평균 정기예금이율’을 연단위 복리로 할인한 금액을 지급합니다."}, {"title": "보통약관 제10조(주소변경통지)", "text": "① 계약자(보험수익자가 계약자와 다른 경우 보험수익자를 포함합니다)는 주소 또는 연락처가 변경된 경우에는 지체\n없이 그 변경내용을 회사에 알려야 합니다.\n② 제1항에서 정한대로 계약자 또는 보험수익자가 변경내용을 알리지 않은 경우에는 계약자 또는 보험수익자가 회사\n에 알린 최종의 주소 또는 연락처로 등기우편 등 우편물에 대한 기록이 남는 방법으로 회사가 알린 사항은 일반\n적으로 도달에 필요한 기간이 지난 때에 계약자 또는 보험수익자에게 도달된 것으로 봅니다."}, {"title": "보통약관 제11조(보험수익자의 지정)", "text": "보험수익자를 지정하지 않은 때에는 보험수익자를 제3조(보험금의 지급사유) 제1호의 경우는 피보험자의 법정상속\n인, 같은 조 제2호의 경우는 피보험자로 합니다.\n\n【법정상속인】\n법정상속인이라 함은 피상속인의 사망에 의하여 민법의 규정에 의한 상속순위에 따라 상속받는 자를 말합니\n다."}, {"title": "보통약관 제12조(대표자의 지정)", "text": "① 계약자 또는 보험수익자가 2명 이상인 경우에는 각 대표자를 1명 지정하여야 합니다. 이 경우 그 대표자는 각각\n다른 계약자 또는 보험수익자를 대리하는 것으로 합니다.\n② 지정된 계약자 또는 보험수익자의 소재가 확실하지 않은 경우에는 이 계약에 관하여 회사가 계약자 또는 보험수익\n자 1명에 대하여 한 행위는 각각 다른 계약자 또는 보험수익자에게도 효력이 미칩니다.\n③ 계약자가 2명 이상인 경우에는 그 책임을 연대로 합니다.\n【연대】\n2인 이상이 연대하여 책임을 지므로 각자 채무의 전부를 이행할 책임을 지고(지분만큼 분할하여 책임을 지는\n것과 다름) 어느 1인의 이행으로 나머지 사람들도 책임을 면하게 되는 것을 말합니다.\n\n제3관 계약자의 계약 전 알릴 의무 등"}, {"title": "보통약관 제13조(계약 전 알릴 의무)", "text": "계약자 또는 피보험자는 청약할 때(진단계약의 경우에는 건강진단할 때를 말합니다) 청약서에서 질문한 사항에 대\n하여 알고 있는 사실을 반드시 사실대로 알려야(이하 ‘계약 전 알릴의무’라 하며, 상법상 ‘고지의무’와 같습니다)\n합니다. 다만, 진단계약의 경우 의료법 제3조(의료기관)의 규정에 따른 종합병원과 병원에서 직장 또는 개인이 실\n시한 건강진단서 사본 등 건강상태를 판단할 수 있는 자료로 건강진단을 대신할 수 있습니다."}, {"title": "보통약관 제14조(상해보험계약 후 알릴 의무)", "text": "① 계약자 또는 피보험자는 보험기간 중에 피보험자에게 다음 각 호의 변경이 발생한 경우에는 우편, 전화, 방문 등의\n방법으로 지체없이 회사에 알려야 합니다.\n1. 보험증권 등에 기재된 직업 또는 직무의 변경\n가. 현재의 직업 또는 직무가 변경된 경우\n나. 직업이 없는 자가 취직한 경우\n다. 현재의 직업을 그만둔 경우\n【직업】\n1) 생계유지 등을 위하여 일정한 기간동안(예: 6개월 이상) 계속하여 종사하는 일\n2) 1)에 해당하지 않는 경우에는 개인의 사회적 신분에 따르는 위치나 자리를 말함\n예) 학생, 미취학아동, 무직 등\n\n【직무】직책이나 직업상 책임을 지고 담당하여 맡은 일\n\n2. 보험증권 등에 기재된 피보험자의 운전 목적이 변경된 경우\n예) 자가용에서 영업용으로 변경, 영업용에서 자가용으로 변경 등\n3. 보험증권 등에 기재된 피보험자의 운전여부가 변경된 경우\n예) 비운전자에서 운전자로 변경, 운전자에서 비운전자로 변경 등\n4. 이륜자동차 또는 원동기장치 자전거(전동킥보드, 전동이륜평행차, 전동기의 동력만으로 움직일 수 있는 자전\n거 등 개인형 이동장치를 포함)를 계속적으로 사용(직업, 직무 또는 동호회 활동과 출퇴근용도 등으로 주로\n사용하는 경우에 한함)하게 된 경우(다만, 전동휠체어, 의료용 스쿠터 등 보행보조용 의자차는 제외합니다.)\n② 회사는 제1항의 통지로 인하여 위험의 변동이 발생한 경우에는 제21조(계약내용의 변경 등)에 따라 계약내용을\n변경할 수 있습니다.\n\n12 한화글로벌안심보험\n[위험변경에 따른 계약변경 절차]\n위험변경사항 통지\n(우편, 전화, 방문 등)\n↓\n계약자,피보험자의 계약변경사항 확인 후 청약\n↓\n계약변경사항 인수 심사\n↓\n정산금액 처리\n(환급 또는 추가납입)\n↓\n계약변경 완료\n\n③ 회사는 제2항에 따라 계약내용을 변경할 때 위험이 감소된 경우에는 보험료를 감액하고, 이후 기간 보장을 위한\n재원인 계약자적립액 등의 차이로 인하여 발생한 정산금액(이하 “정산금액”이라 합니다)을 환급하여 드립니다. 한\n편 위험이 증가된 경우에는 보험료의 증액 및 정산금액의 추가납입을 요구할 수 있으며, 계약자는 이를 납입하여\n야 합니다.\n④ 제1항의 통지에 따라 위험의 증가로 보험료를 더 내야 할 경우 회사가 청구한 추가보험료(정산금액을 포함합니다)\n를 계약자가 납입하지 않았을 때, 회사는 위험이 증가되기 전에 적용된 보험요율(이하 ‘변경전 요율’이라 합니다)\n의 위험이 증가된 후에 적용해야 할 보험요율(이하 ‘변경후 요율’이라 합니다)에 대한 비율에 따라 보험금을 삭감\n하여 지급합니다. 다만, 증가된 위험과 관계없이 발생한 보험금 지급사유에 관해서는 원래대로 지급합니다.\n⑤ 계약자 또는 피보험자가 고의 또는 중대한 과실로 제1항 각 호의 변경사실을 회사에 알리지 않았을 경우 변경후\n요율이 변경전 요율보다 높을 때에는 회사는 그 변경사실을 안 날부터 1개월 이내에 계약자 또는 피보험자에게\n제4항에 따라 보장됨을 통보하고 이에 따라 보험금을 지급합니다."}, {"title": "보통약관 제15조(알릴 의무 위반의 효과)", "text": "① 회사는 아래와 같은 사실이 있을 경우에는 보험금 지급사유의 발생여부에 관계없이 그 사실을 안 날부터 1개월\n이내에 이 계약을 해지할 수 있습니다.\n1. 계약자, 피보험자 또는 이들의 대리인이 고의 또는 중대한 과실로 제13조(계약 전 알릴 의무)를 위반하고\n그 의무가 중요한 사항에 해당하는 경우\n2. 뚜렷한 위험의 증가와 관련된 제14조(상해보험계약 후 알릴 의무) 제1항에서 정한 계약 후 알릴 의무를 계\n약자, 피보험자 또는 이들의 대리인의 고의 또는 중대한 과실로 이행하지 않았을때\n② 제1항 제1호의 경우에도 불구하고 다음 중 하나에 해당하는 경우에는 회사는 계약을 해지할 수 없습니다.\n1. 회사가 계약당시에 그 사실을 알았거나 과실로 인하여 알지 못하였을 때\n2. 회사가 그 사실을 안 날부터 1개월 이상 지났거나 또는 제1회 보험료를 받은 때부터 보험금 지급사유가 발\n생하지 않고 2년(진단계약의 경우 질병에 대하여는 1년)이 지났을 때\n3. 계약을 체결한 날부터 3년이 지났을 때\n4. 회사가 이 계약을 청약할 때 피보험자의 건강상태를 판단할 수 있는 기초자료(건강진단서 사본 등)에 따라\n승낙한 경우에 건강진단서 사본 등에 명기되어 있는 사항으로 보험금 지급사유가 발생하였을 때(계약자 또\n는 피보험자가 회사에 제출한 기초자료의 내용 중 중요사항을 고의로 사실과 다르게 작성한 때에는 계약을\n해지할 수 있습니다)\n5. 보험설계사 등이 계약자 또는 피보험자에게 고지할 기회를 주지 않았거나 계약자 또는 피보험자가 사실대로\n고지하는 것을 방해한 경우, 계약자 또는 피보험자에게 사실대로 고지하지 않게 하였거나 부실한 고지를 권\n유했을 때. 다만, 보험설계사 등의 행위가 없었다 하더라도 계약자 또는 피보험자가 사실대로 고지하지 않\n거나 부실한 고지를 했다고 인정되는 경우에는 계약을 해지할 수 있습니다.\n③ 제1항에 따라 계약의 해지가 보험금 지급사유 발생 전에 이루어진 경우, 이로 인하여 회사가 환급하여야 할 보험\n료가 있을 때에는 제32조(보험료의 환급)에 따른 보험료를 계약자에게 지급합니다.\n④ 제1항 제1호에 의한 계약의 해지가 보험금 지급사유 발생 후에 이루어진 경우에 회사는 보험금을 지급하지 않으\n며, 계약 전 알릴 의무 위반사실(계약해지 등의 원인이 되는 위반사실을 구체적으로 명시)뿐만 아니라 계약 전 알\n\n릴 의무사항이 중요한 사항에 해당되는 사유를 “반대증거가 있는 경우 이의를 제기할 수 있습니다”라는 문구와\n함께 계약자에게 서면 또는 전자문서 등으로 알려 드립니다. 회사가 전자문서로 안내하고자 할 경우에는 계약자\n에게 서면 또는 「전자서명법」 제2조 제2호에 따른 전자서명으로 동의를 얻어 수신확인을 조건으로 전자문서를\n송신하여야 합니다. 계약자의 전자문서 수신이 확인되기 전까지는 그 전자문서는 송신되지 않은 것으로 봅니다.\n회사는 전자문서가 수신되지 않은 것을 확인한 경우에는 서면(등기우편 등)으로 다시 알려드립니다. 또한 이 경우\n계약 해지로 인하여 회사가 환급하여야 할 보험료가 있을 때에는 제32조(보험료의 환급)에 따른 (이하 생략)"}, {"title": "보통약관 제16조(사기에 의한 계약)", "text": "계약자 또는 피보험자가 대리진단, 약물사용을 수단으로 진단절차를 통과하거나 진단서 위·변조 또는 청약일 이전\n에 암 또는 인간면역결핍바이러스(HIV) 감염의 진단 확정을 받은 후 이를 숨기고 가입하는 등 사기에 의하여 계\n약이 성립되었음을 회사가 증명하는 경우에는 계약일부터 5년 이내(사기사실을 안 날부터 1개월 이내)에 계약을\n취소할 수 있습니다.\n\n제4관 보험계약의 성립과 유지"}, {"title": "보통약관 제17조(보험계약의 성립)", "text": "① 계약은 계약자의 청약과 회사의 승낙으로 이루어집니다.\n② 회사는 피보험자가 계약에 적합하지 않은 경우에는 승낙을 거절하거나 별도의 조건(보험가입금액 제한, 일부보장\n제외, 보험금 삭감, 보험료 할증 등)을 붙여 승낙할 수 있습니다.\n③ 회사는 계약의 청약을 받고, 제1회 보험료를 받은 경우에 건강진단을 받지 않는 계약은 청약일, 진단계약은 진단\n일(재진단의 경우에는 최종 진단일)부터 30일 이내에 승낙 또는 거절하여야 하며, 승낙한 때에는 보험증권을 드\n립니다. 그러나 30일 이내에 승낙 또는 거절의 통지가 없으면 승낙된 것으로 봅니다.\n④ 회사가 제1회 보험료를 받고 승낙을 거절한 경우에는 거절통지와 함께 받은 금액을 계약자에게 돌려 드리며, 보험\n료를 받은 기간에 대하여 ‘보험개발원이 공시하는 월평균 정기예금이율 + 1%’를 연단위 복리로 계산한 금액을\n더하여 지급합니다. 다만, 회사는 계약자가 제1회 보험료를 신용카드로 납입한 계약의 승낙을 거절하는 경우에는\n신용카드의 매출을 취소하며 이자를 더하여 지급하지 않습니다."}, {"title": "보통약관 제18조(청약의 철회)", "text": "① 계약자는 보험증권을 받은 날부터 15일 이내에 그 청약을 철회할 수 있습니다. 다만, 회사가 건강상태 진단을 지\n원하는 계약, 보험기간이 90일 이내인 계약 또는 전문금융소비자가 체결한 계약은 청약을 철회할 수 없습니다.\n【전문금융소비자】보험계약에 관한 전문성, 자산규모 등에 비추어 보험계약에 따른 위험감수능력이 있는 자로\n서, 국가, 지방자치단체, 한국은행, 금융회사, 주권상장법인 등을 포함하며 「금융소비자 보호에 관한 법률」\n제2조(정의) 제9호에서 정하는 전문금융소비자를 말합니다.\n\n【일반금융소비자】전문금융소비자가 아닌 계약자를 말합니다.\n② 제1항에도 불구하고 청약한 날부터 30일이 초과된 계약은 청약을 철회할 수 없습니다.\n③ 청약철회는 계약자가 전화로 신청하거나, 철회의사를 표시하기 위한 서면, 전자우편, 휴대전화 문자메시지 또는\n이에 준하는 전자적 의사표시(이하 ‘서면 등’이라 합니다)를 발송한 때 효력이 발생합니다. 계약자는 서면 등을\n발송한 때에 그 발송 사실을 회사에 지체없이 알려야 합니다.\n④ 계약자가 청약을 철회한 때에는 회사는 청약의 철회를 접수한 날부터 3영업일 이내에 납입한 보험료를 계약자\n\n14 한화글로벌안심보험\n에게 돌려드리며, 보험료 반환이 늦어진 기간에 대하여는 ‘보험개발원이 공시하는 보험계약대출이율’을 연단위 복\n리로 계산한 금액을 더하여 지급합니다. 다만, 계약자가 제1회 보험료 등을 신용카드로 납입한 계약의 청약을 철\n회하는 경우에 회사는 청약의 철회를 접수한 날부터 3영업일 이내에 해당 신용카드회사로 하여금 대금청구를 하\n지 않도록 해야 하며, 이 경우 회사는 보험료를 반환한 것으로 봅니다.\n⑤ 청약을 철회할 때에 이미 보험금 지급사유가 발생하였으나 계약자가 그 보험금 지급사유가 발생한 사실을 알\n지 못한 경우에는 청약철회의 효력은 발생하지 않습니다.\n⑥ 제1항에서 보험증권을 받은 날에 대한 다툼이 발생한 경우 회사가 이를 증명하여야 합니다."}, {"title": "보통약관 제19조(약관교부 및 설명의무 등)", "text": "① 회사는 계약자가 청약할 때에 계약자에게 약관의 중요한 내용을 설명하여야 하며, 청약 후에 다음 각 호의 방법\n중 계약자가 원하는 방법을 확인하여 지체 없이 약관 및 계약자 보관용 청약서를 제공하여 드립니다. 만약, 회사\n가 전자우편 및 전자적 의사표시로 제공한 경우 계약자 또는 그 대리인이 약관 및 계약자 보관용 청약서 등을 수\n신하였을 때에는 해당 문서를 드린 것으로 봅니다.\n1. 서면교부\n2. 우편 또는 전자우편\n3. 휴대전화 문자메시지 또는 이에 준하는 전자적 의사표시\n② 제1항과 관련하여 통신판매계약의 경우, 회사는 계약자가 가입한 특약만 포함한 약관을 드리며, 전화를 이용하여\n체결하는 계약은 계약자의 동의를 얻어 다음의 방법으로 약관의 중요한 내용을 설명할 수 있습니다.\n1. 전화를 이용하여 청약내용, 보험료납입, 보험기간, 계약 전 알릴 의무, 약관의 중요한 내용 등 계약을 체결하\n는 데 필요한 사항을 질문 또는 설명하는 방법. 이 경우 계약자의 답변과 확인내용을 음성 녹음함으로써 약\n관의 중요한 내용을 설명한 것으로 봅니다.\n\n【통신판매계약】전화ㆍ우편ㆍ인터넷 등 통신수단을 이용하여 체결하는 계약을 말합니다.\n\n③ 회사가 제1항에 따라 제공될 약관 및 계약자 보관용 청약서를 청약할 때 계약자에게 전달하지 않거나 약관의 중요\n한 내용을 설명하지 않은 때 또는 계약을 체결할 때 계약자가 청약서에 자필서명(날인(도장을 찍음) 및 「전자서명\n법」제2조 제2호에 따른 전자서명을 포함합니다)을 하지 않은 때에는 계약자는 계약이 성립한 날부터 3개월 이내\n에 계약을 취소할 수 있습니다.\n④ 제3항에도 불구하고 전화를 이용하여 계약을 체결하는 경우 다음의 각 호의 어느 하나를 충족하는 때에는 자필서\n명을 생략할 수 있으며, 제2항의 규정에 따른 음성녹음 내용을 문서화한 확인서를 계약자에게 드림으로써 계약자\n보관용 청약서를 전달한 것으로 봅니다.\n1. 계약자, 피보험자 및 보험수익자가 동일한 계약의 경우\n2. 계약자, 피보험자가 동일하고 보험수익자가 계약자의 법정상속인인 계약일 경우\n⑤ 제3항에 따라 계약이 취소된 경우에는 회사는 이미 납입한 보험료를 계약자에게 돌려 드리며, 보험료를 받은 기간\n에 대하여 ‘보험개발원이 공시하는 보험계약대출이율’을 연단위 복리로 계산한 금액을 더하여 지급합니다."}, {"title": "보통약관 제20조(계약의 무효)", "text": "다음 중 한 가지에 해당되는 경우에는 계약을 무효로 하며 이미 납입한 보험료를 돌려드립니다. 다만, 회사의 고\n의 또는 과실로 계약이 무효로 된 경우와 회사가 승낙 전에 무효임을 알았거나 알 수 있었음에도 보험료를 반환\n하지 않은 경우에는 보험료를 납입한 날의 다음날부터 반환일까지의 기간에 대하여 회사는 이 계약의 ‘보험개발원\n이 공시하는 보험계약대출이율’을 연단위 복리로 계산한 금액을 더하여 돌려 드립니다.\n1. 타인의 사망을 보험금 지급사유로 하는 계약에서 계약을 체결할 때까지 피보험자의 서면(「전자서명법」 제2조\n제2호에 따른 전자서명이 있는 경우로서 상법 시행령 제44조의2에 정하는 바에 따라 본인 확인 및 위조·변조\n방지에 대한 신뢰성을 갖춘 전자문서를 포함)에 의한 동의를 얻지 않은 경우. 다만, 단체가 규약에 따라 구성\n원의 전부 또는 일부를 피보험자로 하는 계약을 체결하는 경우에는 이를 적용하지 않습니다. 이 때 단체보험의\n보험수익자를 피보험자 또는 그 상속인이 아닌 자로 지정할 때에는 단체의 규약에서 명시적으로 정한 경우가 아\n니면 이를 적용합니다.\n2. 만15세 미만자, 심신상실자 또는 심신박약자를 피보험자로 하여 사망을 보험금 지급사유로 한 경우\n다만, 심신박약자가 계약을 체결하거나 소속 단체의 규약에 따라 단체보험의 피보험자가 될 때에 의사능력이\n있는 경우에는 계약이 유효합니다.\n\n【심신상실자】\n심신상실자(心神喪失者)라 함은 의식은 있으나 장애의 정도가 심하여 자신의 행위 결과를 합리적으로 판단할\n능력을 갖지 못한 사람을 말합니다.\n\n【심신박약자】\n심신박약자(心神薄弱者)라 함은 심신상실의 상태까지는 이르지 않았으나, 마음이나 정신의 장애로 인하여 사물\n을 변별할 능력이나 의사를 결정할 능력이 미약한 사람을 말합니다.\n3. 계약을 체결할 때 계약에서 정한 피보험자의 나이에 미달되었거나 초과되었을 경우. 다만, 회사가 나이의 착오\n를 발견하였을 때 이미 계약나이에 도달한 경우에는 유효한 계약으로 보나, 제2호의 만15세 미만자에 관한 예\n외가 인정되는 것은 아닙니다."}, {"title": "보통약관 제21조(계약내용의 변경 등)", "text": "① 계약자는 회사의 승낙을 얻어 다음의 사항을 변경할 수 있습니다. 이 경우 승낙을 서면 등으로 알리거나 보험증권\n의 뒷면에 기재하여 드립니다.\n1. 보험종목\n2. 보험기간\n3. 보험료 납입주기, 납입방법 및 납입기간\n4. 계약자, 피보험자 중 일부\n5. 보험가입금액, 보험료 등 기타 계약의 내용\n② 계약자는 보험수익자를 변경할 수 있으며 이 경우에는 회사의 승낙이 필요하지 않습니다. 다만, 변경된 보험수익\n자가 회사에 권리를 대항하기 위해서는 계약자가 보험수익자가 변경되었음을 회사에 통지하여야 합니다.\n【유의사항】\n회사는 계약자가 보험수익자 변경사실을 회사에 알리지 않아 이를 모르고 변경전의 보험수익자에게 보험금을\n지급하는 등 보험금 지급에 관한 항변이 있는 경우 변경된 보험수익자에게 보험금 지급을 거절할 수 있습니다.\n③ 회사는 계약자가 제1회 보험료를 납입한 때부터 1년 이상 지난 유효한 계약으로서 그 보험종목의 변경을 요청할\n때에는 회사의 사업방법서에서 정하는 방법에 따라 이를 변경하여 드립니다.\n④ 회사는 계약자가 제1항 제5호에 따라 보험가입금액을 감액하고자 할 때에는 그 감액된 부분은 해지된 것으로 보\n며, 이로써 회사가 환급하여야 할 보험료가 있을 경우에는 제32조(보험료의 환급)에 따른 보험료를 계약자에게\n지급합니다.\n\n【유의사항】\n보험가입금액, 보험료 등의 감액시 환급금이 없거나 최초가입시 안내한 해약환급금보다 적어질 수 있습니다.\n\n⑤ 계약자가 제2항에 따라 보험수익자를 변경하고자 할 경우에는 보험금 지급사유가 발생하기 전에 피보험자가 서면\n으로 동의하여야 합니다.\n⑥ 회사는 제1항에 따라 계약자를 변경한 경우, 변경된 계약자에게 보험증권 및 약관을 교부하고 변경된 계약자가 요\n청하는 경우 약관의 중요한 내용을 설명하여 드립니다."}, {"title": "보통약관 제22조(보험나이 등)", "text": "① 이 약관에서의 피보험자의 나이는 보험나이를 기준으로 합니다. 다만, 제20조(계약의 무효) 제2호의 경우에는 실\n제 만 나이를 적용합니다.\n② 제1항의 보험나이는 계약일 현재 피보험자의 실제 만 나이를 기준으로 6개월 미만의 끝수는 버리고 6개월 이상의\n끝수는 1년으로 하여 계산하며, 이후 매년 계약 해당일에 나이가 증가하는 것으로 합니다.\n\n【유의사항】\n해당연도의 계약해당일이 없을 경우에는 해당월의 말일을 계약해당일로 합니다.\n\n③ 피보험자의 나이 또는 성별에 관한 기재사항이 사실과 다른 경우에는 정정된 나이 또는 성별에 해당하는 보험금\n및 보험료로 변경합니다.\n\n16 한화글로벌안심보험\n【보험나이 계산 예시】\n생년월일: 1988년 10월 2일, 현재(계약일): 2014년 4월 13일\n⇒ 2014년 4월 13일 - 1988년 10월 2일 = 25년 6월 11일 = 26세\n\n【유의사항】\n청약서 및 보험증권 등 보험계약을 증명하기 위한 문서에서 피보험자의 나이 또는 성별에 관한 기재사항이\n신분증(주민등록증, 운전면허증, 사진이 붙은 정부기관 발행 신분증)에 기재된 사실과 다른 경우에는 정정된\n나이 또는 성별에 해당하는 보험금 및 보험료로 변경합니다. 정정된 나이 또는 성별에 해당하는 보험금 및\n보험료로 변경 시 「보험료 및 해약환급금 산출방법서」에 따라 보험료의 차액을 정산합니다."}, {"title": "보통약관 제23조(계약의 소멸)", "text": "피보험자의 사망으로 인하여 이 약관에서 규정하는 보험금 지급사유가 더 이상 발생할 수 없는 경우에는 이 계약\n은 그 때부터 효력이 없습니다.\n\n제 5 관 보험료의 납입"}, {"title": "보통약관 제24조(제1회 보험료 및 회사의 보장개시)", "text": "① 회사는 계약의 청약을 승낙하고 제1회 보험료를 받은 때부터 이 약관이 정한 바에 따라 보장을 합니다. 또한, 회\n사가 청약과 함께 제1회 보험료를 받은 후 승낙한 경우에도 제1회 보험료를 받은 때부터 보장이 개시됩니다. 자\n동이체 또는 신용카드로 납입하는 경우에는 자동이체신청 또는 신용카드매출승인에 필요한 정보를 제공한 때를\n제1회 보험료를 받은 때로 하며, 계약자의 책임 있는 사유로 자동이체 또는 매출승인이 불가능한 경우에는 보험\n료가 납입되지 않은 것으로 봅니다.\n② 회사가 청약과 함께 제1회 보험료를 받고 청약을 승낙하기 전에 보험금 지급사유가 발생하였을 때에도 보장개시\n일부터 이 약관이 정하는 바에 따라 보장을 합니다.\n【보장개시일】\n회사가 보장을 개시하는 날로서 계약이 성립되고 제1회 보험료를 받은 날을 말하나, 회사가 승낙하기 전이라\n도 청약과 함께 제1회 보험료를 받은 경우에는 제1회 보험료를 받은 날을 말합니다. 또한, 보장개시일을 계약\n일로 봅니다.\n\n③ 회사는 제2항에도 불구하고 다음 중 한 가지에 해당되는 경우에는 보장을 하지 않습니다.\n1. 제13조(계약 전 알릴 의무)에 따라 계약자 또는 피보험자가 회사에 알린 내용이나 건강진단 내용이 보험금\n지급사유의 발생에 영향을 미쳤음을 회사가 증명하는 경우\n2. 제15조(알릴 의무 위반의 효과)를 준용하여 회사가 보장을 하지 않을 수 있는 경우\n3. 진단계약에서 보험금 지급사유가 발생할 때까지 진단을 받지 않은 경우. 다만, 진단계약에서 진단을 받지\n않은 경우라도 상해로 보험금 지급사유가 발생하는 경우에는 보장을 해드립니다.\n④ 계약이 갱신되는 경우에는 제1항 내지 제3항에 의한 보장은 기존 계약에 의한 보장이 종료하는 때부터 적용합니\n다."}, {"title": "보통약관 제25조(제2회 이후 보험료의 납입)", "text": "계약자는 제2회 이후의 보험료를 납입기일까지 납입하여야 하며, 회사는 계약자가 보험료를 납입한 경우에는 영수\n증을 발행하여 드립니다. 다만, 금융회사(우체국을 포함합니다)를 통하여 보험료를 납입한 경우에는 그 금융회사\n발행 증빙서류를 영수증으로 대신합니다.\n\n【납입기일】계약자가 제2회 이후의 보험료를 납입하기로 한 날을 말합니다.\n\n제26조(보험료의 납입이 연체되는 경우 납입최고(독촉)와 계약의 해지)\n\n① 계약자가 제2회 이후의 보험료를 납입기일까지 납입하지 않아 보험료 납입이 연체 중인 경우에 회사는 14일(보험\n기간이 1년 미만인 경우에는 7일) 이상의 기간을 납입최고(독촉)기간(납입최고(독촉)기간의 마지막 날이 영업일이\n아닌 때에는 최고(독촉)기간은 그 다음 날까지로 합니다)으로 정하여 아래 사항에 대하여 서면(등기우편 등), 전화\n(음성녹음) 또는 전자문서 등으로 알려드립니다. 다만, 해지 전에 발생한 보험금 지급사유에 대하여 회사는 보상\n하여 드립니다.\n1. 계약자(보험수익자와 계약자가 다른 경우 보험수익자를 포함합니다)에게 납입최고(독촉)기간 내에 연체보험\n료를 납입하여야 한다는 내용\n2. 납입최고(독촉)기간이 끝나는 날까지 보험료를 납입하지 않을 경우 납입최고(독촉)기간이 끝나는 날의 다음\n날에 계약이 해지된다는 내용\n\n【납입최고】약정된 기일까지 보험료가 납입되지 않을 경우, 회사가 계약자에게 납입을 재촉하는 일\n\n② 회사가 제1항에 따른 납입최고(독촉) 등을 전자문서로 안내하고자 할 경우에는 계약자에게 서면, 「전자서명법」제\n2조 제2호에 따른 전자서명으로 동의를 얻어 수신확인을 조건으로 전자문서를 송신하여야 하며, 계약자가 전자문\n서에 대하여 수신을 확인하기 전까지는 그 전자문서는 송신되지 않은 것으로 봅니다. 회사는 전자문서가 수신되\n지 않은 것을 확인한 경우에는 제1항에서 정한 내용을 서면(등기우편 등) 또는 전화(음성녹음)로 다시 알려 드립\n니다.\n③ 제1항에 따라 계약이 해지되고 이로 인하여 회사가 환급하여야 할 보험료가 있을 때에는 제32조(보험료의 환급)\n에 따른 보험료를 계약자에게 지급합니다.\n\n제27조(보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))\n① 제26조(보험료의 납입이 연체되는 경우 납입최고(독촉)와 계약의 해지)에 따라 계약이 해지되었으나 제32조(보험\n료의 환급)에 따른 환급금을 받지 않은 경우 계약자는 해지된 날부터 3년 이내에 회사가 정한 절차에 따라 계약\n의 부활(효력회복)을 청약할 수 있습니다. 회사가 부활(효력회복)을 승낙한 때에 계약자는 부활(효력회복)을 청약\n한 날까지의 연체된 보험료에 ‘보험개발원이 공시하는 월평균 정기예금이율 + 1%’ 범위내에서 각 상품별로 회사\n가 정하는 이율로 계산한 금액을 더하여 납입하여야 합니다.\n② 제1항에 따라 해지계약을 부활(효력회복)하는 경우에는 제13조(계약 전 알릴의무), 제15조(알릴 의무 위반의 효\n과), 제16조(사기에 의한 계약), 제17조(보험계약의 성립) 및 제24조(제1회 보험료 및 회사의 보장개시)를 준용합\n니다. 이 (이하 생략)"}, {"title": "보통약관 제29조(계약자의 임의해지 및 피보험자의 서면동의 철회)", "text": "① 계약자는 계약이 소멸하기 전에 언제든지 계약을 해지할 수 있으며, 이 경우 회사가 환급하여야 할 보험료가 있을\n경우에는 제32조(보험료의 환급)에 따른 보험료를 계약자에게 지급합니다.\n② 제20조(계약의 무효)에 따라 사망을 보험금 지급사유로 하는 계약에서 서면으로 동의를 한 피보험자는 계약의 효\n력이 유지되는 기간에는 언제든지 서면동의를 장래를 향하여 철회할 수 있으며, 서면동의 철회로 계약이 해지되\n어 회사가 환급하여야 할 보험료가 있을 때에는 제32조(보험료의 환급) 에 따른 보험료를 계약자에게 지급합니\n다.\n③ 보험금 지급사유 발생으로 회사가 보험금을 지급한 때에도 보험가입금액이 감액되지 않은 경우에는 계약자는 그\n보험금 지급사유 발생 후에도 계약을 해지할 수 있습니다."}, {"title": "보통약관 제29조의2(위법계약의 해지)", "text": "① 계약자는 ｢금융소비자 보호에 관한 법률｣ 제47조 및 관련규정이 정하는 바에 따라 계약체결에 대한 회사의 법위\n반사항이 있는 경우 계약체결일부터 5년 이내의 범위에서 계약자가 위반사항을 안 날부터 1년 이내에 계약해지요\n구서에 증빙서류를 첨부하여 위법계약의 해지를 요구할 수 있습니다.\n② 회사는 해지요구를 받은 날부터 10일 이내에 수락여부를 계약자에 통지하여야 하며, 거절할 때에는 거절 사유를\n함께 통지하여야 합니다.\n③ 계약자는 회사가 정당한 사유 없이 제1항의 요구를 따르지 않는 경우 해당 계약을 해지할 수 있습니다.\n④ 제1항 및 제3항에 따라 계약이 해지된 경우 회사는 제32조(보험료의 환급) 제1항제1호에 따른 해약환급금을 계약\n자에게 지급합니다.\n⑤ 계약자는 제1항에 따른 제척기간에도 불구하고 민법 등 관계 법령에서 정하는 바에 따라 법률상의 권리를 행사할\n수 있습니다."}, {"title": "보통약관 제30조(중대사유로 인한 해지)", "text": "① 회사는 아래와 같은 사실이 있을 경우에는 안 날부터 1개월 이내에 계약을 해지할 수 있습니다.\n1. 계약자, 피보험자 또는 보험수익자가 보험금을 지급받을 목적으로 고의로 보험금 지급사유를 발생시킨 경우\n2. 계약자, 피보험자 또는 보험수익자가 보험금 청구에 관한 서류에 고의로 사실과 다른 것을 기재하였거나 그\n서류 또는 증거를 위조 또는 변조한 경우. 다만, 이미 보험금 지급사유가 발생한 경우에는 보험금 지급에\n영향을 미치지 않습니다.\n【유의사항】\n계약자, 피보험자 또는 보험수익자가 보험금 청구에 관한 서류를 변조하여 보험금을 청구한 경우 회사는 그 사\n실을 안 날부터 1개월 이내에 계약을 해지할 수 있습니다.\n다만, 이 경우에도 회사는 이미 발생한 보험금 지급사유에 대해서는 보험금을 지급합니다.\n② 회사가 제1항에 따라 계약을 해지한 경우 회사는 그 취지를 계약자에게 통지하고, 해지시 회사가 환급하여야 할\n보험료가 있을 경우에는 제32조(보험료의 환급)에 따른 보험료를 계약자에게 지급합니다."}, {"title": "보통약관 제31조(회사의 파산선고와 해지)", "text": "① 회사가 파산의 선고를 받은 때에는 계약자는 계약을 해지할 수 있습니다.\n\n② 제1항의 규정에 따라 해지하지 않은 계약은 파산선고 후 3월이 지난 때에는 그 효력을 잃습니다.\n③ 제1항의 규정에 따라 계약이 해지되거나 제2항의 규정에 따라 계약이 효력을 잃는 경우에 회사는 제32조(보험료\n의 환급)에 따른 보험료를 계약자에게 지급합니다."}, {"title": "보통약관 제32조(보험료의 환급)", "text": "① 이 계약이 무효, 효력상실, 해지 또는 소멸된 때에는 다음과 같이 보험료를 돌려드립니다.\n1. 계약자, 피보험자 또는 보험수익자의 책임없는 사유에 의하는 경우 : 무효의 경우에는 회사에 납입한 보험\n료의 전액, 효력상실, 해지 또는 소멸의 경우에는 경과하지 않은 기간에 대하여 일단위로 계산한 보험료\n2. 계약자, 피보험자 또는 보험수익자의 책임있는 사유에 의하는 경우 : 이미 경과한 기간에 대하여 단기요율\n(1년미만의 기간에 적용되는 요율)로 계산한 보험료를 뺀 잔액. 다만, 계약자, 피보험자 또는 보험수익자의\n고의 또는 중대한 과실로 무효가 된 때에는 보험료를 돌려드리지 않습니다.\n② 보험기간이 1년을 초과하는 계약이 무효 또는 해지의 경우에는 무효의 원인이 생긴 날 또는 해지일이 속하는 날에\n해당하는 보험년도의 보험료는 제1항의 규정을 적용하고 그 이후의 보험년도에 속하는 보험료는 전액을 돌려드립\n니다.\n③ 계약의 무효, 효력상실, 해지 또는 소멸로 인하여 회사가 환급하여야 할 보험료가 있을 때에는 계약자는 환급금을\n청구하여야 하며, 회사는 청구일의 다음 날부터 지급일까지의 기간에 대하여 ‘보험개발원이 공시하는 보험계약대\n출이율’을 연단위 복리로 계산한 금액을 더하여 지급합니다.\n\n제7관 분쟁의 조정 등"}, {"title": "보통약관 제33조(분쟁의 조정)", "text": "① 계약에 관하여 분쟁이 있는 경우 분쟁 당사자 또는 기타 이해관계인과 회사는 금융감독원장에게 조정을 신청할\n수 있으며, 분쟁조정 과정에서 계약자는 관계 법령이 정하는 바에 따라 회사가 기록 및 유지･관리하는 자료의 열\n람(사본의 제공 또는 청취를 포함한다)을 요구할 수 있습니다.\n② 회사는 일반금융소비자인 계약자가 조정을 통하여 주장하는 권리나 이익의 가액이 ｢금융소비자 보호에 관한 법률\n｣ 제42조에서 정하는 일정 금액 이내인 분쟁사건에 대하여 조정절차가 개시된 경우에는 관계 법령이 정하는 경우\n를 제외하고는 소를 제기하지 않습니다."}, {"title": "보통약관 제34조(관할법원)", "text": "이 계약에 관한 소송 및 민사조정은 계약자의 주소지를 관할하는 법원으로 합니다. 다만, 회사와 계약자가 합의하\n여 관할법원을 달리 정할 수 있습니다."}, {"title": "보통약관 제35조(소멸시효)", "text": "보험금청구권, 보험료 또는 환급금 반환청구권은 3년간 행사하지 않으면 소멸시효가 완성됩니다.\n\n【소멸시효】 주어진 권리를 행사하지 않을 때 그 권리가 없어지게 되는 기간으로 보험금 지급사유가 발생한 후\n3년간 보험금을 청구하지 않는 경우 보험금을 지급받지 못할 수 있습니다.(이하 같습니다.)"}, {"title": "보통약관 제36조(약관의 해석)", "text": "① 회사는 신의성실의 원칙에 따라 공정하게 약관을 해석하여야 하며 계약자에 따라 다르게 해석하지 않습니다.\n② 회사는 약관의 뜻이 명백하지 않은 경우에는 계약자에게 유리하게 해석합니다.\n③ 회사는 보험금을 지급하지 않는 사유 등 계약자나 피보험자에게 불리하거나 부담을 주는 내용은 확대하여 해석하\n지 않습니다."}, {"title": "보통약관 제37조(설명서 교부 및 보험안내자료 등의 효력)", "text": "① 회사는 일반금융소비자에게 청약을 권유하거나 일반금융소비자가 설명을 요청하는 경우 보험상품에 관한 중요한\n사항을 계약자가 이해할 수 있도록 설명하고 계약자가 이해하였음을 서명(「전자서명법」 제2조 제2호에 따른 전\n\n20 한화글로벌안심보험\n자서명을 포함), 기명날인 또는 녹취 등을 통해 확인받아야 하며, 설명서를 제공하여야 합니다.\n② 설명서, 약관, 계약자 보관용 청약서 및 보험증권의 제공 사실에 관하여 계약자와 회사간에 다툼이 있는 경우에는\n회사가 이를 증명하여야 합니다.\n③ 보험설계사 등이 모집과정에서 사용한 회사 제작의 보험안내자료(계약의 청약을 권유하기 위해 만든 자료 등을 말\n합니다)의 내용이 약관의 내용과 다른 경우에는 계약자에게 유리한 내용으로 계약이 성립된 것으로 봅니다."}, {"title": "보통약관 제38조(회사의 손해배상책임)", "text": "① 회사는 계약과 관련하여 임직원, 보험설계사 및 대리점의 책임있는 사유로 계약자, 피보험자 및 보험수익자에게\n발생된 손해에 대하여 관계 법령 등에 따라 손해배상의 책임을 집니다.\n② 회사는 보험금 지급 거절 및 지연지급의 사유가 없음을 알았거나 알 수 있었는데도 소를 제기하여 계약자, 피보험\n자 또는 보험수익자에게 손해를 가한 경우에는 그에 따른 손해를 배상할 책임을 집니다.\n③ 회사가 보험금 지급여부 및 지급금액에 관하여 현저하게 공정을 잃은 합의로 보험수익자에게 손해를 가한 경우에\n도 회사는 제2항에 따라 손해를 배상할 책임을 집니다.\n\n【현저하게 공정을 잃은 합의】\n회사가 보험수익자의 경제적, 신체적, 정신적인 어려움, 경솔함, 경험 부족 등을 이용하여 동일, 유사 사례에 비\n추어 보험수익자에게 매우 불합리하게 합의를 하는 것을 의미합니다."}, {"title": "보통약관 제39조(개인정보보호)", "text": "① 회사는 이 계약과 관련된 개인정보를 이 계약의 체결, 유지, 보험금 지급 등을 위하여 「개인정보 보호법」,「신용정\n보의 이용 및 보호에 관한 법률」등 관계 법령에 정한 경우를 제외하고 계약자, 피보험자 또는 보험수익자의 동의\n없이 수집, 이용, 조회 또는 제공하지 않습니다. 다만, 회사는 이 계약의 체결, 유지, 보험금 지급 등을 위하여 위\n관계 법령에 따라 계약자 및 피보험자의 동의를 받아 다른 보험회사 및 보험관련단체 등에 개인정보를 제공할 수\n있습니다.\n② 회사는 계약과 관련된 개인정보를 안전하게 관리하여야 합니다."}, {"title": "보통약관 제40조(준거법)", "text": "이 계약은 대한민국 법에 따라 규율되고 해석되며, 약관에서 정하지 않은 사항은 ｢금융소비자 보호에 관한 법률｣,\n상법, 민법 등 관계 법령을 따릅니다"}, {"title": "보통약관 제41조(예금보험에 의한 지급보장)", "text": "회사가 파산 등으로 인하여 보험금 등을 지급하지 못할 경우에는 예금자보호법에서 정하는 바에 따라 그 지급을\n보장합니다.\n【예금자보호제도】예금자보호제도란 예금보험공사가 평소에 금융기관으로 부터 보험료를 받아 기금을 적립한 후,\n금융기관이 영업정지나 파산 등으로 예금을 지급할 수 없게 되면 금융기관을 대신하여 예금을 지급하는 제도를\n말합니다. 이 보험계약은 예금자보호법에 따라 예금보험공사가 보호합니다.(단, 보험계약자 및 보험료납부자가\n법인인 보험계약은 제외)\n예금자보호 한도는 본 보험회사에 있는 모든 예금보호 대상 금융상품의 보험금 또는 환급금 등을 합하여 1인당\n최고 5천만원이며, 5천만원을 초과하는 나머지 금액은 보호하지 않습니다.(이하 같습니다.)"}, {"title": "해외체류중 질병사망 및 질병80%이상고도후유장해 특별약관 제1조(보험금의 지급사유)", "text": "① 회사는 피보험자가 보통약관 제3조(보험금의 지급사유)의 여행 도중에 다음 사항 중 어느 한 가지의 경우에 해당\n되는 사유가 발생한 때에는 보험수익자에게 약정한 보험금을 지급합니다.\n1. 보험기간 중에 질병으로 인하여 사망한 경우 : 사망보험금(보험증권에 기재된 이 특약의 보험가입금액)\n2. 보험기간 중에 진단확정된 질병의 직접결과로써 신체(의수, 의족, 의안, 의치 등 신체보조장구는 제외하나,\n인공장기나 부분 의치 등 신체에 이식되어 그 기능을 대신할 경우는 포함합니다.)의 일부를 잃었거나 그 기\n능이 영구히 상실(이하 “후유장해”라 합니다.)되어 장해분류표(【별표1】참조. 이하 같습니다)에서 정한 장해\n지급률이 80%이상에 해당하는 장해상태가 되었을 때 : 고도후유장해보험금(보험증권에 기재된 이 특약의\n보험가입금액)\n② 여행도중에 발생한 질병을 직접원인으로 하여 보험기간 마지막날로부터 30일 이내에 사망하거나 또는 80% 이상\n후유장해가 남았을 경우에도 동일하게 보상하여 드립니다"}, {"title": "해외체류중 질병사망 및 질병80%이상고도후유장해 특별약관 제2조(보험금 지급에 관한 세부규정)", "text": "① 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료 결정에 관한 법률」에 따른 연명의료중단등결정 및 그\n이행으로 피보험자가 사망하는 경우 연명의료중단등결정 및 그 이행은 제1조(보험금의 지급사유) 제1호 ‘사망’의\n원인 및 ‘사망보험금’ 지급에 영향을 미치지 않습니다.\n② 제1조(보험금의 지급사유)에서 장해지급률이 질병의 진단 확정일부터 180일 이내에 확정되지 않는 경우에는 질병\n의 진단확정일부터 180일이 되는 날의 의사 진단에 기초하여 고정될 것으로 인정되는 상태를 장해지급률로 결정\n합니다. 다만, 장해분류표(【별표1】참조)에 장해판정시기를 별도로 정한 경우에는 그에 따릅니다.\n③ 제1항에 따라 장해지급률이 결정되었으나 그 이후 보장받을 수 있는 기간(계약의 효력이 없어진 경우에는 보험기\n간이 10년 이상인 계약은 질병의 진단확정일부터 2년 이내로 하고, 보험기간이 10년 미만인 계약은 질병의 진단\n확정일부터 1년 이내)에 장해상태가 더 악화된 때에는 그 악화된 장해상태를 기준으로 장해지급률을 결정합니다.\n④ 장해분류표에 해당되지 않는 후유장해는 피보험자의 직업, 연령, 신분 또는 성별 등에 관계없이 신체의 장해정도\n에 따라 장해분류표의 구분에 준하여 지급액을 결정합니다. 다만, 장해분류표의 각 장해분류별 최저 지급률 장해\n정도에 이르지 않는 후유장해에 대하여는 후유장해보험금을 지급하지 않습니다.\n⑤ 보험수익자와 회사가 제1조(보험금의 지급사유)의 보험금 지급사유에 대해 합의하지 못할 때는 보험수익자와 회사\n가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병\n원 소속 전문의 중에 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n⑥ 같은 질병으로 두 가지 이상의 후유장해가 생긴 경우에는 후유장해 지급률을 합산하여 지급합니다. 다만, 장해분\n류표의 각 신체부위별 판정기준에 별도로 정한 경우에는 그 기준에 따릅니다.\n⑦ 다른 질병으로 인하여 후유장해가 2회 이상 발생하였을 경우에는 그 때마다 이에 해당하는 후유장해지급률을 결\n정합니다. 그러나 그 후유장해가 이미 후유장해보험금을 지급받은 동일한 부위에 가중된 때에는 최종 장해상태에\n해당하는 후유장해보험금에서 이미 지급받은 후유장해보험금을 차감하여 지급합니다. 다만, 장해분류표의 각 신체\n부위별 판정기준에서 별도로 정한 경우에는 그 기준에 따릅니다.\n⑧ 이미 이 계약에서 후유장해보험금 지급사유에 해당되지 않았거나(보장개시 이전의 원인에 의하거나 또는 그 이전\n에 발생한 후유장해를 포함합니다), 후유장해보험금이 지급되지 않았던 피보험자에게 그 신체의 동일 부위에 또다\n시 제7항에 규정하는 후유장해상태가 발생하였을 경우에는 직전까지의 후유장해에 대한 후유장해보험금이 지급된\n것으로 보고 최종 후유장해 상태에 해당되는 후유장해보험금에서 이를 차감하여 지급합니다.\n⑨ 회사가 지급하여야 할 하나의 진단확정된 질병으로 인한 후유장해보험금은 보험가입금액을 한도로 합니다."}, {"title": "해외체류중 질병사망 및 질병80%이상고도후유장해 특별약관 제3조(준용규정)", "text": "22 한화글로벌안심보험\n【질병】\n신체의 전신이나 일부분에 이상이 생겨 정상적 활동이 이루어지지 못하는 현상으로 급격하고 우연한 외래의\n사고로 신체에 입은 상해는 제외합니다."}, {"title": "해외체류중 배상책임 특별약관 제1조(보상하는 손해)", "text": "회사는 피보험자가 보통약관 제3조(보험금의 지급사유)의 해외체류 도중에 생긴 우연한 사고(이하「사고」라 합니\n다)로 타인의 신체의 장해(상해․질병, 그로 인한 사망․후유장해를 말합니다) 또는 재물의 손해(재물의 없어짐, 손상\n및 망가짐을 말합니다)에 대한 법률적인 손해배상책임을 부담함으로써 입은 아래의 손해를 이 특별약관에 따라 보\n상하여 드립니다.\n① 피보험자가 피해자에게 지급한 법률상 손해배상금\n② 피보험자가 지출한 아래의 비용\n1. 피보험자가 제6조(손해방지의무) 제1항 제1호의 방법을 조사하여 구하기 위하여 지급한 필요 또는 유익하였\n던 비용.\n2. 피보험자가 제6조(손해방지의무) 제1항 제2호의 절차를 취하는 데 지급한 필요 또는 유익하였던 비용\n\n【유의사항】\n제3자로부터 손해의 배상을 받을 수 있는 경우에 피보험자가 손해배상청구를 위해 내용증명, 재산조사, 강\n제집행 등을 수행하고자 지출한 각종 비용을 의미합니다.\n3. 피보험자가 지급한 소송비용, 변호사 비용, 중재, 화해 또는 조정에 관한 비용\n4. 증권상 보상한도액내의 금액에 대한 공탁보증보험료. 그러나 그러한 보증을 제공할 책임은 부담하지 아니합\n니다.\n<용어풀이>\n◉ 공탁보증보험료\n가압류, 가집행, 가처분 신청 등 각종 민사사건을 신청할 때, 잘못된 신청으로 인해 발생하는 피신청인의\n손해를 법적으로 보상해 주기 위해 법원에 납부하는 공탁금을 대신하는 보험상품의 보험료\n5. 피보험자가 제7조(손해배상청구에 대한 회사의 해결) 제2항 및 제3항의 회사에 요구에 따르기 위하여 지급\n한 비용"}, {"title": "해외체류중 배상책임 특별약관 제2조(보상하지 아니하는 손해)", "text": "회사는 보통약관 제5조(보험금을 지급하지 않는 사유)의 제1항 제5호 및 아래의 손해배상책임을 부담하게 됨으로\n써 입은 손해는 보상하여 드리지 아니합니다.\n1. 피보험자의 직무수행을 직접적인 원인으로 하는 배상책임\n2. 피보험자의 직무용으로만 사용되는 동산의 소유, 사용 또는 관리로 인한 배상책임\n3. 피보험자가 소유, 사용 또는 관리하는 부동산으로 인한 배상책임\n4. 피보험자의 근로자가 피보험자의 업무에 종사중에 입은 신체의 장해로 인한 배상책임. 다만, 피보험자의 가사\n사용인에 대하여는 보상하여 드립니다.\n5. 피보험자와 타인간에 손해배상에 관한 약정이 있는 경우, 그 약정에 의하여 가중된 배상책임\n6. 피보험자와 세대를 같이하는 친족(민법 제777조 규정의 범위와 같습니다) 및 해외체류을 같이하는 친족에 대\n한 배상책임\n7. 피보험자가 소유, 사용 또는 관리하는 재물이 손해를 입었을 경우에 그 재물에 대하여 정당한 권리를 가진 사\n람에게 부담하는 손해에 대한 배상책임. 다만, 호텔의 객실이나 객실내의 동산에 끼치는 손해에 대하여는 보상\n하여 드립니다.\n8. 피보험자의 심신상실로 인한 배상책임\n9. 피보험자 또는 피보험자의 지시에 따른 폭행 또는 구타로 인한 배상책임\n10.항공기, 선박, 차량(원동력이 인력에 의한 것은 제외합니다). 총기(공기총은 제외합니다)의 소유, 사용 또는 관\n\n리로 인한 배상책임"}, {"title": "해외체류중 배상책임 특별약관 제3조(보험금 등의 지급한도)", "text": "① 회사는 1회의 보험사고에 대하여 다음과 같이 보상합니다. 이 경우 보험가입금액(보상한도액)과 자기부담금은 각\n각 보험증권에 기재된 금액을 말합니다.\n1. 제1조(보상하는 손해) 제1항의 손해배상금: 보험가입금액(보상한도액)을 한도로 보상하되, 자기부담금이 약\n정된 경우에는 그 자기부담금을 초과한 부분만 보상합니다.\n2. 제1조(보상하는 손해) 제2항 ‘1’호, ‘2’호 또는 ‘5’호의 비용: 비용의 전액을 보상합니다.\n3. 제1조(보상하는 손해) 제2항 ‘3’호 또는 ‘4’호의 비용: 이 비용과 제1항에 의한 보상액의 합계약을 보험가\n입금액(보상한도액)의 한도내에서 보상합니다.\n② 회사가 제1항에 의하여 보상을 한 경우에는 보험가입금액(보상한도액)에서 그 보상액을 뺀 잔액을 나머지 보험기\n간에 대한 보험가입금액(보상한도액)으로 합니다."}, {"title": "해외체류중 배상책임 특별약관 제4조(타인을 위한 계약)", "text": "① 계약자는 타인을 위한 계약을 체결하는 경우에 그 타인의 위임이 없는 때에는 반드시 이를 회사에 알려야 하며,\n이를 알리지 않았을 때에는 그 타인은 이 계약이 체결된 사실을 알지 못하였다는 사유로 회사에 이의를 제기할\n수 없습니다.\n② 타인을 위한 계약에서 보험사고가 발생한 경우에 계약자가 그 타인에게 보험사고의 발생으로 생긴 손해를 배상한\n때에는 계약자는 그 타인의 권리를 해하지 아니하는 범위 안에서 회사에 보험금의 지급을 청구할 수 있습니다."}, {"title": "해외체류중 배상책임 특별약관 제5조(손해의 발생과 통지)", "text": "① 계약자 또는 피보험자는 아래와 같은 사실이 있는 경우에는 지체 없이 그 내용을 서면으로 회사에 알려야 합니다.\n1. 사고가 발생하였을 경우 사고가 발생한 때와 곳, 피해자의 주소와 성명, 사고상황 및 이들 사항의 증인이\n있을 경우 그 주소와 성명\n2. 피해자로부터 손해배상청구를 받았을 경우\n3. 피해자로부터 손해배상책임에 관한 소송을 제기받았을 경우\n② 계약자 또는 피보험자가 제1항 각호의 통지를 게을리하여 손해가 증가된 때에는 회사는 그 증가된 손해를 보상하\n여 드리지 아니하며, 제1항 제3호의 통지를 게을리 한 때에는 소송비용과 변호사비용도 보상하여 드리지 아니합\n니다."}, {"title": "해외체류중 배상책임 특별약관 제6조(손해방지의무)", "text": "① 보험사고가 생긴 때에는 계약자 또는 피보험자는 아래의 사항을 이행하여야 합니다.\n1. 손해의 방지 또는 경감을 위하여 노력하는 일(피해자에 대한 응급처치, 긴급호송 또는 그 밖의 긴급조치를\n포함합니다)\n2. 제3자로부터 손해의 배상을 받을 수 있는 경우에는 그 권리를 지키거나 행사하기 위한 필요한 조치를 취하\n는 일\n3. 손해배상책임의 전부 또는 일부에 관하여 지급(변제), 승인 또는 화해를 하거나 소송, 중재 또는 조정을 제\n기하거나 신청하고자 할 경우에는 미리 회사의 동의를 받는 일\n② 계약자 또는 피보험자가 정당한 이유 없이 제1항의 의무를 이행하지 아니하였을 때에는 제1조(보상하는 손해)에\n의한 손해에서 다음의 금액을 뺍니다.\n1. 제1항 제1호의 경우에는 그 노력을 하였더라면 손해를 방지 또는 경감할 수 있었던 금액\n2. 제1항 제2호의 경우에는 제3자로부터 손해의 배상을 받을 수 있었던 금액\n3. 제1항 제3호의 경우에는 소송비용(중재 또는 조정에 관한 비용 포함) 및 변호사비용과 회사의 동의를 받지\n아니한 행위에 의하여 증가된 손해"}, {"title": "해외체류중 배상책임 특별약관 제7조(손해배상청구에 대한 회사의 해결)", "text": "① 피보험자가 피해자에게 손해배상책임을 지는 사고가 생긴 때에는 피해자는 이 특별약관에 의하여 회사가 피보험\n자에게 지급책임을 지는 금액한도내에서 회사에 대하여 보험금의 지급을 직접 청구할 수 있습니다. 그러나 회사\n는 피보험자가 그 사고에 관하여 가지는 항변으로써 피해자에게 대항할 수 있습니다.\n\n24 한화글로벌안심보험\n② 회사가 제1항의 청구를 받았을 때에는 지체없이 피보험자에게 통지하여야 하며, 회사의 요구가 있으면 계약자 또\n는 피보험자는 필요한 서류증거의 제출, 증언 또는 증인출석에 협조하여야 합니다.\n③ 피보험자가 피해자로부터 손해배상의 청구를 받았을 경우에 회사가 필요하다고 인정할 때에는 피보험자를 대신하\n여 회사의 비용으로 이를 해결할 수 있습니다. 이 경우에 회사의 요구가 있으면 계약자 및 피보험자는 이에 협력\n하여야 합니다.\n④ 계약자 및 피보험자가 정당한 이유없이 제2항, 제3항의 요구에 협조하지 아니할 때에는 회사는 그로 인하여 늘어\n난 손해는 보상하여 드리지 아니합니다."}, {"title": "해외체류중 배상책임 특별약관 제8조(보험금의 지급)", "text": "① 피보험자가 보험금을 청구할 때에는 다음의 서류를 회사에 제출하여야 합니다.\n1. 보험금 청구서\n2. 신분증(주민등록증 또는 운전면허증 등 사진이 부착된 정부기관발행 신분증, 본인이 아닌 경우에는 본인의\n인감증명서 또는 본인서명사실확인서 포함)\n3. 손해배상금 및 그 밖의 비용을 지급하였음을 증명하는 서류\n4. 회사가 요구하는 그 밖의 서류\n② 회사는 제1항에 따른 보험금 청구를 받은 후 지체없이 지급할 보험금을 결정하고 지급할 보험금이 결정되면 7일\n이내에 이를 지급하여 드립니다. 그러나 지급할 보험금이 결정되기 전이라도 피보험자의 청구가 있을 때에는 회\n사가 추정한 보험금의 50% 상당액을 가지급보험금으로 지급합니다.\n③ 회사는 제2항의 지급보험금이 결정된 후 7일(이하 ‘지급기일’이라 합니다)이 지나도록 보험금을 지급하지 않았을\n때에는 지급기일의 다음날부터 지급일까지의 기간에 대하여 [부표] ‘보험금을 지급할 때의 적립이율’에 따라 연단\n위 복리로 계산한 금액을 보험금에 더하여 지급합니다. 그러나 피보험자의 책임있는 사유로 지체된 경우에는 그\n러하지 않습니다. 다만, 회사는 피보험자 등이 분쟁조정을 신청했다는 사유만으로 이자지급을 거절하지 않습니다.\n\n[부표] 보험금을 지급할 때의 적립이율\n기 간 지 급 이 자\n지급기일의 다음 날부터 30일 이내 기간 보험계약대출이율\n지급기일의 31일이후부터 60일이내 기간 보험계약대출이율 + 가산이율(4.0%)\n지급기일의 61일이후부터 90일이내 기간 보험계약대출이율 + 가산이율(6.0%)\n지급기일의 91일이후 기간 보험계약대출이율 + 가산이율(8.0%)\n주) 보험계약대출이율은 보험개발원이 공시하는 보험계약대출이율을 적용합니다."}, {"title": "해외체류중 배상책임 특별약관 제9조(보험금의 분담)", "text": "① 이 계약에서 보장하는 위험과 같은 위험을 보장하는 다른 계약(공제계약(각종 공제회에 가입되어 있는 계약)을 포\n함합니다)이 있을 경우 각 계약에 대하여 다른 계약이 없는 것으로 하여 각각 산출한 보상책임액의 합계액이 손해\n액을 초과할 때에는 회사는 이 계약에 의한 보상책임액의 전기합계액(각각 산출한 보상책임액의 합계액)에 대한\n비율에 따라 손해를 보상합니다. 이 계약과 다른 계약이 모두 의무보험인 경우에도 같습니다.\n\n이 계약의 보상책임액\n손해액 ×\n다른 계약이 없는 것으로 하여 각각 계산한 보상책임액의 합계액\n\n【사 례】\n※ 보상책임액의 합계액이 손해액을 초과하는 경우 :\n계약A: 보상책임액 1,000만원 / 계약B: 보상책임액 1,000만원 / 손해액 : 1,000만원\n→ 계약A보험회사 : 500만원 지급 = 1,000만원 × 1,000만원 / (1,000만원 + 1,000만원)\n→ 계약B보험회사 : 500만원 지급 = 1,000만원 × 1,000만원 / (1,000만원 + 1,000만원)\n② 이 계약이 의무보험이 아니고 다른 의무보험이 있는 경우에는 다른 의무보험에서 보상하는 금액(피보험자가 가입\n을 하지 않은 경우에는 보상될 것으로 추정되는 금액)을 차감한 금액을 손해액으로 간주하여 제1항에 의한 보상\n\n할 금액을 결정합니다.\n③ 피보험자가 다른 계약에 대하여 보험금 청구를 포기한 경우에도 회사의 제1항에 의한 지급보험금 결정에는 영향\n을 미치지 아니합니다."}, {"title": "해외체류중 배상책임 특별약관 제10조(대위권)", "text": "① 회사가 보험금을 지급한 때(현물보상한 경우를 포함합니다)에는 회사는 지급한 보험금의 한도내에서 아래의 권리\n를 가집니다. 다만, 회사가 보상한 금액이 피보험자가 입은 손해의 일부인 경우에는 피보험자의 권리를 침해하지\n아니하는 범위내에서 그 권리를 가집니다.\n1. 피보험자가 제3자로부터 손해배상을 받을 수 있는 경우에는 그 손해배상청구권\n2. 피보험자가 손해배상을 함으로써 대위 취득하는 것이 있을 경우에는 그 대위권\n② 계약자 또는 피보험자는 제1항에 의하여 회사가 취득한 권리를 행사하거나 지키는 것에 관하여 조치를 하여야 하\n며, 또한 회사가 요구하는 증거 및 서류를 제출하여야 합니다.\n③ 회사는 제1항, 제2항에도 불구하고 타인을 위한 보험계약의 경우에는 계약자에 대한 대위권을 포기합니다."}, {"title": "해외체류중 배상책임 특별약관 제11조(합의, 절충, 중재, 소송의 협조 대행 등)", "text": "① 회사는 피보험자의 법률상 손해배상책임을 확정하기 위하여 피보험자가 피해자와 행하는 합의, 절충, 중재 또는\n소송(확인의 소를 포함합니다)에 대하여 협조하거나, 피보험자를 위하여 이러한 절차를 대행할 수 있습니다.\n② 회사는 피보험자에 대하여 보상책임을 지는 한도(동일한 사고로 이미 지급한 보험금이나 가지급보험금이 있는 경\n우에는 그 금액을 공제한 액수를 말하며, 이하 같습니다)내에서 제1항의 절차에 협조하거나 대행합니다.\n③ 회사가 제1항의 절차에 협조하거나 대행하는 경우에는 피보험자는 회사의 요청에 따라 협력해야 하며, 피보험자가\n정당한 이유없이 협력하지 아니하는 경우에는 그로 말미암아 늘어난 손해에 대해서 보상하지 아니합니다.\n④ 회사는 다음의 경우에는 제1항의 절차를 대행하지 아니합니다.\n1. 피보험자가 피해자에 대하여 부담하는 법률상의 손해배상책임액이 보험증권에 기재된 보험가입금액을 명백\n하게 초과하는 때\n2. 피보험자가 정당한 이유없이 협력하지 아니하는 때\n⑤ 회사가 제1항의 절차를 대행하는 경우에는, 피보험자에 대하여 보상책임을 지는 한도 내에서, 가압류나 가집행을\n면하기 위한 공탁금을 피보험자에게 대부할 수 있으며 이에 소요되는 비용을 보상합니다. 이 경우 대부금의 이자\n는 공탁금에 붙여지는 것과 같은 이율로 하며, 피보험자는 공탁금(이자를 포함합니다)의 회수청구권을 회사에 양\n도하여야 합니다."}, {"title": "해외체류중 중대사고 구조송환비용 특별약관 제1조(보험금의 지급사유)", "text": "➀ 회사는 다음 사항 중 어느 한 가지의 경우에 해당되는 사유로 계약자, 피보험자 또는 피보험자의 법정상속인이\n1. 보통약관 제3조(보험금의 지급사유)의 해외체류 도중(이하「해외체류 도중」이라 합니다)에 피보험자가 탑승\n한 항공기 또는 선박이 행방불명 또는 조난된 경우 또는 산악등반 중에 조난된 경우\n2. 해외체류 도중에 급격하고도 우연한 외래의 사고에 따라 긴급수색구조 등이 필요한 상태로 된 것이 경찰\n등의 공공기관에 의하여 확인된 경우\n3. 해외체류 도중에 보통약관 제3조(보험금의 지급사유)의 상해를 직접 원인으로 하여 사망한 경우 또는 ( )\n(예:14일,7일,4일)이상 계속 입원한 경우(다른 의료기관으로 이전한 경우에는 이전에 소요된 기간을 입원중\n으로 봅니다. 다만, 그 이전에 대하여는 치료를 위하여 의사가 필요하다고 인정한 경우에 한합니다. 이하\n같습니다.)\n4. 질병을 직접 원인으로 하여 해외체류 도중에 사망한 경우 또는 해외체류 도중에 걸린 질병을 직접 원인으\n로 하여 ( )(예:14일,7일,4일)이상 계속 입원한 경우. 다만, 입원에 대하여는 해외체류 도중에 의사가 치료\n\n26 한화글로벌안심보험\n를 개시한 질병으로 인한 입원에 한합니다.\n② 제1항 제1호의 산악등반 중 피보험자의 조난이 확실치 않은 경우에는 피보험자의 하산 예정일이후 계약자 또는\n피보험자의 법정상속인이나 이들을 대신한 사람이 경찰서 등의 공공기관, 조난구조대, 해난구조회사 또는 항공회\n사에 수색을 의뢰한 것을 조난이 발생한 것으로 봅니다."}, {"title": "부담하는 비용을 이 특별약관에 따라 보상하여 드립니다. 제2조(비용의 범위)", "text": "회사가 보상하는 비용의 범위는 아래와 같습니다.\n1. 수색구조비용\n조난당한 피보험자를 수색, 구조 또는 이송(이하「수색」이라 합니다)하는 활동에 필요한 비용중 이들의 활동\n에 종사한 사람으로부터의 청구에 의하여 지급한 비용을 말합니다.\n2. 항공운임 등 교통비\n피보험자의 수색, 간호 또는 사고처리를 위하여 사고발생지 또는 현지까지의 피보험자의 법정상속인(그 대\n리인을 포함합니다. 이하「구원자」라 합니다)의 왕복교통비를 말하며 2명분을 한도로 합니다.\n3. 숙박비\n현지에서의 구원자의 숙박비를 말하며 구원자 2명분을 한도로 하여 1명당 14박분을 한도로 합니다.\n4. 이송비용\n피보험자가 사망한 경우 그 유해 및 시신을 현지로부터 보험증권에 기재된 피보험자의 주소지에 이송하는\n데 필요한 비용 및 치료를 계속중인 피보험자를 보험증권에 기재된 피보험자의 주소지에 이송하는데 드는\n비용으로서 통상액을 넘는 피보험자의 운임 및 수행하는 의사, 간호사의 호송비를 말합니다.\n5. 제잡비\n구원자의 출입국 절차에 필요한 비용(여권인지대, 사증료, 예방접종료 등) 및 구원자 또는 피보험자가 현지\n에서 지출한 교통비, 통신비, 피보험자 유해처리비 등을 말하고 10만원을 한도로 합니다."}, {"title": "부담하는 비용을 이 특별약관에 따라 보상하여 드립니다. 제3조(보험금을 지급하지 않는 사유)", "text": "회사는 보통약관 제5조(보험금을 지급하지 않는 사유) 제1항 제1호 내지 제3호, 제5호의 사유로 인하여 생긴 손\n해는 보상하여 드리지 않습니다."}, {"title": "부담하는 비용을 이 특별약관에 따라 보상하여 드립니다. 제4조(보험금의 지급)", "text": "회사는 제2조(비용의 범위)의 비용 중 정당하다고 인정된 부분에 대해서만 보상하여 드리며, 계약자, 피보험자 또\n는 보험수익자가 타인으로부터 손해배상을 받을 수 있는 경우에는 그 금액을 지급하지 않습니다."}, {"title": "부담하는 비용을 이 특별약관에 따라 보상하여 드립니다. 제5조(보험금의 분담)", "text": "제1조(보험금의 지급사유)의 비용에 대하여 보험금을 지급할 다수의 계약이 체결되어 있는 경우에는 각각의 계약\n에 대하여 다른 계약이 없는 것으로 하여 산출한 보상책임액의 합계액이 그 비용을 초과했을 때 회사는 이 계약\n에 따른 보상책임액의 위의 합계액에 대한 비율에 따라 보험금을 지급하여 드립니다."}, {"title": "부담하는 비용을 이 특별약관에 따라 보상하여 드립니다. 제6조(보상한도액)", "text": "단, 자기부담금 및 자기부담률이 있는 경우, 1회의 사고에 대하여 자기부담금(10만원)을 차감한 후, 보험증권에\n기재된 자기부담률(예:10%, 20%)을 적용한 금액을 제외하고 보상합니다."}, {"title": "항공기납치 특별약관 제1조(보험금의 지급사유)", "text": "가 납치(이하 “사고”라 합니다)됨에 따라 예정목적지에 도착할 수 없게 된 동안에 대하여 매일 70,000씩 지급하\n여 드립니다.\n① 항공기의 납치라 함은, 부당한 의도를 가진 폭력, 폭행 또는 폭력이나 폭행의 위협으로서 항공기를 탈취하거나 지\n배권을 행사하는 것을 말합니다.\n② 회사는 당해 항공기의 목적지 도착예정시간에서 12시간이 지난 이후부터 시작되는 24시간을 1일로 보아 20일을\n한도로 보험금을 지급하여 드립니다.\n➂ 항공기가 최초의 명백한 사고가 있기 이전에 비행장에서 출발이 지연되었을 경우에는 제2항의 12시간에 그러한\n지연시간을 합한 시간 이후부터의 24시간을 1일로 봅니다."}, {"title": "회사는 피보험자가 보통약관 제3조(보험금의 지급사유)의 해외체류 도중에 피보험자가 승객으로서 탑승한 항공기 제2조(다른 보험과의 관계)", "text": "이 선정하는 하나의 계약에서만 보상하며, 회사는 그 계약 이외의 다른 계약에 대하여는 이미 납입된 해당보험료\n를 돌려 드립니다."}, {"title": "전쟁위험 특별약관 제1조(보험금의 지급사유)", "text": "회사는 피보험자에게 다음 사항 중 어느 한 가지의 경우에 해당되는 사유가 발생한 때에는 보험수익자에게 약정\n한 보험금을 지급합니다.\n① 보통약관 제5조(보험금을 지급하지 않는 사유) 제1항의 6. 에도 불구하고 보험기간 중에 상해(보험기간 중에 전\n쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동으로 인하여 발생한 급격하고도 우연한 외래의 사고로 신체(의수, 의\n족, 의안,의치 등 신체보조장구는 제외하나, 인공장기나 부분 의치 등 신체에 이식되어 그 기능을 대신할 경우는\n포함합니다)에 입은 상해를 말하며, 이하 “상해” 라 합니다)의 직접결과로써 사망한 경우: 사망보험금\n② 제1항의 상해로 장해분류표( [별표 1] 참조)에서 정한 각 장해지급률에 해당하는 장해상태가 되었을 때: 후유장해\n보험금(장해분류표에서 정한 지급률을 보험가입금액에 곱하여 산출한 금액)\n③ 회사는 보험기간이 만료되기 전이라도 제1항의 위험이 뚜렷이 증가했다고 인정될 때에는 24시간 이전에 서면으"}, {"title": "로 추가보험료를 청구하거나 이 특별약관을 해지할 수 있습니다. 제2조(계약 후 알릴 의무의 특례)", "text": "① 피보험자가 해외체류 경로를 변경하는 경우에는 계약자 또는 피보험자는 미리 그 내용을 서면으로 회사에 제출하\n여야 합니다.\n② 회사는 제1항의 통지를 받은 경우에는 회사가 정한 바에 의하여 추가보험료를 청구하거나 이 특별약관을 해지할\n수 있습니다.\n③ 계약자 또는 피보험자가 제1항의 계약후 알릴 의무를 이행하지 아니한 경우에는 회사는 피보험자가 해외체류 경\n로를 변경한 이후의 사고로 인한 상해에 대해서는 보상하여 드리지 아니합니다."}, {"title": "로 추가보험료를 청구하거나 이 특별약관을 해지할 수 있습니다. 제3조(보험계약해지의 효력)", "text": "제1조(보험금의 지급사유) 제2항 및 제2조(계약후 알릴 의무의 특례) 제2항의 해자는 장래에 대해서만 그 효력이\n있습니다."}, {"title": "피보험자 확장 담보 특별약관 제1조(피보험자의 범위)", "text": "① 회사는 이 특별약관에 의하여 보험증권에 기재된 피보험자 본인(이하 \"본인“이라 합니다) 및 그의 가족을 피보험\n자로 합니다.\n② 제1항의 가족이라 함은 아래의 사람을 말합니다.\n1. 본인의 배우자\n2. 본인과 생계를 같이하는 본인 및 배우자의 부모\n3. 본인과 생계를 같이하는 미혼자녀\n③ 제2항의 본인과 본인 이외의 피보험자와의 관계는 사고발생 당시의 관계를 말합니다."}, {"title": "단체계약 특별약관 제1조(계약의 적용 범위)", "text": "① 피보험자가 다음중 한가지의 단체에 소속되어야 하며, 단체를 대표하여 계약자로 된 자가 단체보험 계약상의 모든\n권리, 의무를 행사할 수 있어야 합니다.\n1. 제1종 단체\n동일한 회사, 사업장, 관공서, 국영기업체, 조합 등 5인 이상의 근로자를 고용하고 있는 단체. 다만, 사업장,\n직제, 직종 등으로 구분되어 있는 경우의 단체소속 여부는 관련법규 등에서 정하는 바에 따릅니다.\n2. 제2종 단체\n비영리법인단체 또는 변호사회, 의사회등 동업자단체로서 5인 이상의 구성원이 있는 단체\n3. 제3종 단체\n그밖에 단체의 구성원을 확정시킬 수 있고 계약의 일괄적인 관리가 가능한 단체로서 5인 이상의 구성원이\n있는 단체\n② 제1항의 대상단체에 소속된 자로서 동일한 보험계약을 체결한 5인 이상의 피보험자로 피보험단체를 구성하여야\n하며, 단체 구성원의 일부만을 대상으로 가입하는 경우에는 다음의 조건을 모두 충족하여야 합니다.\n1. 단체의 내규에 의한 복지제도로서 노사합의에 의하며, 보험료의 일부를 단체 또는 단체의 대표자가 부담하\n여야 합니다.\n2. 제1항 제2호 및 제3호에 해당하는 단체는 내규에 의해 단체의 대표자와 보험회사가 협정에 의해 체결하여\n야 합니다."}, {"title": "단체계약 특별약관 제2조(상법 제735조3의 적용)", "text": "① 제1조의 단체가 피보험자를 확정할 수 있고 계약의 일괄적 관리가 가능하며, 규약에 따라 계약을 체결하는 경우\n피보험자의 서면에 의한 동의를 얻지 않아도 되며, 계약자에게만 보험증권을 드릴 수 있습니다.\n② 제1항의 규약은 보험의 종류 및 일괄 가입에 관한 사항이 포함되어야 하며, 동의 또는 협의를 통하여 피보험자들\n의 의사가 규약에 반영될 수 있어야 합니다. 다만, 보험수익자를 계약자 등 피보험자의 이해에 반하는 자로 지정\n하는 경우에는 해당 내용이 규약에 반영되어야 하며, 반영되지 않은 경우에는 별도 피보험자의 동의를 받아야 합\n니다.\n③ 보험회사는 계약자를 통해 단체의 규약이 제2항을 충족하고 있는 지 확인을 해야 하며, 계약자는 이에 협조하여야\n합니다."}, {"title": "단체계약 특별약관 제3조(단체요율의 적용)", "text": "① 제1조의 단체는 단체요율을 적용할 수 있습니다. 다만, 제3종 단체는 구성원이 명확하고 위험의 동질성이 확보되\n어야 합니다.\n\n② 단체 구성원의 일부만을 대상으로 가입하는 경우에는 대상단체의 위험과 피보험단체의 위험의 동질성이 유지되어\n야 합니다."}, {"title": "단체계약 특별약관 제4조(피보험자의 증가 감소 또는 교체)", "text": "① 계약을 맺은 후 피보험자를 증가, 감소 또는 교체코자 하는 경우에는 계약자 또는 피보험자는 지체없이 서면으로\n그 사실을 회사에 알리고 회사의 승인을 받아야 합니다.\n② 이 계약기간 중 피보험자 감소의 경우는 당해 피보험자의 계약은 해지된 것으로 하며 새로이 증가 또는 교체되는\n피보험자의 보험기간은 이 계약의 남은 보험기간으로 하고, 이로 인하여 발생되는 추가 또는 환급보험료는 일단\n위로 계산하여 받거나 돌려 드립니다.\n③ 회사는 제1항 및 제2항을 위반하였을 경우에 새로이 증가 또는 교체되는 해당 피보험자에 대하여는 보상하여 드\n리지 아니합니다.\n④ 제1항에 따라 피보험자가 교체되는 경우에는 피보험자 교체전 계약과 동일한 보장조건 및 인수기준에 따라 가입\n될 수 있으며, 피보험자 교체시점부터 잔여 보험기간(피보험자 교체전 계약의 보험기간 만료일)까지 보상하여 드\n립니다."}, {"title": "단체계약 특별약관 제5조(개별계약으로의 전환)", "text": "① 피보험자가 퇴직 등의 사유로 인하여 피보험단체에서 탈퇴하는 경우 피보험자가 보험료의 일부를 부담한 경우\n에 한하여 탈퇴일로부터 1개월 이내에 계약자 또는 피보험자는 회사의 승낙을 얻어 개별계약으로 전환할 수\n있으며, 이 경우 피보험자는 개별계약의 계약자가 됩니다.\n② 제1항에 따라 개별계약으로 전환시에는 전환후 피보험자의 보험기간은 이 계약의 남은 기간으로 하고, 이로 인\n하여 발생하는 추가 또는 환급되는 보험료는 보험료 및 해약환급금 산출방법서에서 정한 바에 따라 일단위로\n계산하여 받거나 돌려 드립니다.\n\n제6조(보험증권(보험가입증서)의 발급)\n① 회사는 보험계약자에게 보험증권(보험가입증서)을 드려야 하고, 그 약관의 주요한 내용을 알려드립니다.\n② 보험계약자의 요청이 있을 경우, 개별 피보험자에게는 가입증명서를 발급하여 드립니다."}, {"title": "단체계약 특별약관 제7조(적용상의 특칙)", "text": "계약자가 아닌 단체의 소속원이 보험료 전부 또는 일부를 부담하는 경우에는 그 소속원이 계약자로서의 권리를\n행사할 수 있습니다."}, {"title": "단체계약 보험료정산 추가특별약관 제1조(보험료 정산)", "text": "① 회사는 단체계약 특별약관(이하 ｢특별약관｣이라 합니다.) 제4조(피보험자의 증가, 감소 또는 교체) 제2항에도 불\n② 회사는 단체계약 특별약관 제4조(피보험자의 증가, 감소 또는 교체) 제3항과 관계없이 보험료가 정산되기 이전일\n지라도 새로이 증가 또는 교체된 피보험자에 대해 생긴 손해를 보상하여 드립니다."}, {"title": "구하고 이 추가특별약관에 따라 보험료를 정산합니다. 제2조(피보험자의 명부)", "text": "계약자는 항상 피보험자 명부를 비치하여 회사가 열람을 요구할 경우에는 이에 따라야 합니다.\n\n30 한화글로벌안심보험"}, {"title": "구하고 이 추가특별약관에 따라 보험료를 정산합니다. 제3조(예치보험료)", "text": "예치보험료는 계약체결일 이전 1개월 동안 1일 평균인원수에 정해진 보험요율을 적용하여 계산합니다."}, {"title": "구하고 이 추가특별약관에 따라 보험료를 정산합니다. 제4조(보험료의 정산방법)", "text": "보험료는 피보험자의 증감을 기초로 하여 다음과 같이 정산합니다.\n1. 계약자는 매월 10일까지 전월말까지의 피보험자에 관한 서류를 회사에 제출하여야합니다. 그러나 계약이 효력\n상실 또는 해지된 경우에는 효력상실 또는 해지일까지의 보험료를 확정하기 위하여 필요한 서류를 효력상실 또\n는 해지 즉시 회사에 제출하여야 합니다.\n2. 회사는 보험기간중이나 보험기간 만료 후 보험료를 산출하기 위하여 필요하다고 인정될 경우에는 계약자의 서\n류를 열람할 수 있습니다.\n3. 회사는 보험기간 만료와 동시에 제1호에 의한 피보험자수에 따라 산출된 확정보험료와 계약을 체결할 때 산출\n한 예치보험료를 비교하여 그 차액을 정산합니다."}, {"title": "포괄계약 추가특별약관 제1조(적용범위)", "text": "① 이 추가특별약관은 특정기간을 계약기간으로 하여 동기간에 계약자가 통지한 피보험자를 회사가 제3조(피보험자\n의 통지)의 통지조건에 따라 포괄적으로 보상하는 계약에 대하여 적용합니다.\n계약자 : 1) 관광진흥법 및 동법 시행령에 따라 등록된 일반여행업자 및 국외여행업자\n피보험자 :1) 여행업자가 알선, 주최한 해외 여행자\n② 제1항이 단체계약의 경우에는 총 피보험자수 5인 이상이어야 합니다."}, {"title": "2) 단체계약 특별약관 제1조(계약의 적용범위) 제1항에 정한 단체 소속의 해외 여행자 제2조(보험료)", "text": "① 계약 체결시 계약자는 보험계약기간 중에 예상 피보험자 수 및 보험가입조건을 회사에 제출하여야 하며 동 조건\n등에 따라 산출된 추정보험료를 납입하여야 합니다.\n② 회사는 제3조(피보험자의 통지)에 의해 통지된 내용에 따라 실제보험료를 산출한 후 보험기간 종료후 7일 이내에\n제1항의 추정보험료의 차액을 받거나 돌려 드립니다."}, {"title": "2) 단체계약 특별약관 제1조(계약의 적용범위) 제1항에 정한 단체 소속의 해외 여행자 제3조(피보험자의 통지)", "text": "계약자 또는 이들의 대리인은 보통약관 제13조(계약 전 알릴 의무)에서 정한 해당사항을 서면통지(팩시밀리를 포\n함합니다)하여야 합니다. 회사의 보장은 통지가 회사에 접수되는 시점에 시작되며, 다만 우편통지시 그 통지가 지\n연된 경우에는 우체국소인이 찍힌 날로부터 3일이 지나면 회사에 접수된 것으로 봅니다."}, {"title": "2) 단체계약 특별약관 제1조(계약의 적용범위) 제1항에 정한 단체 소속의 해외 여행자 제4조(보험가입금액)", "text": "계약자가 피보험자의 보험가입금액을 각기 달리하여 가입하고자 할 경우에 회사는 계약사항을 고려하여 이를 승인\n할 수 있습니다."}, {"title": "2) 단체계약 특별약관 제1조(계약의 적용범위) 제1항에 정한 단체 소속의 해외 여행자 제5조(중복계약체결 확인 의무)", "text": "회사는 실손의료보험계약을 체결할 경우 아래 각 호의 보험계약을 제외하고는 계약을 모집하기 전에 보험계약자가\n되려는 자의 동의를 얻어 모집하고자 하는 보험계약과 동일한 위험을 보장하는 보험계약을 체결하고 있는지를 확\n인하여야 하며 확인한 내용을 보험계약자가 되려는 자에게 즉시 알려야 합니다.\n1. 민간법인 또는 단체가 정관이나 그 밖의 규약에 따라 체결하는 단체보험계약\n2. 여행 중 발생한 위험을 보장하는 보험계약으로서 「관광진흥법」 제4조에 따라 등록한 여행업자가 일괄 체결\n\n하는 보험계약\n3. 국외여행, 연수 또는 유학 등 국외체류 중 발생한 위험을 보장하는 보험계약"}, {"title": "2) 단체계약 특별약관 제1조(계약의 적용범위) 제1항에 정한 단체 소속의 해외 여행자 제6조(적용특칙)", "text": "이 추가특별약관에서는 보통약관 제21조(계약내용의 변경 등)를 적용하지 않으며 회사는 계약자에게만 보험증권을\n드립니다."}, {"title": "상품다수구매자 보험계약 특별약관 제1조(적용범위)", "text": "① 이 상품다수구매자 보험계약 특별약관(이하「특별약관」이라 합니다)은 상품판매자가 자기의 관리하에 운영․유지되\n는 상품의 다수구매자를 피보험자로 하여 계약을 체결하는 경우에 적용합니다.\n② 제1항의 상품의 다수구매자란 각종 재화, 용역 및 서비스의 구매자를 말합니다.\n③ 제1항의 단체의 총 피보험자수는 100인 이상이어야 합니다."}, {"title": "상품다수구매자 보험계약 특별약관 제2조(대표계약자)", "text": "이 특별약관의 계약자는 제1조(적용범위)의 단체를 대표하여 계약상의 모든 권리, 의무를 행사할 수 있어야 합니\n다."}, {"title": "상품다수구매자 보험계약 특별약관 제3조(보험가입금액)", "text": "피보험자의 보험가입금액은 동일하게 책정하는 것을 원칙으로 합니다."}, {"title": "상품다수구매자 보험계약 특별약관 제4조(피보험자의 증가, 감소 또는 교체)", "text": "① 단체 구성원의 입사, 퇴직 등의 사유로 피보험자의 변동이 있을 경우 계약자나 피보험자 또는 제2조(대표계약자)\n의 대표계약자는 지체없이 서면으로 그 사실을 회사에 알리고 회사의 승인을 받아야 합니다.\n② 이 계약기간 중 피보험자의 감소의 경우는 당해 피보험자의 계약은 해지된 것으로 하며 새로이 증가 또는 교체되\n는 피보험자의 보험기간은 이 계약의 남은 보험기간으로 하고, 개별 피보험자의 위험에 부합하게 보험료를 정산\n또는 조정할 수 있습니다.\n③ 회사는 제1항을 위반하였을 경우에 새로이 증가 또는 교체되는 해당에 대하여는 보상하여 드리지 아니합니다.\n④ 제1항에 따라 피보험자가 교체되는 경우에는 피보험자 교체전 계약과 동일한 보장조건 및 인수기준에 따라 가입\n될 수 있으며, 피보험자 교체시점부터 잔여 보험기간(피보험자 교체전 계약의 보험기간 만료일)까지 보상하여 드\n립니다."}, {"title": "상품다수구매자 보험계약 특별약관 제5조(보험료의 환급)", "text": "계약자의 책임있는 사유로 계약을 해지하는 경우에는 보통약관 제32조(보험료의 환급)의 규정에도 불구하고 이미\n경과한 기간에 대하여 단기요율(1년미만의 기간에 적용되는 요율)로 계산한 보험료를 뺀 잔액을 돌려드립니다."}, {"title": "상품다수구매자 보험계약 보험료 정산 특별약관 제1조(보험료의 정산)", "text": "① 회사는 상품다수구매자 보험계약 특별약관 제4조(피보험자의 증가, 감소 또는 교체) 제2항에도 불구하고 이 추가\n\n32 한화글로벌안심보험\n② 회사는 상품다수구매자 보험계약 특별약관 제4조(피보험자의 증가, 감소 또는 교체) 제3항에도 불구하고 보험료가\n정산되기 이전일지라도 새로이 증가 또는 교체된 피보험자에 대해 생긴 손해를 보상하여 드립니다."}, {"title": "특별약관에 따라 보험료를 정산합니다. 제2조(보험가입금액)", "text": "각기 달리하여 가입하고자 할 경우에 회사는 계약사항을 고려하여 이를 승인할 수 있습니다."}, {"title": "상품다수구매자 보험계약 특별약관 제3조(보험가입금액)의 규정에 관계없이 계약자가 피보험자의 보험가입금액을 제3조(피보험자의 명부)", "text": "계약자는 항상 피보험자 명부를 비치하여 회사가 열람을 요구할 경우에는 이에 따라야 합니다."}, {"title": "상품다수구매자 보험계약 특별약관 제3조(보험가입금액)의 규정에 관계없이 계약자가 피보험자의 보험가입금액을 제4조(예치보험료)", "text": "예치보험료는 계약체결일 이전 1개월 동안 1일 평균인원수에 정해진 보험요율을 적용하여 계산합니다."}, {"title": "상품다수구매자 보험계약 특별약관 제3조(보험가입금액)의 규정에 관계없이 계약자가 피보험자의 보험가입금액을 제5조(보험료의 정산방법)", "text": "보험료는 피보험자수의 증감을 기초로 하여 다음과 같이 정산합니다.\n1. 계약자는 매월 10일까지 전월말까지의 피보험자수에 관한 서류를 회사에 제출하여야 합니다. 그러나 계약이 효\n력상실 또는 해지된 경우에는 효력상실 또는 해지일까지의 보험료를 확정하기 위하여 필요한 서류를 효력상실\n또는 해지 즉시 회사에 제출하여야 합니다.\n2. 회사는 보험기간중이나 보험기간 만료 후 보험료를 산출하기 위하여 필요하다고 인정 될 경우에는 계약자의 서\n류를 열람할 수 있습니다.\n3. 회사는 보험기간 만료와 동시에 제1호에 의한 피보험자수에 따라 산출된 확정보험료와 계약을 체결할 때 산출\n한 예치보험료를 비교하여 그 차액을 정산합니다."}, {"title": "단체취급 특별약관 제1조(계약의 적용범위)", "text": "이 특별약관은 아래에 정한 단체를 제외한 5인 이상의 단체를 대상으로 하는 계약(이하 “단체취급 계약”이라 합\n니다)을 체결하는 경우에 한하여 적용합니다.\n1. 동일한 회사, 사업장, 관공서, 국영기업체, 조합 등 5인 이상의 근로자를 고용하고 있는 단체. 다만, 사업장, 직\n제, 직종 등으로 구분되어 있는 경우의 단체소속 여부는 관련법규 등에서 정하는 바에 따를 것\n2. 비영리법인단체 또는 변호사회, 의사회 등 동업자단체로서 5인 이상의 구성원이 있는 단체\n3. 그 밖에 단체의 구성원이 명확하고 위험의 동질성이 확보되어 계약의 일괄적인 관리가 가능한 단체로서 5인\n이상의 구성원이 있는 단체\n4. 상품다수구매자 단체\n상품판매자가 자기의 관리 하에 운영, 유지되는 상품구매자(각종 재화, 용역 및 서비스의 구매자를 말합니다)\n다수를 피보험자로 하는 100인 이상의 단체"}, {"title": "단체취급 특별약관 제2조(계약자)", "text": "이 특별약관의 계약자는 제1조(계약의 적용범위)의 단체를 대표하는 보험계약상의 모든 권리, 의무를 행사할 수\n있어야 합니다."}, {"title": "단체취급 특별약관 제3조(피보험자의 증가 감소 또는 교체)", "text": "① 계약을 맺은 후 피보험자를 증가, 감소 또는 교체코자 하는 경우에는 계약자 또는 피보험자는 지체없이 서면으로\n\n그 사실을 회사에 알리고 회사의 승인을 받아야 합니다.\n② 이 계약기간 중 피보험자 감소의 경우는 당해 피보험자의 계약은 해지된 것으로 하며 새로이 증가 또는 교체되는\n피보험자의 보험기간은 이 계약의 남은 보험기간으로 하고, 이로 인하여 발생되는 추가 또는 환급보험료는 일단\n위로 계산하여 받거나 돌려 드립니다.\n③ 회사는 제1항을 위반하였을 경우에 새로이 증가 또는 교체되는 해당 피보험자에 대하여는 보상하여 드리지 아니\n합니다.\n④ 제1항에 따라 피보험자가 교체되는 경우에는 피보험자 교체전 계약과 동일한 보장조건 및 인수기준에 따라 가입\n될 수 있으며, 피보험자 교체시점부터 잔여 보험기간(피보험자 교체전 계약의 보험기간 만료일)까지 보상하여 드\n립니다."}, {"title": "단체취급 보험료정산 추가특별약관 제1조(보험료의 정산)", "text": "① 회사는 단체취급 특별약관 제3조(피보험자의 증가 감소 또는 교체) 제2항에도 불구하고 이 특별약관에 따라 보험\n료를 정산합니다.\n② 회사는 단체취급 특별약관 제3조(피보험자의 증가 감소 또는 교체) 제3항과 관계없이 보험료가 정산되기 이전 일\n지라도 새로이 증가 또는 교체된 피보험자에 대해 생긴 손해를 보상하여 드립니다."}, {"title": "단체취급 보험료정산 추가특별약관 제2조(피보험자의 명부)", "text": "보험계약자는 항상 피보험자의 명부를 비치하여 회사가 열람을 요구할 경우에는 이에 따라야 합니다."}, {"title": "단체취급 보험료정산 추가특별약관 제3조(보험료의 정산방법)", "text": "보험료는 피보험자수의 증감을 기초로 하여 다음과 같이 정산합니다.\n① 보험계약자는 매월 10일까지 전월말까지의 피보험자에 관한 서류를 회사에 제출하여야 합니다. 그러나 계약이 효\n력상실 또는 해지된 경우에는 효력상실 또는 해지일까지의 보험료를 확정하기 위하여 필요한 서류를 효력상실 또\n는 해지 즉시 회사에 제출하여야 합니다.\n② 회사는 보험기간중이나 보험기간 만료 후 보험료를 산출하기 위하여 필요하다고 인정될 경우에는 보험계약자의\n서류를 열람할 수 있습니다.\n③ 회사는 보험기간 만료와 동시에 피보험자수에 따라 산출된 확정보험료와 계약체결시 산출한 예치보험료를 비교하\n여 그 차액을 정산합니다."}, {"title": "단체계약 보험료 분납 특별약관 제1조(보험료의 분납)", "text": "20명 이상 단체를 피보험자로 하는 계약자는 이 계약의 보험료를 ( )회에 분할하여 회사에 납입할 수 있습니\n다."}, {"title": "단체계약 보험료 분납 특별약관 제2조(나눠내는 보험료의 납입)", "text": "계약자는 나눠내는 보험료를 다음과 같이 그 정한 날짜까지 납입하여야 합니다.\n1. 2회 분납 : 제1회 분납 (70%), 년 월 일 계약을 체결할 때 납입\n\n34 한화글로벌안심보험\n제2회 분납 (30%), 년 월 일 납입\n2. 4회 분납 : 제1회 분납 (40%), 년 월 일 계약을 체결할 때 납입\n제2회 분납 (30%), 년 월 일 납입\n제3회 분납 (15%), 년 월 일 납입\n제4회 분납 (15%), 년 월 일 납입\n3. 12회 분납 : 12회 균등분납으로 다음과 같이 납입하여야 합니다.\n제1회 분납, 년 월 일 계약을 체결할 때 납입\n제2회 이후, 매월 일 납입"}, {"title": "지정대리청구서비스 특별약관 제1조(적용대상)", "text": "이 특별약관(이하 “특약”)은 계약자, 피보험자 및 보험수익자가 모두 동일한 보통약관 및 특별약관에 적용됩니다."}, {"title": "지정대리청구서비스 특별약관 제2조(특약의 체결 및 소멸)", "text": "① 이 특약은 보험계약자의 청약(請約)과 보험회사의 승낙(承諾)으로 부가되어집니다. (이하 보험계약자는 “계약자”,\n보험회사는 “회사” 라 합니다)\n② 제1조(적용대상)의 보험계약이 해지(解止) 또는 기타 사유에 의하여 효력을 가지지 아니하게 되는 경우에는 이 특\n약은 더 이상 효력을 가지지 아니합니다."}, {"title": "지정대리청구서비스 특별약관 제3조(지정대리청구인의 지정)", "text": "① 계약자는 보통약관 또는 특별약관에서 정한 보험금을 직접 청구할 수 없는 특별한 사정이 있을 경우를 대비하여\n계약체결시 또는 계약체결 이후 다음 각호의 1에 해당하는 자 중에서 보험금의 청구대리인(2인 이내에서 지정하\n되, 2인 지정시 대표대리인을 지정)(이하, “지정대리청구인”이라 합니다)으로 지정(제4조에 의한 변경 지정 포함)\n할 수 있습니다. 다만, 지정대리청구인은 보험금 청구시에도 다음 각호의 1에 해당하여야 합니다.\n1. 피보험자의 가족관계등록부상 또는 주민등록상의 배우자\n2. 피보험자의 3촌 이내의 친족\n② 제1항에도 불구하고, 지정대리청구인이 지정된 이후에 제1조(적용대상)의 보험수익자가 변경되는 경우에는 이미\n지정된 지정대리청구인의 자격은 자동적으로 상실된 것으로 봅니다."}, {"title": "지정대리청구서비스 특별약관 제4조(지정대리청구인의 변경지정)", "text": "계약자는 다음의 서류를 제출하고 지정대리청구인을 변경 지정할 수 있습니다. 이 경우 회사는 변경 지정을 서면\n으로 알리거나 보험증권(보험가입증서)의 뒷면에 기재하여 드립니다.\n1. 지정대리청구인 변경신청서(회사양식)\n2. 지정대리청구인의 주민등록등본, 가족관계등록부(기본증명서 등)\n3. 신분증(주민등록증 또는 운전면허증 등 사진이 부착된 정부기관 발행 신분증, 본인이 아닌 경우에는 본인의 인\n감증명서 또는 본인서명사실확인서 포함)"}, {"title": "지정대리청구서비스 특별약관 제5조(보험금 지급 등의 절차)", "text": "① 지정대리청구인은 제6조(보험금 등 청구시 구비서류)에 정한 구비서류 및 제1조(적용대상)의 보험수익자가 보험금\n을 직접 청구할 수 없는 특별한 사정이 있음을 증명하는 서류를 제출하고 회사의 승낙을 얻어 제1조(적용대상)의\n보험수익자의 대리인으로서 보험금(사망보험금 제외)을 청구하고 수령할 수 있습니다. 다만, 2인의 청구대리인이\n지정된 경우에는 그 중 대표대리인이 보험금을 청구하고 수령할 수 있으며, 대표대리인이 사망 등의 사유로 보험\n금 청구가 불가능한 경우에는 대표가 아닌 청구대리인도 보험금을 청구하고 수령할 수 있습니다.\n② 회사가 보험금을 지정대리청구인에게 지급한 경우에는 그 이후 보험금 청구를 받더라도 회사는 이를 지급하지 아\n\n니합니다."}, {"title": "지정대리청구서비스 특별약관 제6조(보험금 등 청구시 구비서류)", "text": "지정대리청구인은 회사가 정하는 방법에 따라 다음의 서류를 제출하고 보험금을 청구 하여야 합니다.\n1. 청구서(회사양식)\n2. 사고증명서\n3. 신분증(주민등록증 또는 운전면허증 등 사진이 부착된 정부기관 발행 신분증)\n4. 피보험자 및 지정대리청구인의 가족관계등록부(가족관계증명서) 및 주민등록등본\n5. 기타 지정대리청구인이 보험금 등의 수령에 필요하여 제출하는 서류"}, {"title": "지정대리청구서비스 특별약관 제7조(준용규정)", "text": "① 우리회사는 보험료를 원화로 영수 또는 환급할 때에는 청약일 또는 배서일의 하나은행 1차고시 전신환 대고객 매\n도율로 환산한 원화로 합니다.\n1. 보험료 : 청약일\n2. 추가및환급보험료 : 배서일\n3. 해지환급보험료 : 해지일\n4. 분납보험료 : 납입해당일\n\n② 보험금은 지급일의 하나은행 1차고시 전신환 대고객 매도율로 환산한 원화 또는 ( )화에 해당하는 외환증서로 지\n급하여 드립니다."}, {"title": "장애인전용보험전환 특별약관 제1조(특약의 적용범위)", "text": "① 이 특약은 회사가 정한 방법에 따라 계약자가 청약(請約)하고 회사가 승낙(承諾)함으로써 다음 각 호의 조건을 모\n두 만족하는 보험계약(이하 “전환대상계약”이라 합니다)에 대하여 장애인전용보험으로 전환을 청약하는 경우에\n적용합니다.\n1. 「소득세법 제59조의4(특별세액공제) 제1항 제2호」에 따라 보험료가 특별세액공제의 대상이 되는 보험\n\n<소득세법 제59조의4(특별세액공제) >\n① 근로소득이 있는 거주자(일용근로자는 제외한다. 이하 이 조에서 같다)가 해당 과세기간에 만기에\n환급되는 금액이 납입보험료를 초과하지 아니하는 보험의 보험계약에 따라 지급하는 다음 각 호의\n보험료를 지급한 경우 그 금액의 100분의 12(제1호의 경우에는 100분의 15)에 해당하는 금액을 해\n당 과세기간의 종합소득산출세액에서 공제한다. 다만, 다음 각 호의 보험료별로 그 합계액이 각각 연\n100만원을 초과하는 경우 그 초과하는 금액은 각각 없는 것으로 한다.\n용어 1. 기본공제대상자 중 장애인을 피보험자 또는 수익자로 하는 장애인전용보험으로서 대통령령으로 정\n해설 하는 장애인전용보장성보험료\n2. 기본공제대상자를 피보험자로 하는 대통령령으로 정하는 보험료(제1호에 따른 장애인전용보장성보험\n료는 제외한다)\n\n<소득세법 시행령 제118조의4 (보험료의 세액공제)>\n① 법 제59조의4제1항제1호에서 \"대통령령으로 정하는 장애인전용보장성보험료\"란 제2항 각 호에 해당\n하는 보험·공제로서 보험·공제 계약 또는 보험료·공제료 납입영수증에 장애인전용 보험·공제로 표시된\n\n36 한화글로벌안심보험\n보험·공제의 보험료·공제료를 말한다.\n② 법 제59조의4제1항제2호에서 \"대통령령으로 정하는 보험료\"란 다음 각 호의 어느 하나에 해당하는 보\n험·보증·공제의 보험료·보증료·공제료 중 기획재정부령으로 정하는 것을 말한다.\n1. 생명보험\n2. 상해보험\n3. 화재·도난이나 그 밖의 손해를 담보하는 가계에 관한 손해보험\n4.「수산업협동조합법」,「신용협동조합법 또는 「새마을금고법」에 따른 공제\n5.「군인공제회법」,「한국교직원공제회법」,「대한지방행정공제회법」,「경찰공제회법」 및 「대한소방공제회법」\n에 따른 공제\n6. 주택 임차보증금의 반환을 보증하는 것을 목적으로 하는 보험·보증. 다만, 보증대상 임차보증금이\n3억원을 초과하는 경우는 제외한다.\n\n<소득세법 시행규칙 제61조의3 (공제대상보험료의 범위)>\n영 제118조의4제2항 각 호 외의 부분에서 \"기획재정부령으로 정하는 것\"이란 만기에 환급되는 금액이 납\n입보험료를 초과하지 아니하는 보험으로서 보험계약 또는 보험료납입영수증에 보험료 공제대상임이 표시된\n보험의 보험료를 말한다.\n\n2. 모든 피보험자 또는 모든 보험수익자가 「소득세법 시행령 제107조(장애인의 범위) 제 1항」에서 규정한 장\n애인인 보험\n\n<「소득세법 시행령 제107조(장애인의 범위)」에서 규정한 장애인>\n1.「장애인복지법」에 따른 장애인 및 「장애아동 복지지원법」에 따른 장애아동 중 기획재정부령으로\n정하는 사람\n2.「국가유공자 등 예우 및 지원에 관한 법률」에 의한 상이자 (이하 생략)"}, {"title": "장애인전용보험전환 특별약관 제2조(제출서류)", "text": "① 이 특약에 가입하고자 하는 계약자는 모든 피보험자 또는 모든 보험수익자의 「소득세법 시행규칙 별지 제38호 서\n식에 의한 장애인증명서의 원본 또는 사본」(이하, “장애인증명서”라 합니다)을 제출하여 제1조(특약의 적용범위)\n제1항 제2호에서 정한 조건에 해당함을 회사에 알려야 합니다.\n② 제1항에도 불구하고 「국가유공자 등 예우 및 지원에 관한 법률」에 따른 상이자의 증명을 받은 사람 또는 「장애\n인복지법」에 따른 장애인등록증을 발급받은 사람에 대해서는 해당 증명서·장애인등록증의 사본이나 그 밖의 장애\n사실을 증명하는 서류를 제출하는 경우에는 제 1항의 장애인증명서는 제출하지 않을 수 있습니다.\n③ 장애인으로서 그 장애기간이 기재된 장애인증명서를 제1항 따라 회사에 제출한 때에는 그 장애기간 동안은 이를\n다시 제출하지 않을 수 있습니다.\n④ 제1항에 따라 제출한 장애인증명서의 장애기간이 변경되는 경우 계약자는 이를 회사에 알리고 변경된 장애기간\n이 기재된 장애인증명서를 제출하여야 합니다."}, {"title": "장애인전용보험전환 특별약관 제3조(장애인전용보험으로의 전환)", "text": "① 회사는 이 특약이 부가된 전환대상계약을 「소득세법 제59조의4(특별세액공제) 제1항 제1호」에 해당하는 장애인\n전용보험으로 전환하여 드립니다.\n② 제1항에 따라 전환대상계약이 장애인전용보험으로 전환된 후부터 납입된 전환대상계약 보험료는 보험료 납입영수\n증에 장애인전용 보장성보험료로 표시됩니다.\n\n2019년 1월 15일에 전환대상계약에 가입한 계약자가 2019년 6월 1일에 이 특약을 청약하고 회사가\n승낙하여 전환대상계약이 장애인전용보험으로 전환된 경우, 이 특약을 청약하기 전(2019년 1월 15\n설명 일~ 2019년 5월 31일)에 납입된 보험료는 당해년도 보험료 납입영수증에 장애인전용 보장성 보험료\n로 표시되지 않고 특별세액공제 대상에 포함되지 않으며, 장애인전용보험으로 전환된 이후(2019년6월1\n일~2019년12월31일) 납입된 보험료만 2019년 특별세액공제 대상이 됩니다.\n\n③ 제2항에도 불구하고,「 전환대상계약이 장애인전용보험으로 전환된 당해년도에 제4조(전환 취소)에 따라 전환을\n취소하는 경우」에는 당해년도에 납입한 모든 전환대상계약보험료가 보험료 납입영수증에 장애인전용 보장성보\n험료로 표시되지 않습니다. 다만, 제2조(제출서류) 제1항에 따라 제출된 장애인증명서상 장애예상기간(또는 장\n애기간)이 종료됨에 따라 제1조(특약의 적용범위) 제1항 제2호에서 정한 조건을 만족하지 않게 된 경우에는 이\n조항이 적용되지 않습니다.\n\n2019년 1월 15일에 전환대상계약에 가입한 계약자가 2019년 6월 1일에 이 특약을 청약하고 회사가\n승낙하여 전환대상계약이 장애인전용보험으로 전환되었으나 2019년 12월 1일에 전환을 취소한 경우,\n설명 이 전환대상계약에 납입된 모든 보험료는 당해년도 보험료 납입영수증에 장애인전용 보장성 보험료로\n표시되지 않으며 소득세법에 따라 보험료의 100분의 15에 해당하는 금액이 종합소득산출세액에서 공\n제되지 않습니다.\n④ 전환대상계약에 이 특약이 부가된 이후 제4조(전환 취소)에 따라 전환을 취소한 경우 또는 전환대상계약이 제1\n조(특약의 적용범위)제1항 제2호에서 정한 조건을 만족하지 않아 이 특약의 효력이 없어진 경우 해당 전환대상\n계약에는 이 특약을 다시 부가할 수 없습니다. 다만, 제2조(제출서류) 제1항에 따라 제출된 장애인증명서상 장\n애예상기간(또는 장애기간)이 종료됨에 따라 전환대상계약이 제1조 (특약의 적용범위) 제1항 제2호에서 정한\n조건을 만족하지 않게 된 경우에는 이 조항이 적용되지 않습니다."}, {"title": "장애인전용보험전환 특별약관 제4조(전환 취소)", "text": "계약자는 전환대상계약에 대하여 장애인전용보험으로의 전환을 취소할 수 있으며, 이 경우 전환취소 신청서를 회\n사에 제출하여야 합니다."}, {"title": "장애인전용보험전환 특별약관 제5조(준용규정)", "text": "① 이 특약에서 정하지 않은 사항에 대하여는 전환대상계약 약관, 소득세법 등 관련법규에서 정하는 바에 따릅니다.\n② 소득세법 등 관련법규가 제·개정 또는 폐지되는 경우 변경된 법령을 따릅니다.\n\n38 한화글로벌안심보험\n해외장기체류 실손의료보험은 해외체류 중에 보험회사가 피보험자의 질병 또는 상해로 인한 손해(의료비에 한\n정합니다)를 보상하는 상품입니다.\n\n제1관 일반사항 및 용어의 정의"}, {"title": "기본형 해외장기체류 실손의료보험 특별약관 제1조(보장종목)", "text": "구성합니다.\n보장 세부 구성\n보상하는 내용\n종목 항목\n피보험자가 해외체류 중에 입은 상해로 인하여 해외의료기관주1)에서 의료비가 발\n해외\n상해 생한 경우에 보상\n의료비 피보험자가 해외체류 중에 입은 상해로 인하여 의료기관에 입원 또는 통원하여\n국내(급여)\n급여주2) 치료를 받거나 급여 처방조제를 받은 경우에 보상\n피보험자가 해외체류 중에 질병으로 인하여 해외의료기관주1)에서 의료비가 발생\n해외\n한 경우에 보상\n질병\n의료비 피보험자가 해외체류 중에 질병으로 인하여 의료기관에 입원 또는 통원하여 급여\n국내(급여)\n치료를 받거나 급여 처방조제를 받은 경우에 보상\n\n주1) 해외의료기관은 해외소재 의료기관을 말하며, 해외소재약국을 포함합니다. 이하 동일합니다.\n주2)「국민건강보험법」에서 정한 요양급여 또는 「의료급여법」에서 정한 의료급여"}, {"title": "회사는 기본형 해외장기체류 실손의료보험 특별약관을 상해의료비형, 질병의료비형 등 2가지 이내의 보장종목으로 제2조(용어정의)", "text": "이 약관에서 사용하는 용어의 뜻은 <붙임1>과 같습니다.\n\n제2관 회사가 보상하는 사항"}, {"title": "회사는 기본형 해외장기체류 실손의료보험 특별약관을 상해의료비형, 질병의료비형 등 2가지 이내의 보장종목으로 제3조(보장종목별 보상내용)", "text": "회사가 이 계약의 보험기간 중 보장종목별로 보상하는 내용은 다음과 같습니다.\n보장 세부구성\n보상하는 사항\n종목 항목\n① 회사는 피보험자가 보험증권에 기재된 해외체류 중에 상해를 입고, 이로 인해 해외의\n료기관에서 의사(치료받는 국가의 법에서 정한 병원 및 의사의 면허를 가진 자에 한\n함)의 치료를 받은 때에는 보험가입금액을 한도로 피보험자가 실제 부담한 의료비 전\n액을 보상합니다.\n해외 ② 제1항에도 불구하고 척추지압술(Chiroparactic, 추나요법 등)이나 침술(부항, 뜸 포\n(1)\n함) 치료로 인한 의료비는 치료받는 국가의 법에서 정한 병원 및 의사의 면허를 가진\n상해 자에 의하여 치료를 받은 경우에 한하며, 하나의 상해에 대하여 US $1000.00 한도\n의료비 로 보상합니다.\n\n보장 세부구성\n보상하는 사항\n종목 항목\n③ 제1항의 상해에는 유독가스 또는 유독물질을 우연하게도 일시에 흡입, 흡수 또는 섭취\n한 결과로 생긴 중독증상을 포함합니다. 그러나 세균성 음식물 중독과 상습적으로 흡\n입, 흡수 또는 섭취한 결과로 생긴 중독증상은 이에 포함되지 않습니다.\n④ 해외체류 중에 피보험자가 입은 상해로 인해 치료를 받던 중 보험기간이 끝났을 경우\n에는 보험기간 종료일로부터 180일까지(보험기간 종료일은 제외합니다) 보상합니다.\n\n① 회사는 피보험자가 보험증권에 기재된 해외체류 중에 상해를 입고, 이로 인해 국내 의\n료기관ㆍ약국에서 치료를 받은 때에는 <붙임2>에 따라 보상합니다. 다만, 보험기간이\n1년 미만인 경우에는 해외체류 중에 피보험자가 입은 상해로 보험기간 종료후 30일\n국내(급여)\n(보험기간 종료일은 제외합니다) 이내에 의사의 치료를 받기 시작했을 때에는 의사의\n치료를 받기 시작한 날부터 180일(통원은 180일 동안 90회)까지만(보험기간 종료일\n은 제외합니다) 보상합니다.\n① 회사는 피보험자가 보험증권에 기재된 해외체류 중에 질병으로 인하여 해외의료기관\n에서 의사(치료받는 국가의 법에서 정한 병원 및 의사의 면허를 가진 자에 한함)의 치\n료를 받은 때에는 보험가입금액을 한도로 피보험자가 실제 부담한 의료비 전액을 보\n상합니다.\n② 제1항에도 불구하고 척추지압술(Chiroparactic, 추나요법 등)이나 침술(부항, 뜸 포\n해외 함) 치료로 인한 의료비는 치료받는 국가의 법에서 정한 병원 및 의사의 면허를 가진\n자에 의하여 치료를 받은 경우에 한하며, 하나의 질병에 대하여 US $1,000.00 한도\n(2) 로 보상합니다.\n질병 ③ 해외체류 중에 피보험자가 제1항의 질병으로 인해 치료를 받던 중 보험기간이 끝났을\n경우에는 보험기간 종료일로부터 180일까지(보험기간 종료일은 제외합니다) 보상합\n의료비 니다.\n① 회사는 피보험자가 보험증권에 기재된 해외체류 중에 발생한 질병으로 인해 국내 의료\n기관ㆍ약국에서 치료를 받은 때에는 <붙임3>에 따라 보상합니다. 다만, 보험기간이 1\n년 미만인 경우에는 해외체류 중에 질병을 원인으로 하여 보험기간 종료후 30일(보험\n국내(급여)\n기간 종료일은 제외합니다) 이내에 의사의 치료를 받기 (이하 생략)"}, {"title": "회사는 기본형 해외장기체류 실손의료보험 특별약관을 상해의료비형, 질병의료비형 등 2가지 이내의 보장종목으로 제4조(보상하지 않는 사항)", "text": "회사가 보상하지 않는 사항은 다음과 같습니다.\n보장 세부구성\n보상하지 않는 사항\n종목 항목\n① 회사는 다음의 사유로 인하여 생긴 의료비는 보상하지 않습니다.\n1. 피보험자가 고의로 자신을 해친 경우. 다만, 피보험자가 심신상실 등으로 자유로\n운 의사결정을 할 수 없는 상태에서 자신을 해친 사실이 증명된 경우에는 보상합\n니다.\n2. 보험수익자가 고의로 피보험자를 해친 경우. 다만, 그 보험수익자가 보험금의 일\n부 보험수익자인 경우에는 다른 보험수익자에 대한 보험금은 지급합니다.\n3. 계약자가 고의로 피보험자를 해친 경우\n4. 피보험자가 임신, 출산(제왕절개를 포함합니다), 산후기로 입원한 경우. 다만, 회사\n가 보상하는 상해로 인하여 입원한 경우에는 보상합니다.\n5. 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동으로 인한 경우\n6. 피보험자가 정당한 이유 없이 입원기간 중 의사의 지시를 따르지 않거나 의사가\n통원치료가 가능하다고 인정함에도 피보험자 본인이 자의적으로 입원하여 발생한\n입원의료비\n7. 피보험자가 정당한 이유 없이 통원기간 중 의사의 지시를 따르지 않아 발생한 통\n원의료비\n② 회사는 다른 약정이 없으면 피보험자가 직업, 직무 또는 동호회 활동 목적으로 한 다음\n(1) 의 어느 하나에 해당하는 행위로 인하여 생긴 상해에 대해서는 보상하지 않습니다.\n1. 전문등반(전문적인 등산용구를 사용하여 암벽 또는 빙벽을 오르내리거나 특수한\n상해\n기술, 경험, 사전 훈련이 필요한 등반을 말합니다), 글라이더 조종, 스카이다이빙,\n의료비 해외 스쿠버다이빙, 행글라이딩, 수상보트, 패러글라이딩\n2. 모터보트ㆍ자동차 또는 오토바이에 의한 경기, 시범, 행사(이를 위한 연습을 포함\n합니다) 또는 시운전(다만, 공용도로에서 시운전을 하는 동안 발생한 상해는 보상\n합니다)\n3. 선박에 탑승하는 것을 직무로 하는 사람이 직무상 선박에 탑승하고 있는 동안\n③ 회사는 다음의 의료비에 대하여는 보상하지 않습니다.\n1. 건강검진(단, 검사결과 이상 소견에 따라 건강검진센터 등에서 발생한 추가 의료\n비용은 보상합니다.), 예방접종, 인공유산에 든 비용. 다만, 회사가 보상하는 상해\n치료를 목적으로 하는 경우에는 보상합니다.\n2. 영양제, 비타민제, 호르몬 투여, 보신용 투약, 친자 확인을 위한 진단, 불임검사,\n불임수술, 불임복원술, 보조생식술(체내, 체외 인공수정을 포함합니다), 성장촉진,\n의약외품과 관련하여 소요된 비용. 다만, 회사가 보상하는 상해 치료를 목적으로\n하는 경우에는 보상합니다.\n3. 의치, 의수족, 의안, 안경, 콘택트렌즈, 보청기, 목발, 팔걸이(Arm Sling), 보조기 등\n진료 재료의 구입 및 대체 비용. 다만, 인공장기 등 신체에 이식되어 그 기능을 대\n신하는 경우에는 보상합니다.\n4. 외모개선 목적의 치료로 인하여 발생한 의료비\n가. 쌍꺼풀수술(이중검수술. 다만, 안검하수, 안검내반 등을 치료하기 위한 시력개선\n목적의 이중검수술은 보상합니다), 코성형수술(융비술), 유방 확대(다만, 유방암\n환자의 유방재건술은 보상합니다)·축소술, (이하 생략)"}, {"title": "회사는 기본형 해외장기체류 실손의료보험 특별약관을 상해의료비형, 질병의료비형 등 2가지 이내의 보장종목으로 제4조의2(특별약관에서 보상하는 사항)", "text": "① 제3조 및 제4조에도 불구하고 다음 각 호에 해당하는 국내 상해의료비 및 국내 질병의료비는 기본형 해외장기체\n1. 비급여의료비\n2. 제1호와 관련하여 자동차보험(공제를 포함합니다) 또는 산재보험에서 발생한 본인부담의료비\n② 제1항 제1호 및 제2호에서 정한 의료비와 다른 의료비가 함께 청구되어 각 항목별 의료비가 구분되지 않는 경우\n회사는 보험금 지급금액 결정을 위해 계약자, 피보험자 또는 보험수익자에게 각각의 의료비에 대한 확인을 요청\n할 수 있습니다.\n\n제4관 보험금의 지급"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제5조(보험가입금액의 한도 등)", "text": "① 이 계약의 보험가입금액은 (1)상해의료비 해외, (2)질병의료비 해외의 경우 각각에 대하여 계약시 계약자가 선택\n한 금액, (1)상해의료비 국내(급여), (2)질병의료비 국내(급여)의 경우 각각에 대하여 연간 5천만원 이내에서 회사\n가 정한 금액 중 계약자가 선택한 금액을 말하며, 제3조(보장종목별 보상내용)에 의한 의료비를 이 금액 한도 내\n에서 보상합니다.\n② 이 계약에서 ‘연간’이라 함은 계약일로부터 매1년 단위로 도래하는 계약해당일 전일까지의 기간을 말하며, 입원\n또는 통원 치료시 해당일이 속한 보험연도의 보험가입금액 한도를 적용합니다.\n③ (1)상해의료비 국내(급여), (2)질병의료비 국내(급여)의 경우 제1항 및 제2항에도 불구하고 「국민건강보험법」에\n따른 본인부담금 상한제 또는「의료급여법」에 따른 본인부담금 보상제 및 본인부담금 상한제 적용항목은 실제 본\n인이 부담한 금액(「국민건강보험법」 또는 「의료급여법」 등 관련 법령에서 사전 또는 사후 환급이 가능한 금액은\n제외한 금액)을 한도로 제3조(보장종목별 보상내용) 및 제4조(보상하지 않는 사항)에 따라 보상합니다.\n④ (1)상해의료비 국내(급여) 및 (2)질병의료비 국내(급여)는 제3조(보장종목별 보상내용)에서 정한 입원의 경우 보상\n금액을 제외한 나머지 금액(‘「국민건강보험법」에서 정한 요양급여 또는 「의료급여법」에서 정한 의료급여 중 본\n인부담금’(본인이 실제로 부담한 금액을 말합니다)의 20%에 해당하는 금액)이 계약일 또는 매년 계약해당일부터\n기산하여 연간 200만원을 초과하는 경우 그 초과금액은 제1항의 한도 내에서 보상합니다.\n⑤ 제3조(보장종목별 보상내용)에서 정한 통원의 경우 (1)상해의료비 국내(급여) 또는 (2)질병의료비 국내(급여) 각각\n에 대하여 통원 1회당 20만원 이내에서 회사가 정한 금액 중 계약자가 선택한 금액의 한도 내에서 보상합니다.\n⑥ <붙임2> 국내 의료기관 의료비 중 보상하는 상해의료비 제4항 또는 제5항, <붙임3> 국내 의료기관 의료비 중 보\n상하는 질병의료비 제3항 또는 제4항에 따른 계속중인 입원 또는 통원의 보상한도는 연간 보험가입금액에서 직전\n보험기간 종료일까지 지급한 금액을 차감한 잔여 금액을 한도로 적용합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제5조의2(보험가입금액의 한도 등에 대한 설명 의무)", "text": "① 회사는 제18조(약관교부 및 설명의무)에 따라 계약자가 청약할 때에 약관의 중요한 내용을 설명할 경우, 제5조(보\n험가입금액의 한도 등)의 내용도 함께 설명하여 드립니다.\n② 제1항에 따라 보험가입금액 한도 등을 설명할 때에, 회사는 계약자에게 <붙임4> 국내 의료기관 의료비 중 보상하\n지 않는 상해의료비 제3항, <붙임5> 국내 의료기관 의료비 중 보상하지 않는 질병의료비 제3항 및 제5조(보험가\n입금액 한도 등) 제3항의 ‘본인부담금 상한제’ 및 ‘본인부담금 보상제’에 대한 사항을 구체적으로 설명하여 드립\n니다.\n\n※ 「국민건강보험법」에 따른 본인부담금 상한제 : 요양급여비용 중 본인이 부담한 비용의 연간 총액이 일정 상\n한액(국민건강보험 지역가입자의 세대별 보험료 부담수준 또는 직장가입자의 개인별 보험료 부담수준에 따라\n국민건강보험법 등 관련 법령에서 정한 금액(81만원~584만원))을 초과하는 경우 그 초과액을 국민건강보험\n공단이 부담하는 제도\n\n※ 「의료급여법」에 따른 본인부담금 보상제 : 수급권자의 급여대상 본인부담금이 매 30일간 다음 금액을 초과\n하는 경우, 초과금액의 50%에 해당하는 금액을 의료급여기금 등이 부담하는 제도\n1. 1종 수급권자 : 2만원\n2. 2종 수급권자 : 20만원\n※ 「의료급여법」에 따른 본인부담금 상한제 : 본인부담금 보상제에 따라 지급받은 금액을 차감한 급여대상 본\n인부담금이 다음 금액을 초과하는 경우, 그 초과액 전액을 의료급여기금 등이 부담하는 제도\n\n1. 1종 수급권자 : 매 30일간 5만원\n2. 2종 수급권자 : 연간 80만원(다만, 의료법 제3조 제2항 제3호 라목에 따른 요양병원에 연간 240일을 초\n과하여 입원한 경우에는 연간 120만원으로 한다.)\n\n다만, 관련 법령 등이 변경되는 경우 변경된 기준을 따릅니다. (상기 예시금액은 2021.5월 기준)\n\n44 한화글로벌안심보험"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제6조(보험금 지급사유 발생의 통지)", "text": "계약자, 피보험자 또는 보험수익자는 제3조(보장 종목별 보상내용)에서 정한 보험금 지급사유가 발생 한 것을\n알았을 때에는 지체 없이 그 사실을 회사에 알려야 합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제7조(보험금의 청구)", "text": "① 보험수익자는 다음의 서류를 제출하고 보험금을 청구하여야 합니다.\n1. 청구서 (회사 양식)\n2. 사고증명서 (진료비계산서, 진료비세부내역서, 입원치료확인서, 의사처방전(처방조제비) 등)\n3. 신분증(주민등록증이나 운전면허증 등 본인임을 확인할 수 있는 사진이 붙은 정부기관에서 발행한 신분증,\n본인이 아닌 경우에는 본인의 인감증명서 또는 본인서명사실확인서 포함)\n4. 그 밖에 보험수익자가 보험금 수령에 필요하여 제출하는 서류\n② 제1항제2호의 사고증명서는 「의료법」 제3조(의료기관)에서 규정한 국내의 의료기관 또는 국외의 의료관련법에서\n정한 의료기관에서 발급한 것이어야 합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제8조(보험금의 지급절차)", "text": "① 회사는 제7조(보험금의 청구)에서 정한 서류를 접수한 때에는 접수증을 드리고 휴대전화 문자메시지 또는 전자우\n편 등으로도 송부하며, 그 서류를 접수한 날부터 3영업일 이내에 보험금을 지급합니다.\n② 제1항에도 불구하고 회사는 보험금 지급사유를 조사․확인하기 위하여 제1항의 지급기일 이내에 보험금을 지급하\n지 못할 것으로 명백히 예상되는 경우에는 그 구체적인 사유와 지급예정일 및 보험금 가지급제도(회사가 추정하\n는 보험금의 50% 이내의 금액을 지급하는 제도를 말합니다)에 대하여 피보험자 또는 보험수익자에게 즉시 통지\n하여 드립니다. 다만, 지급예정일은 다음 각 호의 어느 하나에 해당하는 경우를 제외하고는 제7조(보험금의 청구)\n에서 정한 서류를 접수한 날부터 30영업일 이내에서 정합니다.\n1. 소송제기\n2. 분쟁조정 신청\n3. 수사기관의 조사\n4. 외국에서 발생한 보험사고에 대한 조사\n5. 제5항에 따른 회사의 조사요청에 대한 동의 거부 등 계약자, 피보험자 또는 보험수익자에게 책임이 있는 사\n유로 보험금 지급사유의 조사와 확인이 지연되는 경우\n6. 제7항에 따라 보험금 지급사유에 대해 제3자의 의견에 따르기로 한 경우\n③ 제2항에 따라 추가적인 조사가 이루어지는 경우 회사는 보험수익자의 청구에 따라 회사가 추정하는 보험금의\n50% 상당액을 가지급보험금으로 지급합니다.\n④ 회사는 제1항에서 정한 지급기일 내에 보험금을 지급하지 않았을 때(제2항에서 정한 지급예정일을 통지한 경우를\n포함합니다)에는 그 다음 날부터 지급일까지의 기간에 대하여 [부표] ‘보험금을 지급할 때의 적립이율’에 따라 연\n단위 복리로 계산한 금액을 보험금에 더하여 지급합니다. 다만, 계약자, 피보험자 또는 보험수익자에게 책임이 있\n는 사유로 지급이 지연된 경우에는 그 기간에 대한 이자는 지급하지 않습니다. 다만, 회사는 계약자 등이 분쟁조\n정을 신청했다는 사유만으로 이자지급을 거절하지 않습니다.\n⑤ 계약자, 피보험자 또는 보험수익자는 제14조(알릴 의무 위반의 효과) 및 제2항의 보험금 지급사유조사와 관련하여\n의료기관, 국민건강보험공단, 경찰서 등 관공서에 대한 회사의 서면에 의한 조사요청에 동의하여야 합니다. 다만,\n정당한 사유 없이 이에 동의하지 않을 경우 회사는 사실 확인이 끝날 때까지 보험금 지급지연에 따른 이자를 지\n급하지 않습니다.\n⑥ 회사는 제5항의 서면조사에 대한 동의 요청시 조사목적, 사용처 등을 명시하고 설명합니다.\n⑦ 보험수익자와 회사가 제3조(보장종목별 보상내용)의 보험금 지급사유에 대해 합의하지 못할 때는 보험수익자와\n회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있습니다. 제3자는 「의료법」 제3조(의료기관)에 규정된\n종합병원 소속 전문의 중에서 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n⑧ 회사는 계약자, 피보험자 또는 보험수익자에게 「국민건강보험법」상 본인부담금 상한제, 「의료급 여법」상 본인부\n담금 상한제 및 보상제와 관련한 확인요청을 할 수 있습니다.\n⑨ 회사는 보험금 지급금액 결정을 위해 확 (이하 생략)"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제9조(보험금을 받는 방법의 변경)", "text": "① 계약자(보험금 지급사유 발생 후에는 보험수익자를 말합니다)는 회사의 사업방법서에서 정한 바에 따라 보험금의\n전부 또는 일부에 대하여 나누어 지급받거나 일시에 지급받는 방법으로 변경할 수 있습니다.\n② 회사는 제1항에 따라 일시에 지급할 금액을 나누어 지급하는 경우에는 나중에 지급할 금액에 대하여 ‘보험개발원\n이 공시하는 월평균 정기예금이율’을 연단위 복리로 계산한 금액을 더하여 지급하며, 나누어 지급할 금액을 일시\n에 지급하는 경우에는 ‘보험개발원이 공시하는 월평균 정기예금이율’을 연단위 복리로 할인한 금액을 지급합니\n다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제10조(주소변경의 통지)", "text": "① 계약자(보험수익자가 계약자와 다른 경우 보험수익자를 포함합니다)는 주소 또는 연락처가 변경된 경우에는 지체\n없이 그 변경내용을 회사에 알려야 합니다.\n② 제1항에서 정한 대로 계약자 또는 보험수익자가 변경내용을 알리지 않은 경우에는 계약자 또는 보험수익자가 회\n사에 알린 최종 주소 또는 연락처로 등기우편 등 우편물에 대한 기록이 남는 방법을 통하여 회사가 알린 사항은\n일반적으로 도달에 필요한 기간이 지난 때에 계약자 또는 보험수익자에게 도달된 것으로 봅니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제11조(대표자의 지정)", "text": "① 계약자 또는 보험수익자가 2명 이상인 경우에는 각 대표자를 1명 지정하여야 하며, 그 대표자는 각각 다른 계약자\n또는 보험수익자를 대리하는 것으로 합니다.\n② 지정된 계약자 또는 보험수익자의 소재가 확실하지 않은 경우에는 이 계약에 관하여 회사가 계약자 또는 보험수익\n자 1명에 대하여 한 행위는 각각 다른 계약자 또는 보험수익자에게도 효력이 미칩니다.\n③ 계약자가 2명 이상인 경우에는 연대하여 그 책임을 집니다.\n\n제5관 계약자의 계약 전 알릴 의무 등\n\n46 한화글로벌안심보험"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제12조(계약 전 알릴 의무)", "text": "계약자 또는 피보험자는 청약할 때(진단계약의 경우에는 건강진단을 할 때를 말합니다) 청약서에서 질문한 사항에\n대하여 알고 있는 사실을 반드시 사실대로 알려야(상법에 따른 “고지의무”와 같으며, 이하 “계약 전 알릴 의무”라\n합니다) 합니다. 다만, 진단계약의 경우 「의료법」 제3조(의료기관)에 따른 종합병원이나 병원에서 직장 또는 개인\n이 실시한 건강진단서 사본 등 건강상태를 판단할 수 있는 자료로 건강진단을 대신할 수 있습니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제13조(상해보험계약 후 알릴 의무)", "text": "① 계약자 또는 피보험자는 보험기간 중에 피보험자에게 다음 각 호의 변경이 발생한 경우에는 우편, 전화, 방문 등의\n방법으로 지체없이 회사에 알려야 합니다.\n1. 보험증권 등에 기재된 직업 또는 직무의 변경\n가. 현재의 직업 또는 직무가 변경된 경우\n나. 직업이 없는 자가 취직한 경우\n다. 현재의 직업을 그만둔 경우\n【직업】\n1) 생계유지 등을 위하여 일정한 기간동안(예: 6개월 이상) 계속하여 종사하는 일\n2) 1)에 해당하지 않는 경우에는 개인의 사회적 신분에 따르는 위치나 자리를 말함\n예) 학생, 미취학아동, 무직 등\n\n【직무】직책이나 직업상 책임을 지고 담당하여 맡은 일\n\n2. 보험증권 등에 기재된 피보험자의 운전 목적이 변경된 경우\n예) 자가용에서 영업용으로 변경, 영업용에서 자가용으로 변경 등\n3. 보험증권 등에 기재된 피보험자의 운전여부가 변경된 경우\n예) 비운전자에서 운전자로 변경, 운전자에서 비운전자로 변경 등\n4. 이륜자동차(자동차관리법상 이륜차로 분류되는 삼륜 또는 사륜의 자동차를 포함) 또는 원동기장치 자전거(전\n동킥보드, 전동이륜평행차, 전동기의 동력만으로 움직일 수 있는 자전거 등 개인형 이동장치를 포함)를 계\n속적으로 사용(직업, 직무 또는 동호회 활동과 출퇴근용도 등으로 주로 사용하는 경우에 한함)하게 된 경우\n(다만, 전동휠체어, 의료용 스쿠터 등 보행보조용 의자차는 제외합니다.)\n② 회사는 제1항의 통지로 인하여 위험의 변동이 발생한 경우에는 제20조(계약내용의 변경 등)에 따라 계약내용을\n변경할 수 있습니다.\n\n[위험변경에 따른 계약변경 절차]\n위험변경사항 통지\n(우편, 전화, 방문 등)\n↓\n계약자,피보험자의 계약변경사항 확인 후 청약\n↓\n계약변경사항 인수 심사\n↓\n정산금액 처리\n(환급 또는 추가납입)\n↓\n계약변경 완료\n\n③ 회사는 제2항에 따라 계약내용을 변경할 때 위험이 감소된 경우에는 보험료를 감액하고, 이후 기간 보장을 위한\n재원인 계약자적립액 등의 차이로 인하여 발생한 정산금액(이하 “정산금액”이라 합니다)을 환급하여 드립니다. 한\n편 위험이 증가된 경우에는 보험료의 증액 및 정산금액의 추가납입을 요구할 수 있으며, 계약자는 이를 납입하여\n\n야 합니다.\n④ 제1항의 통지에 따라 위험의 증가로 보험료를 더 내야 할 경우 회사가 청구한 추가보험료(정산금액을 포함합니다)\n를 계약자가 납입하지 않았을 때, 회사는 위험이 증가되기 전에 적용된 보험요율(이하 ‘변경전 요율’이라 합니다)\n의 위험이 증가된 후에 적용해야 할 보험요율(이하 ‘변경후 요율’이라 합니다)에 대한 비율에 따라 보험금을 삭감\n하여 지급합니다. 다만, 증가된 위험과 관계없이 발생한 보험금 지급사유에 관해서는 원래대로 지급합니다.\n⑤ 계약자 또는 피보험자가 고의 또는 중대한 과실로 제1항 각 호의 변경사실을 회사에 알리지 않았을 경우 변경후\n요율이 변경전 요율보다 높을 때에는 회사는 그 변경사실을 안 날부터 1개월 이내에 계약자 또는 피보험자에게\n제4항에 따라 보장됨을 통보하고 이에 따라 보험금을 지급합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제14조(알릴 의무 위반의 효과)", "text": "① 회사는 다음과 같은 사실이 있을 경우에는 보험금 지급사유의 발생 여부에 관계없이 그 사실을 안 날부터 1개월\n이내에 이 계약을 해지할 수 있습니다.\n1. 계약자나 피보험자가 고의 또는 중대한 과실로 제12조(계약 전 알릴 의무)를 위반하고 그 알릴 의무가 있\n는 사항이 중요한 사항에 해당하는 경우\n2. 계약자나 피보험자가 고의 또는 중대한 과실로 뚜렷한 위험의 증가와 관련된 제13조(상해보험계약 후 알릴\n의무) 제1항에서 정한 계약 후 알릴 의무를 이행하지 않았을 때\n② 제1항제1호의 경우라도 다음의 어느 하나에 해당하는 경우에는 회사는 계약을 해지할 수 없습니다.\n1. 회사가 계약 당시에 그 사실을 알았거나 과실로 인하여 알지 못하였을 때\n2. 회사가 그 사실을 안 날부터 1개월 이상 지났거나 또는 제1회 보험료를 받은 날부터 보험금 지급사유가 발\n생하지 않고 2년(진단계약의 경우 질병에 대해서는 1년)이 지났을 때\n3. 계약체결일부터 3년이 지났을 때\n4. 이 계약을 청약할 때 회사가 피보험자의 건강상태를 판단할 수 있는 기초자료(건강진단서 사본 등을 말합니\n다)에 따라 승낙한 경우에 건강진단서 사본 등에 명기되어 있는 사항으로 보험금 지급사유가 발생하였을\n때. 다만, 계약자 또는 피보험자가 회사에 제출한 기초자료의 내용 중 중요사항을 고의로 사실과 다르게 작\n성한 때에는 계약을 해지할 수 있습니다.\n5. 보험설계사 등이 다음의 어느 하나에 해당하는 행위를 하였을 때. 다만, 보험설계사 등이 다음의 행위를 하\n지 않았더라도 계약자 또는 피보험자가 사실대로 고지하지 않거나 부실하게 고지했다고 인정되는 경우에는\n계약을 해지할 수 있습니다.\n가. 계약자 또는 피보험자에게 고지할 기회를 주지 않았을 때\n나. 계약자 또는 피보험자가 사실대로 고지하는 것을 방해하였을 때\n다. 계약자 또는 피보험자에게 사실대로 고지하지 않게 하였거나 부실하게 고지하도록 권유했을 때\n③ 제1항에 따른 계약의 해지가 보험금 지급사유 발생 전에 이루어진 경우, 이로 인하여 회사가 환급하여야 할 보험\n료가 있을 경우에는 회사는 제31조(보험료의 환급) 제1항에 따라 이를 계약자에게 지급합니다.\n④ 제1항 제1호에 의한 계약의 해지가 보험금 지급사유 발생 후에 이루어진 경우에 회사는 보험금을 지급하지 않으\n며, 계약 전 알릴 의무 위반사실(계약해지 등의 원인이 되는 위반사실을 구체적으로 명시)뿐만 아니라 계약 전 알\n릴 의무사항이 중요한 사항에 해당되는 사유를 “반대증거가 있는 경우 이의를 제기할 수 있습니다”라는 문구와\n함께 계약자에게 서면 또는 전자문서 등으로 알려 드립니다. 회사가 전자문서로 안내하고자 할 경우에는 계약자\n에게 서면 또는 「전자서명법」 제2조 제2호에 따른 전자서명으로 동의를 얻어 수신확인을 조건으로 전자문서를\n송신하여야 합니다. 계약자의 전자문서 수신이 확인되기 전까지는 그 전자문서는 송신되지 않은 것으로 봅니다.\n회사는 전자문서가 수신되지 않은 것을 확인한 경우에는 서면(등기우편 등)으로 다시 알려드립니다. 또한 이 경우\n계약 해지로 인하여 (이하 생략)"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제15조(사기에 의한 계약)", "text": "48 한화글로벌안심보험\n계약자 또는 피보험자가 대리진단이나 약물사용을 통하여 진단절차를 통과하거나, 진단서를 위조 또는 변조하거나,\n청약일 이전에 암 또는 사람면역결핍바이러스(HIV) 감염의 진단 확정을 받은 후 이를 숨기고 가입하는 등 사기에\n의하여 계약이 성립되었음을 회사가 증명하는 경우에는 회사는 계약일부터 5년 이내(사기사실을 안 날부터 1개월\n이내)에 계약을 취소할 수 있습니다.\n\n제6관 보험계약의 성립과 유지"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제16조(보험계약의 성립)", "text": "① 계약은 계약자의 청약과 회사의 승낙으로 이루어집니다.\n② 회사는 피보험자가 계약에 적합하지 않은 경우에는 승낙을 거절하거나 별도의 조건(보험가입금액 제한, 일부보장\n제외, 보험금 삭감, 보험료 할증 등을 말합니다)을 붙여 승낙할 수 있습니다.\n③ 회사는 계약의 청약을 받고, 보험료 전액 또는 제1회 보험료를 받은 경우에 건강진단을 받지 않는 계약은 청약일,\n진단계약은 진단일(재진단의 경우에는 최종 진단일을 말합니다)부터 30일 이내에 승낙하거나 거절하여야 하며,\n승낙한 경우에는 보험증권을 드립니다. 이 경우 30일 이내에 회사가 승낙 또는 거절의 통지를 하지 않으면 승낙\n한 것으로 봅니다.\n④ 회사가 제1회 보험료를 받고 승낙을 거절한 경우에는 거절통지와 함께 받은 금액을 돌려 드리며, 보험료를 받은\n기간에 대하여 보험개발원이 공시하는 월평균 정기예금이율에 + 1%를 더한 이율을 연단위 복리로 계산한 금액을\n더하여 지급합니다. 다만, 제1회 보험료를 신용카드로 납입한 계약의 승낙을 거절하는 경우 회사는 신용카드의 매\n출을 취소하며 이자를 더하여 지급하지 않습니다.\n➄ 회사가 제2항에 따라 일부보장 제외 조건을 붙여 승낙하였더라도 청약일로부터 5년(갱신형 계약의 경우에는 최초\n청약일로부터 5년)이 지나는 동안 보장이 제외되는 질병으로 추가 진단(단순 건강검진 제외) 또는 치료 사실이 없\n을 경우, 청약일로부터 5년이 지난 이후에는 이 약관에 따라 보장합니다.\n➅ 제5항의 ‘청약일로부터 5년이 지나는 동안’이라 함은 이 약관 제25조(보험료의 납입이 연체되는 경우 납입최고\n(독촉)와 계약의 해지)에서 정한 계약의 해지가 발생하지 않은 경우를 말합니다.\n➆ 이 약관 제26조(보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))에서 정한 계약의 부활이 이루어진 경우\n부활을 청약한 날을 제5항의 청약일로 하여 적용합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제17조(청약의 철회)", "text": "① 계약자는 보험증권을 받은 날부터 15일 이내에 그 청약을 철회할 수 있습니다. 다만, 다음 각 호의 어느 하나에\n해당하는 계약은 철회할 수 없습니다.\n1. 회사가 건강상태 진단을 지원하는 계약\n2. 보험기간이 90일 이내인 계약\n3. 전문금융소비자가 체결한 계약\n【전문금융소비자】\n보험계약에 관한 전문성, 자산규모 등에 비추어 보험계약에 따른 위험감수능력이 있는 자로서, 국가, 지방자\n치단체, 한국은행, 금융회사, 주권상장법인 등을 포함하며 「금융소비자 보호에 관한 법률」제2조(정의) 제9\n호에서 정하는 전문금융소비자를 말합니다.\n\n【일반금융소비자】\n전문금융소비자가 아닌 계약자를 말합니다.\n② 제1항에도 불구하고 청약한 날부터 30일이 지나면 청약을 철회할 수 없습니다.\n③ 청약철회는 계약자가 전화로 신청하거나, 철회의사를 표시하기 위한 서면, 전자우편, 휴대전화 문자메시지 또는 이\n에 준하는 전자적 의사표시(이하 ‘서면 등’이라 합니다)를 발송한 때 효력이 발생합니다. 계약자는 서면 등을 발\n\n송한 때에 그 발송 사실을 회사에 지체 없이 알려야 합니다.\n④ 계약자가 청약을 철회한 때에는 회사는 청약의 철회를 접수한 날부터 3영업일 이내에 납입한 보험료를 계약자에\n게 돌려드리며, 보험료 반환이 늦어진 기간에 대하여는 ‘보험개발원이 공시하는 보험계약대출이율’을 연단위 복\n리로 계산한 금액을 더하여 지급합니다. 다만, 계약자가 제1회 보험료 등을 신용카드로 납입한 계약의 청약을 철\n회하는 경우에는 회사는 청약의 철회를 접수한 날부터 3영업일 이내에 해당 신용카드회사로 하여금 대금청구를\n하지 않도록 해야 하며, 이 경우 회사는 보험료를 반환한 것으로 봅니다.\n⑤ 청약을 철회할 때에 이미 보험금 지급사유가 발생하였으나 계약자가 그 보험금 지급사유가 발생한 사실을 알\n지 못한 경우에는 청약철회의 효력이 발생하지 않습니다.\n⑥ 제1항에서 보험증권을 받은 날에 대한 다툼이 발생한 경우 회사가 이를 증명하여야 합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제18조(약관교부 및 설명의무)", "text": "① 회사는 계약자가 청약할 때에 계약자에게 약관의 중요한 내용을 설명하여야 하며, 청약 후에 다음 각 호의 방법\n중 계약자가 원하는 방법을 확인하여 지체 없이 약관 및 계약자 보관용 청약서를 제공하여 드립니다. 만약, 회사\n가 전자우편 및 전자적 의사표시로 제공한 경우 계약자 또는 그 대리인이 약관 및 계약자 보관용 청약서 등을 수\n신하였을 때에는 해당 문서를 드린 것으로 봅니다.\n1. 서면교부\n2. 우편 또는 전자우편\n3. 휴대전화 문자메시지 또는 이에 준하는 전자적 의사표시\n② 제1항과 관련하여 통신판매계약의 경우, 회사는 계약자가 가입한 특약만 포함한 약관을 드리며, 전화를 이용하여\n체결하는 계약은 계약자의 동의를 얻어 다음의 방법으로 약관의 중요한 내용을 설명할 수 있습니다.\n1. 전화를 이용하여 청약내용, 보험료납입, 보험기간, 계약 전 알릴 의무, 약관의 중요한 내용 등 계약을 체결\n하는 데 필요한 사항을 질문 또는 설명하는 방법. 이 경우 계약자의 답변과 확인내용을 음성 녹음함으로써\n약관의 중요한 내용을 설명한 것으로 봅니다.\n\n【통신판매계약】전화ㆍ우편ㆍ인터넷 등 통신수단을 이용하여 체결하는 계약을 말합니다.\n\n③ 다음의 어느 하나의 경우 계약자는 계약이 성립한 날부터 3개월 이내에 계약을 취소할 수 있습니다.\n1. 회사가 제1항에 따라 제공하여야 할 약관 및 계약자 보관용 청약서를 계약자가 청약할 때 계약자에게 전달\n하지 않았거나 약관의 중요한 내용을 설명하지 않은 경우\n2. 계약을 체결할 때 계약자가 청약서에 자필서명을 하지 않은 경우(도장을 찍는 날인과 「전자서명법」 제2조\n제2호에 따른 전자서명을 포함합니다.)\n④ 제3항에도 불구하고 전화를 이용하여 계약을 체결하는 경우 다음의 각 호의 어느 하나를 충족하는 때에는 자필서\n명을 생략할 수 있으며, 제2항의 규정에 따른 음성녹음 내용을 문서화한 확인서를 계약자에게 드림으로써 계약자\n보관용 청약서를 전달한 것으로 봅니다.\n1. 계약자, 피보험자 및 보험수익자가 동일한 계약의 경우\n2. 계약자, 피보험자가 동일하고 보험수익자가 계약자의 법정상속인인 계약일 경우\n⑤ 제3항에 따라 계약이 취소된 경우에는 회사는 이미 납입한 보험료를 계약자에게 돌려 드리며, 보험료를 받은 기간\n에 대하여 ‘보험개발원이 공시하는 보험계약대출이율’을 연단위 복리로 계산한 금액을 더하여 지급합니다.\n⑥ 회사는 관계 법규에 따라 피보험자가 될 사람이 다른 실손 의료보험계약을 체결하고 있는지를 확인하고, 그 결과\n피보험자가 될 사람이 다른 실손 의료보험계약의 피보험자로 되어 있는 경우에는 보상방식 등을 구체적으로 설명\n하여 드립니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제19조(계약의 무효)", "text": "① 계약을 체결할 때 계약에서 정한 피보험자의 나이에 미달되거나 초과되었을 경우에는 계약을 무효로 하며, 이\n미 납입한 보험료를 돌려 드립니다. 다만, 회사가 나이의 착오를 발견하였을 때 이미 계약나이에 도달한 경우에\n는 해당 계약은 유효한 계약으로 보며, 이미 납입한 보험료는 돌려드리지 않습니다.\n② 회사의 고의 또는 과실로 계약이 무효로 된 경우 및 회사가 승낙 전에 무효임을 알았거나 알 수 있었음에도\n보험료를 반환하지 않은 경우에는 보험료를 납입한 날의 다음 날부터 반환일까지의 기간에 대하여 회사는 이\n계약의 보험계약대출이율을 연단위 복리로 계산한 금액을 더하여 돌려 드립니다.\n\n50 한화글로벌안심보험"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제20조(계약내용의 변경 등)", "text": "①계약자는 회사의 승낙을 받아 다음의 사항을 변경할 수 있습니다. 이 경우 회사는 승낙사실을 서면 등으로 알리거\n나 보험증권의 뒷면에 적어 드립니다.\n1. 보험종목 또는 보장 종목\n2. 보험기간\n3. 보험료 납입주기, 납입방법 및 납입기간\n4. 계약자, 보험가입금액 등 그 밖의 계약내용\n② 계약자가 제1회 보험료를 납입한 날부터 1년 이상 지난 유효한 계약으로서 그 보험 종목의 변경을 요청할 경우\n회사는 회사의 사업방법서에서 정하는 방법에 따라 보험 종목을 변경하여 드립니다.\n③ 계약자가 제1항제4호에 따라 보험가입금액을 감액하려는 경우 회사는 그 감액된 부분은 계약이 해지된 것으로 보\n며, 이로 인하여 회사가 지급하여야 할 해약환급금이 있을 때에는 제31조(보험료의 환급) 제1항에 따라 이를 계\n약자에게 지급합니다.\n④ 계약자는 회사의 승낙 없이 보험수익자를 변경할 수 있습니다. 다만, 변경된 보험수익자가 회사에 권리자로서 대\n항하기 위해서는 계약자가 보험수익자가 변경되었음을 회사에 통지하여야 합니다.\n⑤ 제4항에 따라 보험수익자를 변경하려는 계약자는 보험금의 지급사유가 발생하기 전에 피보험자가 서면으로 동의\n하여야 합니다.\n⑥ 제1항에 따라 계약자가 변경된 경우 회사는 변경된 계약자에게 보험증권 및 약관을 드리고, 변경된 계약자가 요청\n하는 경우 약관의 중요한 내용을 설명하여 드립니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제21조(보험나이 등)", "text": "① 이 약관에서 피보험자의 나이는 보험나이를 기준으로 합니다.\n② 제1항의 보험나이는 계약일 현재 피보험자의 실제 만 나이를 기준으로 6개월 미만의 끝수는 버리고 6개월 이상의\n끝수는 1년으로 하여 계산하며, 이후 매년 계약해당일에 나이가 증가하는 것으로 합니다.\n\n【유의사항】\n해당연도의 계약해당일이 없을 경우에는 해당월의 말일을 계약해당일로 합니다.\n\n③ 피보험자의 나이 또는 성별에 관한 기재사항이 사실과 다른 경우에는 정정된 나이 또는 성별에 해당하는 보험금\n및 보험료로 변경합니다.\n\n【보험나이 계산 예시】\n생년월일: 1988년 10월 2일, 현재(계약일): 2014년 4월 13일\n⇒ 2014년 4월 13일 - 1988년 10월 2일 = 25년 6월 11일 = 26세\n\n【유의사항】\n청약서 및 보험증권 등 보험계약을 증명하기 위한 문서에서 피보험자의 나이 또는 성별에 관한 기재사항이\n신분증(주민등록증, 운전면허증, 사진이 붙은 정부기관 발행 신분증)에 기재된 사실과 다른 경우에는 정정된\n나이 또는 성별에 해당하는 보험금 및 보험료로 변경합니다. 정정된 나이 또는 성별에 해당하는 보험금 및\n보험료로 변경 시 「보험료 및 해약환급금 산출방법서」에 따라 보험료의 차액을 정산합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제22조(계약의 소멸)", "text": "피보험자가 사망하여 이 약관에서 규정하는 보험금 지급사유가 더 이상 발생할 수 없는 경우에는 이 계약은 그\n때부터 효력이 없습니다.\n\n제7관 보험료의 납입"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제23조(제1회 보험료 및 회사의 보장개시)", "text": "① 회사는 계약의 청약을 승낙하고 계약자로부터 제1회 보험료를 받은 때부터 이 약관에서 정한 바에 따라 보장을\n합니다. 또한, 회사가 청약과 함께 제1회 보험료를 받은 후 승낙한 경우에도 제1회 보험료를 받은 때부터 보장이\n개시됩니다. 다만, 계약자가 제1회 보험료를 자동이체 또는 신용카드로 납입하는 경우에는 자동이체 신청 및 신용\n카드매출 승인에 필요한 정보를 제공한 때를 제1회 보험료를 받은 때로 하며, 계약자에게 책임이 있는 사유로 자\n동이체 또는 매출승인이 불가능한 경우에는 보험료가 납입되지 않은 것으로 봅니다.\n② 회사가 청약과 함께 제1회 보험료를 받고 청약을 승낙하기 전에 보험금 지급사유가 발생하였을 때에도 보장개시\n일부터 이 약관에서 정하는 바에 따라 보장을 합니다.\n【보장개시일】\n회사가 보장을 개시하는 날로서 계약이 성립되고 제1회 보험료를 받은 날을 말하나, 회사가 승낙하기 전이라\n도 청약과 함께 제1회 보험료를 받은 경우에는 제1회 보험료를 받은 날을 말합니다. 또한, 보장개시일을 계\n약일로 봅니다.\n③ 회사는 제2항에도 불구하고 다음의 어느 하나에 해당하는 경우에는 보장을 하지 않습니다.\n1. 제12조(계약 전 알릴 의무)에 따라 계약자 또는 피보험자가 회사에 알린 내용 또는 건강진단 내용이 보험\n금 지급사유의 발생에 영향을 미쳤음을 회사가 증명하는 경우\n2. 제14조(알릴 의무 위반의 효과)를 준용하여 회사가 보장을 하지 않을 수 있는 경우\n3. 진단계약에서 보험금 지급사유 발생 시까지 피보험자가 진단을 받지 않은 경우. 다만, 진단계약에서 진단을\n받지 않은 경우라도 상해로 보험금 지급사유가 발생한 경우에는 보장을 해드립니다.\n④ 계약이 갱신되는 경우에는 제1항부터 제3항까지의 규정에 따른 보장은 기존 계약에 의한 보장이 종료하는 때부터\n적용합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제24조(제2회 이후 보험료의 납입)", "text": "계약자는 제2회부터의 보험료를 납입기일까지 납입하여야 하며, 계약자가 보험료를 납입한 경우 회사는 영수증\n을 발행하여 드립니다. 다만, 금융회사(우체국을 포함합니다)를 통하여 보험료를 납입한 경우에는 그 금융회사\n가 발행한 증명서류를 영수증으로 대신합니다.\n\n【납입기일】\n계약자가 제2회부터의 보험료를 납입하기로 한 날을 말합니다.\n\n제25조(보험료의 납입이 연체되는 경우 납입최고(독촉)와 계약의 해지)\n① 계약자가 제2회 부터의 보험료를 납입기일까지 납입하지 않아 보험료 납입이 연체 중인 경우 회사는 14일(보험기\n간이 1년 미만인 경우에는 7일) 이상의 기간을 납입최고(독촉)기간(납입최고기간의 마지막 날이 영업일이 아닐\n때에는 최고(독촉)기간은 그 다음 날까지로 합니다)으로 정하여 다음 사항에 대하여 서면(등기우편 등), 전화(음성\n녹음) 또는 전자문서 등으로 알려드립니다. 다만, 계약이 해지되기 전에 발생한 보험금 지급사유에 대하여 회사는\n보상합니다.\n1. 계약자(보험수익자와 계약자가 다른 경우 보험수익자를 포함합니다)에게 납입최고(독촉)기간 내에 연체보험\n료를 납입하여야 한다는 내용\n2. 납입최고(독촉)기간이 끝나는 날까지 보험료를 납입하지 않을 경우 납입최고(독촉)기간이 끝나는 날의 다음\n날에 계약이 해지된다는 내용. 이 경우 계약이 해지되면 즉시 해약환급금에서 보험계약대출원금과 이자가\n차감된다는 내용을 포함합니다.\n② 회사가 제1항에 따른 납입최고(독촉) 등을 전자문서로 안내하려는 경우에는 계약자에게 서면, 「전자서명법」 제2\n조 제2호에 따른 전자서명으로 동의를 받아 수신확인을 조건으로 전자문서를 송신하여야 하며, 계약자가 전자문\n서에 대하여 수신을 확인하기 전까지는 그 전자문서는 송신되지 않은 것으로 봅니다.\n③ 회사는 제2항에 따른 확인 결과 전자문서가 수신되지 않은 것을 알았을 때에는 제1항에서 정한 내용을 서면(등기\n우편 등) 또는 전화(음성녹음)로 다시 알려 드립니다.\n④ 회사가 제1항에 따라 계약이 해지된 경우에는 제31조(보험료의 환급) 제1항에 따른 해약환급금을 계약자에게\n지급합니다.\n\n제26조(보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))\n\n52 한화글로벌안심보험\n① 제25조(보험료의 납입이 연체되는 경우 납입최고(독촉)와 계약의 해지)에 따라 계약이 해지되었으나 계약자가 제\n31조(보험료의 환급)에 따른 환급금을 받지 않은 경우 계약자는 해지된 날부터 3년 이내에 회사가 정한 절차에\n따라 계약의 부활(효력회복)을 청약할 수 있습니다. 회사가 부활(효력회복)을 승낙한 경우에는 계약자는 부활(효력\n회복)을 청약한 날까지의 연체된 보험료에 ‘보험개발원이 공시하는 월평균 정기예금이율에 1%를 더한 이율의’\n범위 내에서 각 상품별로 회사가 정하는 이율로 계산한 금액을 더하여 납입하여야 합니다.\n② 제1항에 따라 해지계약을 부활(효력회복)하는 경우에는 제12조(계약 전 알릴 의무), 제14조(알릴 의무 위반의 효\n과), 제15조(사기에 의한 계약), 제16조(보험계약의 성립) 및 제23조(제1회 보험료 및 회 (이하 생략)"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제28조(계약자의 임의해지)", "text": "① 계약자는 계약이 소멸하기 전에 언제든지 계약을 해지할 수 있으며, 계약이 해지된 경우 회사가 환급하여야 할 보\n험료가 있을 경우에는 제31조(보험료의 환급)에 따라 이를 계약자에게 지급합니다.\n② 보험금 지급사유 발생으로 회사가 보험금을 지급한 때에도 보험가입금액이 감액되지 않은 경우에는 계약자는 그\n보험금 지급사유 발생 후에도 계약을 해지할 수 있습니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제28조의2(위법계약의 해지)", "text": "① 계약자는 ｢금융소비자 보호에 관한 법률｣ 제47조 및 관련규정이 정하는 바에 따라 계약체결에 대한 회사의 법위\n반사항이 있는 경우 계약체결일부터 5년 이내의 범위에서 계약자가 위반사항을 안 날부터 1년 이내에 계약해지요\n구서에 증빙서류를 첨부하여 위법계약의 해지를 요구할 수 있습니다.\n② 회사는 해지요구를 받은 날부터 10일 이내에 수락여부를 계약자에 통지하여야 하며, 거절할 때에는 거절 사유를\n함께 통지하여야 합니다.\n③ 계약자는 회사가 ｢금융소비자 보호에 관한 법률 시행령｣ 제38조제4항의 각 호에서 정하는 정당한 사유 없이 제1\n항의 요구를 따르지 않는 경우 해당 계약을 해지할 수 있습니다.\n④ 제1항 및 제3항에 따라 계약이 해지된 경우 회사는 제31조(보험료의 환급) 제1항제1호에 따른 해약환급금을 계약\n자에게 지급합니다.\n⑤ 계약자는 제1항에 따른 제척기간에도 불구하고 민법 등 관계 법령에서 정하는 바에 따라 법률상의 권리를 행사할\n수 있습니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제29조(중대사유로 인한 해지)", "text": "① 회사는 다음과 같은 사실이 있을 경우에는 그 사실을 안 날부터 1개월 이내에 계약을 해지할 수 있습니다.\n1. 계약자, 피보험자 또는 보험수익자가 보험금(보험료 납입면제를 포함합니다)을 지급받을 목적으로 고의로 상\n해 또는 질병을 발생시킨 경우\n2. 계약자, 피보험자 또는 보험수익자가 보험금 청구에 관한 서류에 고의로 사실과 다른 것을 적었거나 그 서\n류 또는 증거를 위조 또는 변조한 경우. 다만, 이미 보험금 지급사유가 발생한 경우에는 보험금 지급에 영\n향을 미치지 않습니다.\n② 회사는 제1항에 따라 계약을 해지한 경우 그 사실을 계약자에게 통지하고, 해지시 회사가 환급하여야 할 보험료가\n있을 경우에는 제31조(보험료의 환급)에 따라 이를 계약자에게 지급합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제30조(회사의 파산선고와 해지)", "text": "① 회사가 파산의 선고를 받은 경우 계약자는 계약을 해지할 수 있습니다.\n② 제1항에 따라 해지하지 않은 계약은 파산선고 후 3개월이 지나면 그 효력을 잃습니다.\n③ 제1항에 따라 계약이 해지되거나 제2항에 따라 계약이 효력을 잃는 경우 회사는 제31조(보험료의 환급)에 따른\n환급금을 계약자에게 지급합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제31조(보험료의 환급)", "text": "① 이 계약이 무효, 효력상실, 해지 또는 소멸된 때에는 다음과 같이 보험료를 돌려드립니다.\n1. 계약자, 피보험자 또는 보험수익자의 책임없는 사유에 의하는 경우 : 무효의 경우에는 회사에 납입한 보험\n료의 전액, 효력상실, 해지 또는 소멸의 경우에는 경과하지 아니한 기간에 대하여 일단위로 계산한 보험료\n2. 계약자, 피보험자 또는 보험수익자의 책임있는 사유에 의하는 경우 : 이미 경과한 기간에 대하여 단기요율\n(1년미만의 기간에 적용되는 요율)로 계산한 보험료를 뺀 잔액. 다만, 계약자, 피보험자 또는 보험수익자의\n고의 또는 중대한 과실로 무효가 된 때에는 보험료를 돌려드리지 아니합니다.\n② 보험기간이 1년을 초과하는 계약이 무효, 효력상실 또는 소멸인 경우에는 무효, 효력상실 또는 소멸의 원인이 생\n긴 날 또는 해지일이 속하는 보험년도의 보험료는 제1항의 규정을 적용하고 그 이후의 보험년도에 속하는 보험료\n는 전액을 돌려드립니다.\n③ 계약의 무효, 효력상실, 해지 또는 소멸로 인하여 회사가 환급하여야 할 보험료가 있을 때에는 계약자는 환급금을\n청구하여야 하며, 회사는 청구일의 다음 날부터 지급일까지의 기간에 대하여 ‘보험개발원이 공시하는 보험계약대\n출이율’을 연단위 복리로 계산한 금액을 더하여 지급합니다.\n\n제9관 다수보험의 처리 등"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제32조(다수보험의 처리)", "text": "① 다수보험의 경우 각 계약의 보장대상의료비 및 보장책임액에 따라 제2항에서 정한 방법으로 계산된 각 계약의 비\n례분담액을 지급합니다.\n② 각 계약의 보상책임액 합계액이 각 계약의 보상대상의료비 중 최고액에서 각 계약의 피보험자부담 공제금액 중 최소\n액을 차감한 금액을 초과한 다수보험은 아래의 산출방식에 따라 각 계약의 비례분담액을 계산합니다.\n\n각 계약별 비례분담액 =\n(각 계약의 보장대상의료비 중 최고액 - 각 계약의 피보험자부담 공제금액 중 각 계약별 보장책임액\n×\n최소액) 각 계약별 보장책임액을 합한 금액"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제33조(연대책임)", "text": "① 2009년 10월 1일 이후에 신규로 체결된 보험수익자가 동일한 다수보험의 경우 보험수익자는 보험금
