전부 또는\n일부의 지급을 다수계약이 체결되어 있는 회사 중 한 회사에 청구할 수 있고, 청구를 받은 회사는 해당 보험금을\n이 계약의 보험가입금액 한도내에서 지급합니다.\n② 제1항에 따라 보험금을 지급한 회사는 보험수익자가 다른 회사에 대하여 가지는 해당 보험금청구권을 취득합니다.\n\n54 한화글로벌안심보험\n다만, 회사가 지급한 금액이 보험수익자가 다른 회사에 청구할 수 있는 보험금의 일부인 경우에는 해당 보험금\n청구권을 침해하지 않는 범위에서 그 권리를 취득합니다.\n\n제10관 분쟁의 조정 등"}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제34조(분쟁의 조정)", "text": "① 계약에 관하여 분쟁이 있는 경우 분쟁 당사자 또는 기타 이해관계인과 회사는 금융감독원장에게 조정을 신청할\n수 있으며, 분쟁조정 과정에서 계약자는 관계 법령이 정하는 바에 따라 회사가 기록 및 유지･관리하는 자료의 열\n람(사본의 제공 또는 청취를 포함한다)을 요구할 수 있습니다.\n② 회사는 일반금융소비자인 계약자가 조정을 통하여 주장하는 권리나 이익의 가액이 ｢금융소비자 보호에 관한 법률\n｣ 제42조에서 정하는 일정 금액 이내인 분쟁사건에 대하여 조정절차가 개시된 경우에는 관계 법령이 정하는 경우\n를 제외하고는 소를 제기하지 않습니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제35조(관할법원)", "text": "이 계약에 관한 소송 및 민사조정은 계약자의 주소지를 관할하는 법원이 하는 것으로 합니다. 다만, 회사와 계약\n자가 합의하여 관할법원을 달리 정할 수 있습니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제36조(소멸시효)", "text": "보험금 청구권, 보험료 또는 환급금 반환청구권은 3년간 행사하지 않으면 소멸시효가 완성됩니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제37조(약관의 해석)", "text": "① 회사는 신의성실의 원칙에 따라 공정하게 약관을 해석하며, 계약자에 따라 다르게 해석하지 않습니다.\n② 회사는 약관의 뜻이 명백하지 않은 경우에는 계약자에게 유리하게 해석합니다.\n③ 회사는 보상하지 않는 사항 등 계약자나 피보험자에게 불리하거나 부담을 주는 내용은 확대하여 해석하지 않습니\n다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제38조(설명서 교부 및 보험안내자료 등의 효력)", "text": "① 회사는 일반금융소비자에게 청약을 권유하거나 일반금융소비자가 설명을 요청하는 경우 보험상품에 관한 중요한\n사항을 계약자가 이해할 수 있도록 설명하고 계약자가 이해하였음을 서명(「전자서명법」 제2조 제2호에 따른 전\n자서명을 포함), 기명날인 또는 녹취 등을 통해 확인받아야 하며, 설명서를 제공하여야 합니다.\n② 설명서, 약관, 계약자 보관용 청약서 및 보험증권의 제공 사실에 관하여 계약자와 회사 간에 다툼이 있는 경우에는\n회사가 이를 증명하여야 합니다.\n③ 보험설계사 등이 모집과정에서 사용한 회사 제작의 보험안내자료(계약의 청약을 권유하기 위하여 만든 자료 등을\n말합니다)의 내용이 약관의 내용과 다른 경우에는 계약자에게 유리한 내용으로 계약이 성립된 것으로 봅니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제39조(회사의 손해배상책임)", "text": "① 회사는 계약과 관련하여 임직원, 보험설계사 또는 대리점에 책임이 있는 사유로 계약자, 피보험자 및 보험수익자\n에게 손해를 입힌 경우에는 관계 법령 등에 따라 손해를 배상할 책임을 집니다.\n② 회사는 보험금 지급 거절 및 지연지급의 사유가 없음을 알았거나 알 수 있었는데도 소송을 제기하여 계약자, 피보\n험자 또는 보험수익자에게 손해를 입힌 경우에는 그에 따른 손해를 배상할 책임을 집니다.\n③ 회사가 보험금 지급 여부 및 지급금액에 관하여 현저하게 불공정한 합의로 보험수익자에게 손해를 입힌 경우에도\n회사는 제2항에 따라 손해를 배상할 책임을 집니다.\n④ 회사가 제18조(약관교부 및 설명의무) 제6항에 따른 의무를 이행하지 않아 계약자가 다수의 실손의료보험에 가입\n한 경우, 회사는 계약자에게 손해를 배상할 책임을 집니다.\n⑤ 회사가 제4항에 따라 계약자에게 손해를 배상할 책임이 발생한 경우 계약자는 이 계약의 최초계약일부터 5년 이\n내에 회사에 손해배상을 청구할 수 있고, 이 계약의 최초계약일부터 손해배상을 청구하기 전까지 납입한 보험료\n와 이에 대한 이자(보험료를 받은 기간에 대하여 보험계약대출이율을 연단위 복리로 계산한 금액)를 합한 금액을\n\n손해배상액으로 합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제40조(개인정보보호)", "text": "① 회사는 이 계약과 관련된 개인정보를 이 계약의 체결, 유지, 보험금 지급 등을 위하여「개인정보 보호법」,「신용정\n보의 이용 및 보호에 관한 법률」 등 관계 법령에서 정한 경우를 제외하고 계약자, 피보험자 또는 보험수익자의\n동의없이 수집, 이용, 조회 또는 제공하지 않습니다. 다만, 회사는 이 계약의 체결, 유지, 보험금 지급 등을 위하여\n위 관계 법령에 따라 계약자 및 피보험자의 동의를 받아 다른 보험회사 및 보험관련단체 등에 개인정보를 제공할\n수 있습니다.\n② 회사는 계약과 관련된 개인정보를 안전하게 관리하여야 합니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제41조(준거법)", "text": "이 계약은 대한민국 법에 따라 규율되고 해석되며, 약관에서 정하지 않은 사항은 ｢금융소비자 보호에 관한 법률｣,\n상법, 민법 등 관계 법령을 따릅니다."}, {"title": "류 실손의료보험 특별약관에서 보상하지 않습니다. 제42조(예금보험에 의한 지급보장)", "text": "회사가 파산 등으로 보험금 등을 지급하지 못할 경우에는 「예금자보호법」에서 정하는 바에 따라 그 지급을 보장\n합니다.\n\n56 한화글로벌안심보험\n<붙임1> 용어의 정의\n용 어 정 의\n계약 보험계약\n진단계약 계약을 체결하기 위하여 피보험자가 건강진단을 받아야 하는 계약\n보험증권 계약의 성립과 계약내용을 증명하기 위하여 회사가 계약자에게 드리는 증서\n계약자 보험회사와 계약을 체결하고 보험료를 납입하는 사람\n피보험자 보험금지급사유 또는 보험사고 발생의 대상(객체)이 되는 사람\n보험수익자 보험금을 수령하는 사람\n보험기간 회사가 계약에서 정한 보상책임을 지는 기간\n회사 보험회사\n피보험자가 보험증권에 기재된 교환교수, 주재원 등을 목적으로 주거지를 출발하여 교환교\n해외장기체류 중\n수, 주재원 등을 마치고 주거지에 도착할 때까지의 기간\n당해연도 계약해당일부터 차년도 계약해당일 전일까지 매1년 단위의 연도. 예를 들어 보\n보험연도 험계약일이 2021년7월1일인 경우 보험연도는 2021년7월1일부터 2022년6월30일까지 1\n년이 됩니다.\n회사가 지급할 금전에 대한 이자를 줄 때 1년마다 마지막 날에 그 이자를 원금에 더한\n연단위복리\n금액을 다음 1년의 원금으로 하는 이자 계산방법\n회사가 영업점에서 정상적으로 영업하는 날을 말하며, 토요일, 「관공서의 공휴일에 관한\n영업일 규정」에 따른 공휴일 및 대체공휴일, ‘근로자의 날 제정에 관한 법률’에 따른 근로자의 날은\n제외\n상해 보험기간 중 발생한 급격하고 우연한 외래의 사고\n상해보험계약 상해를 보장하는 계약\n의사 「의료법」 제2조(의료인)에서 정한 의사, 한의사 및 치과의사의 면허를 가진 사람\n약사 「약사법」 제2조(정의)에서 정한 약사 및 한약사의 면허를 가진 사람\n다음 각호의 의료기관\n1.「의료법」 제3조(의료기관) 제2항에서 정하는 의료기관을 말하며, 종합병원·병원·치과병\n의료기관 원·한방병원·요양병원·의원·치과의원·한의원(조산원 제외)\n2. 「국민건강보험법」 제42조제1항제4호에 의한 보건소‧보건의료원‧보건지소 및 동법 제42\n조제1항제5호에 의한 보건진료소\n「약사법」 제2조 제3호에 따른 장소로서, 약사가 수여(授與)할 목적으로 의약품 조제업\n약국 무를 하는 장소를 말하며, 의료기관의 조제실은 제외하며「국민건강보험법」제42조제1항제\n3호에 의한 한국 희귀･필수의약품센터를 포함함\n\n의사가 피보험자의 질병 또는 상해로 인하여 치료가 필요하다고 인정한 경우로서 자택 등\n입원 에서 치료가 곤란하여 의료기관 또는 이와 동등하다고 인정되는 의료기관에 입실하여 계\n속하여 6시간 이상 체류하면서 의사의 관찰 및 관리 하에 치료를 받는 것\n\n입원의 정의 중 ‘이 보건소, 보건의료원 및 보건지소 등 「의료법」 제3조(의료기관) 제2항에서 정한 의료기관\n와 동등하다고 인정 에 준하는 의료기관으로서 군의무대, 치매요양원, 노인요양원 등에 속해 있는 요양원, 요\n되는 의료기관’ 양시설, 복지시설 등과 같이 의료기관이 아닌 곳은 이에 해당되지 않음\n\n입원실료 입원치료 중 발생한 기준병실 사용료, 환자 관리료, 식대 등\n\n입 (이하 생략)"}, {"title": "비급여 해외장기체류 실손의료비 특별약관 제1조(보장종목)", "text": "내), 질병 비급여형(국내), 3대비급여형(국내)의 3개 보장종목으로 구성되어있습니다.\n\n보장 종목 보상하는 내용\n\n피보험자가 해외체류 중에 입은 상해로 인하여 의료기관에 입원 또는 통원하여 비급\n상해 비급여(국내)\n여주) 치료를 받거나 비급여 처방조제를 받은 경우에 보상(3대비급여 제외)\n\n피보험자가 해외체류 중에 질병으로 인하여 의료기관에 입원 또는 통원하여 비급여\n질병 비급여(국내)\n치료를 받거나 비급여 처방조제를 받은 경우에 보상(3대비급여 제외)\n\n피보험자가 해외체류 중에 입은 상해 또는 질병의 치료목적으로 의료기관에 입원 또\n3대 비급여(국내)\n는 통원하여 3대비급여 치료를 받은 경우에 보상\n\n주)「국민건강보험법」 또는 「의료급여법」에 따라 보건복지부장관이 정한 비급여 대상 (「국민건강보험법」에서 정\n한 요양급여 또는 「의료급여법」에서 정한 의료급여 절차를 거쳤지만 급여항목이 발생하지 않은 경우로 「국민\n건강보험법」 또는 「의료급여법」에 따른 비급여항목 포함)\n※ 건강보험심사평가원에서는 국민 알 권리 증진 및 의료기관 선택에 도움이 될 수 있도록 비급여 진료비용을 공개\n하고 있으며, 의료기관 등에서 진료를 받고 지불한 비급여(전액 본인부담금포함) 진료비용이 건강보험(의료급여)\n에 해당되는지 확인할 수 있도록 비급여 진료비 확인제도를 운영하고 있습니다."}, {"title": "회사가 판매하는 비급여 해외장기체류 실손의료보험 특별약관(이하 ‘특별약관’이라 합니다)은 상해 비급여형(국 제2조(용어의 정의)", "text": "① 이 특별약관에서 사용하는 용어의 뜻은 다음과 같습니다.\n3대비급여\n용 어 정 의\n치료\n치료자가 손(정형용 교정장치 장비 등의 도움을 받는 경우를 포함합니다)을\n이용해서 환자의 근골격계통(관절, 근육, 연부조직, 림프절 등)의 기능 개선 및\n도수치료 통증감소를 위하여 실시하는 치료행위\n\n「도수치료·체외충 * 의사 또는 의사의 지도하에 물리치료사가 도수치료를 하는 경우에 한함\n격파치료·증식치료 체외에서 충격파를 병변에 가해 혈관 재형성을 돕고 건(힘줄) 및 뼈의 치유\n」 체외충격파\n과정을 자극하거나 재활성화 시켜 기능개선 및 통증감소를 위하여 실시하는\n치료\n치료행위(체외충격파쇄석술은 제외)\n근골격계 통증이 있는 부위의 인대나 건(힘줄), 관절, 연골 등에 증식물질을\n증식치료\n주사하여 통증이 소실되거나 완화되는 것을 유도하는 치료행위\n주사료 주사치료시 사용된 행위, 약제 및 치료재료대\n\n식품의약품안전처가 「의약품등 분류번호에 관한 규정」에 따라 지정하는\n‘조직세포의 기능용 의약품’ 중 ‘종양용약’과 ‘조직세포의 치료 및 진단 목\n주사료 적제제’*\n항암제\n*「의약품등 분류번호에 관한 규정」에 따른 의약품분류표가 변경되는 경우\n치료시점의 의약품분류표에 따릅니다.\n\n66 한화글로벌안심보험\n3대비급여\n용 어 정 의\n치료\n식품의약품안전처가 「의약품등 분류번호에 관한 규정」에 따라 지정하는\n‘항병원생물성 의약품’ 중 ‘항생물질제제’, ‘화학요법제’ 및 ‘기생동물에 대\n항생제 한 의약품 중 항원충제’*\n(항진균제 포함)\n*「의약품등 분류번호에 관한 규정」에 따른 의약품분류표가 변경되는 경우\n치료시점의 의약품분류표에 따릅니다.\n\n식품의약품안전처장이「희귀의약품 지정에 관한 규정」에 따라 지정하는 의약\n품*\n희귀의약품\n*「희귀의약품 지정에 관한 규정」에 따른 희귀의약품 지정 항목이 변경되\n는 경우 치료시점의 희귀의약품 지정 항목에 따릅니다.\n\n자기공명영상 장치를 이용하여 고주파 등을 통한 신호의 차이를 영상화하여 조직의 구조를\n분석하는 검사(MRI/MRA)\n\n자기공명영상진단 * 자기공명영상진단 결과를 다른 의료기관에서 판독하는 경우 포함\n\n(보건복지부에서 고시하는 「건강보험 행위 급여ㆍ비급여 목록 및 급여 상대가치점수」상의\nMRI 범주에 따름)\n입원의료비 입원실료, 입원제비용, 입원수술비, 비급여 병실료\n실제 부담액 - 보장제외금액*\n보장대상의료비 * 제3관 회사가 보장하지 않는 사항에 따른 금액 및 비급여 병실료 중 회사가 보장하지 않\n는 금액\n\n상급병실료 차액 상급병상을 이용함에 따라 요양급여 대상인 입원료 외에 추가료 부담하는 입원실 이용 비용\n\n② 제1항에서 정하지 않은 용어의 뜻은 기본형 해외장기체류 실손의료보험 특별약관 제2조(용어정의)를 준용합니다."}, {"title": "회사가 판매하는 비급여 해외장기체류 실손의료보험 특별약관(이하 ‘특별약관’이라 합니다)은 상해 비급여형(국 제3조(보장종목별 보상내용)", "text": "회사가 이 계약의 보험기간 중 보상하거나 공제하는 내용은 보장종목별로 다음과 같습니다.\n\n보장종목 보상하는 사항\n\n① 회사는 피보험자가 상해로 인하여 의료기관에 입원 또는 통원(외래 및 처방조제)하여 치료를\n받은 경우에는 비급여의료비(3대비급여는 제외합니다)를 제5조(보험가입금액의 한도 등)에서\n정한 연간 보험가입금액의 한도 내에서 다음과 같이 보상합니다. 다만, 법령 등에 따라 의료비\n(1) 를 감면받거나 의료기관으로부터 의료비를 감면받은 경우(의료비를 납부하는 대가로 수수한\n금액 등은 감면받은 의료비에 포함)에는 감면 후 실제 본인이 부담한 의료비 기준으로 계산하\n상해\n며, 감면받은 의료비가 근로소득에 포함된 경우, 「국가유공자 등 예우 및 지원에 관한 법률」\n비급여 및 「독립유공자 예우에 관한 법률」에 따라 의료비를 감면받은 경우에는 감면 전 의료비로 비\n급여 의료비를 계산합니다.\n구분 보상금액\n\n보장종목 보상하는 사항\n\n구분 보상금액\n\n입원(입원실료,입\n‘비급여 의료비(비급여병실료는 제외합니다)’(본인이 실제로 부담한 금액을\n원제비용,입원수술\n말합니다)의 70%에 해당하는 금액\n비)\n\n비급여 병실료의 50%. 다만, 1일 평균금액 10만원을 한도로 하며, 1일 평\n상급병실료 차액 균금액은 입원기간 동안 비급여 병실료 전체를 총 입원일수로 나누어 산출\n합니다.\n\n통원 1회당(외래 및 처방·조제비 합산) ‘비급여 의료비(비급여병실료는 제\n외합니다)’(본인이 실제로 부담한 금액을 말합니다)에서 ＜표1>의 ‘통원항\n목별 공제금액’을 뺀 금액(매년 계약해당일부터 1년간 통원 100회를 한도\n로 합니다.)\n＜표1> 통원항목별 공제금액\n통원\n(외래제비용, 항 목 공제금액\n외래수술비, 「국민건강보험법」 제42조제1항제1호에 의한 의료기\n처방조제비) 관, 동법 제42조제1항제4호에 의한 보건소･보건의료\n3만원과 보장대상 의\n원･보건지소, 동법 제42조제1항제5호에 의한 보건진\n료비의 30% 중 큰\n료소에서의 외래 및 「국민건강보험법」 제42조제1항\n금액\n제2호에 의한 약국, 동법 제42조제1항제3호에 의한\n한국희귀･필수의약품센터에서의 처방･조제)\n\n② 제1항의 상해에는 유독가스 또는 유독물질을 우연히 일시에 흡입, 흡수 또는 섭취한 결과로 생\n긴 중독증상이 포함됩니다. 다만, 유독가스 또는 유독물질을 상습적으로 흡입, 흡수 또는 섭취\n한 결과로 생긴 중독증상과 세균성 음식물 중독증상은 포함되지 않습니다.\n③ 피보험자가 입원하여 치료를 받던 중 보험계약이 종료되더라도 그 계속 중인 입원에 대해서는\n다음 예시와 같이 보험계약 종료일 다음날부터 180일까지 보상합니다.\n④ 피보험자가 통원하여 치료를 받던 중 보험계약이 종료되더라도 그 계속 중인 통원에 대해서는\n다음 예시와 같이 보험계약 종료일 다음날부터 180일 이내의 통원을 보상하며 최대 90회 한\n도 내에서 보상합니다.\n\n<입원 및 통원 보상기간 예시>\n\n보상대상기간 보상대상기간 보상대상기간 추가보상\n(1년) (1년) (1년) (180일)\n↑계약일 ↑\n계약해당일 ↑\n계약해당일 ↑\n계약종료일 보상종 (이하 생략)"}, {"title": "자기공명영상진단을 받거나 동일한 부위에 대해 2회 이상 이 특별약관에서 정한 자기공 제4조(보상하지 않는 사항)", "text": "회사가 보상하지 않는 사항은 보장종목별로 다음과 같습니다.\n\n보장종목 보상하지 않는 사항\n① 회사는 다음의 사유로 인하여 생긴 비급여 의료비는 보상하지 않습니다.\n1. 피보험자가 고의로 자신을 해친 경우. 다만, 피보험자가 심신상실 등으로 자유로운 의사결정\n을 할 수 없는 상태에서 자신을 해친 사실이 증명된 경우에는 보상합니다.\n2. 보험수익자가 고의로 피보험자를 해친 경우. 다만, 그 보험수익자가 보험금의 일부 보험수익\n자인 경우에는 다른 보험수익자에 대한 보험금은 지급합니다.\n3. 계약자가 고의로 피보험자를 해친 경우\n4. 피보험자가 임신, 출산(제왕절개를 포함합니다), 산후기로 입원 또는 통원한 경우. 다만, 회사가\n보상하는 상해로 인하여 입원 또는 통원한 경우에는 보상합니다.\n5. 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동으로 인한 경우\n6. 피보험자가 정당한 이유없이 입원기간 중 의사의 지시를 따르지 않거나 의사가 통원치료가 가\n능하다고 인정함에도 피보험자 본인이 자의적으로 입원하여 발생한 입원의료비\n7. 피보험자가 정당한 이유없이 통원기간 중 의사의 지시를 따르지 않아 발생한 통원의료비\n② 회사는 다른 약정이 없으면 피보험자가 직업, 직무 또는 동호회 활동 목적으로 한 다음의 어\n느 하나에 해당하는 행위로 인하여 생긴 상해에 대해서는 보상하지 않습니다.\n1. 전문등반(전문적인 등산용구를 사용하여 암벽 또는 빙벽을 오르내리거나 특수한 기술, 경험,\n사전 훈련이 필요한 등반을 말합니다), 글라이더 조종, 스카이다이빙, 스쿠버다이빙, 행글라\n이딩, 수상보트, 패러글라이딩\n2. 모터보트ㆍ자동차 또는 오토바이에 의한 경기, 시범, 행사(이를 위한 연습을 포함합니다) 또는\n시운전(다만, 공용도로에서 시운전을 하는 동안 발생한 상해는 보상합니다)\n3. 선박에 탑승하는 것을 직무로 하는 사람이 직무상 선박에 탑승하고 있는 동안\n③ 회사는 다음의 비급여 의료비에 대해서는 보상하지 않습니다.\n(1) 1. 치과치료(다만, 안면부 골절로 발생한 의료비는 치아관련 치료를 제외하고 제3조(보장종목별\n상해 보상내용)에 따라 보상합니다) 및 한방치료(다만, 「의료법」 제2조에 따른 한의사를 제외한\n비급여 ‘의사’의 의료행위에 의해서 발생한 의료비는 보상합니다)\n2. 영양제, 비타민제 등의 약제와 관련하여 소요된 비용. 다만 약관상 보상하는 상해를 치료함\n에 있어 아래 각목에 해당하는 경우는 치료 목적으로 보아 보상합니다.\n가. 약사법령에 의하여 약제별 허가사항 또는 신고된 사항(효능/효과 및 용법/용량 등)대로\n사용된 경우\n나. 요양급여 약제가 관련 법령 또는 고시 등에서 정한 별도의 적용기준대로 비급여 약제로\n사용된 경우\n다. 요양급여 약제가 관련 법령에 따라 별도의 비급여사용승인 절차를 거쳐 그 승인 내용대\n로 사용된 경우\n라. 상기 가목 부터 다목의 약제가 두 가지 이상 함께 사용된 경우(함께 사용된 약제중 어\n느 하나라도 상기 가목 부터 다목에 해당하지 않는 경우 제외)\n3. 호르몬 투여, 보신용 투약, 의약외품과 관련하여 소요된 비용\n4 (이하 생략)"}, {"title": "자기공명영상진단을 받거나 동일한 부위에 대해 2회 이상 이 특별약관에서 정한 자기공 제5조(보험가입금액 한도 등)", "text": "① 이 계약의 연간 보험가입금액은 제3조(보장종목별 보상내용) (1)상해비급여에 대하여 입원과 통원의 보상금액을\n합산하여 5천만원 이내에서, (2)질병비급여에 대하여 입원과 통원의 보상금액을 합산하여 5천만원 이내에서 회사\n가 정한 금액 중 계약자가 선택한 금액을 말하며, 제3조(보장종목별 보상내용)에 의한 비급여의료비를 이 금액 한\n도 내에서 보상합니다. 다만, (3)3대비급여의 보험가입금액은 제3조(보장종목별 보상내용) (3)3대비급여 제1항에\n서 정한 연간 보상한도로 합니다.\n② 이 계약에서 ‘연간’이라 함은 계약일로부터 매1년 단위로 도래하는 계약해당일 전일까지의 기간을 말하며, 입원\n또는 통원 치료시 해당일이 속한 연도의 보험가입금액 한도를 적용합니다.\n③ 제3조(보장종목별 보상내용)에서 정한 통원의 경우 (1)상해비급여 또는 (2)질병비급여 각각에 대하여 통원 1회당\n20만원 이내에서 회사가 정한 금액 중 계약자가 선택한 금액으로 하며, (3)3대 비급여의 경우 각 비급여의료비별\n보상한도로 합니다.\n④ 제3조(보장종목별 보상내용) (1)상해비급여 제3항 부터 제4항, (2)질병비급여 제2항 부터 제3항 및 (3)3대비급여\n제7항에 따른 계속중인 입원 또는 통원의 보상한도는 연간 보상한도(보험가입금액)에서 직전 보험기간 종료일까\n지 지급한 금액을 차감한 잔여 금액과 연간 보상한도(횟수)에서 직전 보험기간 종료일까지 보상한 횟수를 차감한\n잔여 횟수를 한도로 적용합니다."}, {"title": "자기공명영상진단을 받거나 동일한 부위에 대해 2회 이상 이 특별약관에서 정한 자기공 제6조(비급여 진료비용 공개제도 등의 안내)", "text": "있도록 「의료법」등 관계 법령에 따른 ‘비급여 진료비용 공개제도’와 ‘비급여 진료 사전설명제도’에 대해 설명하\n고 안내합니다.\n\n※ 비급여 진료비용 공개제도 : 국민이 쉽게 이해하고 의료기관을 선택할 때 참고할 수 있도록 건강보험심사평가원\n이 매년 비급여 진료비용을 조사하여 최저․최고금액 등 비급여 진료비용에 대한 정보를 비교․공개하는 제도\n\n※ 비급여 진료 사전설명제도 : 진료에 필요한 비급여 항목 및 가격을 환자가 사전에 인지하고 선택할 수 있도록\n의료기관이 비급여 진료 전에 비급여 제공항목과 가격을 미리 설명하도록 의무화하는 제도\n\n78 한화글로벌안심보험"}, {"title": "특별약관에 가입한 피보험자 중 국민건강보험법의 적용을 받지 않는 자로 합니다. 제2조(계약후 알릴의무)", "text": "① 보험기간중에 피보험자가 국민건강보험법에 정한 자격을 취득하였을 때 계약자는 서면으로 회사에 알리고 보험증\n권에 확인을 받아야 합니다.\n② 피보험자가 국민건강보험법에 정한 자격을 취득한 경우 그 사실이 발생된 날로부터 이 특별약관은 해지되며 회사\n는 경과하지 아니한 기간에 대하여 일단위로 계산한 정해진 보험료를 환급하여 드립니다."}, {"title": "특별약관에 가입한 피보험자 중 국민건강보험법의 적용을 받지 않는 자로 합니다. 제3조(보장내용)", "text": "목별 보상내용) 및 제4조(보상하지 않는 사항)에도 불구하고 국민건강보험 가입자와 동일하게 기본형 해외장기체"}, {"title": "해외상해의료비 자기부담금 설정 추가특별약관 제1조(보험금의 지급사유)", "text": "기본형 해외장기체류 실손의료보험 특별약관 제3조(보장종목별 보상내용)의 담보종목 중 (1)상해의료비 해외의 보\n상하는 사항에도 불구하고, 회사는 하나의 상해에 대하여 피보험자가 실제로 지급한 의료비 중 보험증권에 기재된\n자기부담비율 ( )%에 해당하는 금액을 차감한 후 보험가입금액 한도로 지급합니다."}, {"title": "해외질병의료비 자기부담금 설정 추가특별약관 제1조(보험금의 지급사유)", "text": "회사는 기본형 해외장기체류 실손의료보험 특별약관 제3조(보장종목별 보상내용)의 담보종목 중 (2)질병의료비 해\n외의 보상하는 사항에도 불구하고, 회사는 하나의 질병에 대하여 피보험자가 실제로 지급한 의료비 중 보험증권에\n\n기재된 자기부담비율 ( )%에 해당하는 금액을 차감한 후 보험가입금액 한도로 지급합니다."}];

function nowLabel() {
  return new Date().toLocaleString("ko-KR", {
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
  });
}

// "YYYY-MM-DD" 와 "YYYYMMDD" (또는 다른 구분자) 입력을 모두 "YYYY-MM-DD" 형식으로 통일
function normalizeBirth(input) {
  const digits = (input || "").replace(/\D/g, "");
  if (digits.length === 8) {
    return `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`;
  }
  return (input || "").trim();
}

// 질문 문장에서 검색용 키워드(2글자 이상)를 추출
function extractKeywords(text) {
  return (text.match(/[가-힣A-Za-z0-9]{2,}/g) || []);
}

// KB에 없는 질문에 대해, 첨부된 보험약관 전문(TERMS_SECTIONS)에서 가장 관련 있는 조항을 찾아 발췌
function findTermsAnswer(question) {
  const words = extractKeywords(question);
  if (words.length === 0) return null;
  let best = null;
  let bestScore = 0;
  for (const sec of TERMS_SECTIONS) {
    const hay = (sec.title + sec.text).replace(/\s+/g, "");
    let score = 0;
    for (const w of words) {
      if (hay.includes(w)) score += w.length;
    }
    if (score > bestScore) {
      bestScore = score;
      best = sec;
    }
  }
  if (!best || bestScore < 4) return null; // 너무 약한 매칭은 무시 (엉뚱한 조항 노출 방지)
  let text = best.text;
  if (text.length > 450) text = text.slice(0, 450).trim() + "...(이하 생략)";
  return `[약관 발췌: ${best.title}]\n${text}\n\n※ 위 내용은 보험약관 원문에서 자동으로 찾은 관련 조항입니다. 실제 적용 여부는 STINT 본부 또는 tesoro319@gmail.com 으로 다시 한번 확인해 주세요.`;
}

function findAnswer(question) {
  const q = question.replace(/\s+/g, "");
  let best = null;
  let bestScore = 0;
  for (const entry of KB) {
    let score = 0;
    for (const k of entry.kw) {
      if (q.includes(k.replace(/\s+/g, ""))) score += k.length; // longer/more specific keyword hits weigh more
    }
    if (score > bestScore) {
      bestScore = score;
      best = entry;
    }
  }
  if (best) return best.a;
  const termsAnswer = findTermsAnswer(question);
  if (termsAnswer) return termsAnswer;
  return FALLBACK;
}


async function loadLog() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true);
    if (!res || !res.value) return [];
    return JSON.parse(res.value);
  } catch (e) {
    return [];
  }
}

async function appendLog(entry) {
  try {
    const current = await loadLog();
    const next = [...current, entry].slice(-1000);
    await window.storage.set(STORAGE_KEY, JSON.stringify(next), true);
    return next;
  } catch (e) {
    return null;
  }
}

async function loadConfig() {
  try {
    const res = await window.storage.get(CONFIG_KEY, true);
    if (!res || !res.value) return { expiry: null };
    return JSON.parse(res.value);
  } catch (e) {
    return { expiry: null };
  }
}

async function saveConfig(config) {
  try {
    await window.storage.set(CONFIG_KEY, JSON.stringify(config), true);
    return true;
  } catch (e) {
    return false;
  }
}

const QUIZ_TOTAL = QUIZ_QUESTIONS.length;

function quizShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuizQuestions() {
  return QUIZ_QUESTIONS.map((q) => {
    const idx = q.options.map((opt, i) => ({ opt, i }));
    const shuffled = quizShuffle(idx);
    return {
      ...q,
      options: shuffled.map((s) => s.opt),
      correct: shuffled.findIndex((s) => s.i === q.correct),
    };
  });
}

async function loadQuizAggregate() {
  try {
    const res = await window.storage.get(QUIZ_STORAGE_KEY, true);
    if (!res || !res.value) return { participants: [], wrongCounts: {}, answerCounts: {} };
    const parsed = JSON.parse(res.value);
    return {
      participants: parsed.participants || [],
      wrongCounts: parsed.wrongCounts || {},
      answerCounts: parsed.answerCounts || {},
    };
  } catch (e) {
    return { participants: [], wrongCounts: {}, answerCounts: {} };
  }
}

async function saveQuizAggregate(agg) {
  try {
    await window.storage.set(QUIZ_STORAGE_KEY, JSON.stringify(agg), true);
    return true;
  } catch (e) {
    return false;
  }
}

            avgOverride: statsData.avg || 0,

            answerCounts: Object.fromEntries((statsData.mostMissed || []).map((r) => [r.qIndex, r.total])),
          });
        } catch (e) {
          setQuizAggregate({ participants: [], countOverride: 0, avgOverride: 0, wrongCounts: {}, answerCounts: {} });
        }
      } else {
        const agg = await loadQuizAggregate();
        const wrongCounts = { ...agg.wrongCounts };
        const answerCounts = { ...agg.answerCounts };
        finalAnswers.forEach((a, idx) => {
          answerCounts[idx] = (answerCounts[idx] || 0) + 1;
          if (!a.correct) wrongCounts[idx] = (wrongCounts[idx] || 0) + 1;
        });
        const participants = [...agg.participants, { name: name.trim(), score: finalScore, ts: Date.now() }];
        const newAgg = { participants, wrongCounts, answerCounts };
        await saveQuizAggregate(newAgg);
        setQuizAggregate(newAgg);
      }
      setQuizPhase("result");
    }
  };

    if (!quizAggregate) return null;
    const { participants, wrongCounts, answerCounts, countOverride, avgOverride } = quizAggregate;
    const count = typeof countOverride === "number" ? countOverride : participants.length;
    const avg =
      typeof avgOverride === "number"
        ? avgOverride
        : participants.length > 0
        ? participants.reduce((s, p) => s + p.score, 0) / participants.length
        : 0;
    const rows = QUIZ_QUESTIONS.map((q, idx) => {
      const wrong = wrongCounts[idx] || 0;
      const total = answerCounts[idx] || 0;
      return { idx, label: `${idx + 1}. ${q.q}`, short: `Q${idx + 1}`, wrong, total };
    });
    const mostMissed = [...rows].filter((r) => r.wrong > 0).sort((a, b) => b.wrong - a.wrong).slice(0, 10);

function QuizScoreGauge({ score, total }) {
  const pct = total > 0 ? score / total : 0;
  const r = 70;
  const c = 2 * Math.PI * r;
  const dash = c * pct;
  const color = pct >= 0.8 ? COLOR.green : pct >= 0.5 ? COLOR.gold : COLOR.red;
  return (
    <div className="relative w-48 h-48 mx-auto">
      <svg viewBox="0 0 180 180" className="w-full h-full -rotate-90">
        <circle cx="90" cy="90" r={r} fill="none" stroke="#E4EAEE" strokeWidth="14" />
        <circle
          cx="90" cy="90" r={r} fill="none" stroke={color} strokeWidth="14"
          strokeDasharray={`${dash} ${c - dash}`} strokeLinecap="round"
          style={{ transition: "stroke-dasharray 1s ease-out" }}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="text-4xl font-black" style={{ color: COLOR.navy }}>{score}</span>
        <span className="text-sm font-medium" style={{ color: COLOR.textMuted }}>/ {total} 문제</span>
      </div>
    </div>
  );
}

                key={i}
                onClick={() => onSelect(i)}
                disabled={disabled}
                className="text-left px-4 py-3.5 rounded-xl border-2 font-medium text-sm flex items-center justify-between gap-2 transition-all"
                style={style}

          </>
        )}
      </div>

      <button
        onClick={onRestart}
        className="w-full py-3.5 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-transform active:scale-95 mb-4"
        style={{ background: `linear-gradient(90deg, ${COLOR.navy}, ${COLOR.teal})` }}
      >
        <RotateCcw size={18} /> 퀴즈 다시 풀기
      </button>
    </div>
  );
}

function AdminView({
  log, loading, expanded, setExpanded,
  config, expiryInput, setExpiryInput, savingExpiry, expirySaved, onSaveExpiry, onClearExpiry,
}) {
  const currentExpiryLabel = config && config.expiry
    ? new Date(config.expiry).toLocaleString("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
    : "제한 없음";

  return (
    <div className="flex-1 flex flex-col min-h-0">
      <div className="bg-white rounded-2xl p-5 mb-3 shadow-2xl" style={{ boxShadow: "0 16px 40px rgba(0,0,0,0.3)" }}>
        <div className="flex items-center gap-2 mb-3">
          <Clock size={18} color={COLOR.teal} />
          <p className="font-bold text-sm" style={{ color: COLOR.navy }}>이용기간 설정</p>
        </div>
        <p className="text-xs mb-3" style={{ color: COLOR.textMuted }}>
          현재 설정: <span className="font-bold" style={{ color: COLOR.navy }}>{currentExpiryLabel}</span>
        </p>
        <div className="flex flex-wrap items-center gap-2">
          <input
            type="datetime-local"
            value={expiryInput}
            onChange={(e) => setExpiryInput(e.target.value)}
            className="border-2 rounded-xl px-3 py-2 text-sm outline-none"
            style={{ borderColor: COLOR.cardBorder }}
          />
          <button
            onClick={onSaveExpiry}
            disabled={savingExpiry || !expiryInput}
            className="px-4 py-2 rounded-xl font-bold text-white text-xs disabled:opacity-40"
            style={{ background: `linear-gradient(90deg, ${COLOR.navy}, ${COLOR.teal})` }}
          >
            {savingExpiry ? "저장 중..." : "마감일 저장"}
          </button>
          <button
            onClick={onClearExpiry}
            disabled={savingExpiry}
            className="px-4 py-2 rounded-xl font-bold text-xs"
            style={{ background: COLOR.bg, color: COLOR.textMuted }}
          >
            제한 해제
          </button>
        </div>
        {expirySaved && <p className="text-xs mt-2" style={{ color: COLOR.green }}>저장되었습니다.</p>}
      </div>

      <div className="bg-white rounded-2xl p-5 mb-3 shadow-2xl flex items-center justify-between" style={{ boxShadow: "0 16px 40px rgba(0,0,0,0.3)" }}>
        <div className="flex items-center gap-2">
          <ListOrdered size={18} color={COLOR.teal} />
          <div>
            <p className="font-bold text-sm" style={{ color: COLOR.navy }}>질문 기록 (질문 순서대로)</p>
            <p className="text-xs" style={{ color: COLOR.textMuted }}>가장 먼저 들어온 질문부터 순서대로 표시됩니다</p>
          </div>
        </div>
        <div className="text-right flex-shrink-0">
          <p className="text-xl font-black" style={{ color: COLOR.gold }}>{log.length}</p>
          <p className="text-xs" style={{ color: COLOR.textMuted }}>총 질문 수</p>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto flex flex-col gap-2.5" style={{ maxHeight: "62vh" }}>
        {loading && (
          <div className="flex items-center justify-center py-10 text-white gap-2">
            <Loader2 size={20} className="animate-spin" />
            <span className="text-sm">기록을 불러오는 중...</span>
          </div>
        )}
        {!loading && log.length === 0 && (
          <div className="bg-white rounded-2xl p-8 text-center" style={{ boxShadow: "0 8px 24px rgba(0,0,0,0.2)" }}>
            <AlertTriangle size={22} color={COLOR.textMuted} className="mx-auto mb-2" />
            <p className="text-sm" style={{ color: COLOR.textMuted }}>아직 기록된 질문이 없습니다.</p>
          </div>
        )}
        {!loading && log.map((r, i) => {
          const isOpen = expanded === i;
          return (
            <div key={i} className="bg-white rounded-xl overflow-hidden" style={{ boxShadow: "0 6px 18px rgba(0,0,0,0.15)" }}>
              <button
                onClick={() => setExpanded(isOpen ? null : i)}
                className="w-full text-left px-4 py-3 flex items-center gap-3"
              >
                <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 text-white text-xs font-bold" style={{ background: COLOR.gold }}>
                  {i + 1}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-xs font-bold" style={{ color: COLOR.navy }}>{r.name}{r.country ? ` (${r.country})` : ""}</span>
                    <span className="text-xs flex items-center gap-1" style={{ color: COLOR.textMuted }}>
                      <Clock size={10} /> {r.tsLabel || new Date(r.ts).toLocaleString("ko-KR")}
                    </span>
                  </div>
                  <p className="text-sm font-medium truncate mt-0.5" style={{ color: "#16242E" }}>Q. {r.question}</p>
                </div>
                {isOpen ? <ChevronUp size={16} color={COLOR.textMuted} /> : <ChevronDown size={16} color={COLOR.textMuted} />}
              </button>
              {isOpen && (
                <div className="px-4 pb-4">
                  <div className="rounded-lg px-3 py-2.5 text-sm leading-relaxed whitespace-pre-wrap" style={{ background: COLOR.bg, color: "#16242E" }}>
                    {r.answer}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const __src = document.getElementById("app-source").textContent;
  try {
    const __out = Babel.transform(__src, {

    const __blob = new Blob([__out], { type: "text/javascript" });
    const __url = URL.createObjectURL(__blob);

    });

  }
</script>
